*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}

.fade-in{animation:fadeIn .2s ease both}
.modal-in{animation:modalIn .18s ease both}
.spinner{animation:spin .7s linear infinite}

/* ── utils ── */
const now  = ()=>new Date().toISOString();
const uid  = ()=>Math.random().toString(36).slice(2,9);
const fmtD = d=>d?new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtT = d=>d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'';
const calcPct=tasks=>{const a=Object.values(tasks||{});return a.length?Math.round(a.filter(t=>t.status==='Completado').length/a.length*100):0};

const ADMIN={id:'admin',name:'Administrador',role:'admin',pin:'0000',company:'Inverfin'};
const GC='inverfin2025';

const SM={
  'Pendiente'  :{dot:'bg-ink-faint', tx:'text-ink-muted', border:'border-paper-border', bg:'bg-paper-soft'},
  'En progreso':{dot:'bg-ink-light', tx:'text-ink-light', border:'border-paper-border', bg:'bg-paper-soft'},
  'Completado' :{dot:'bg-accent',    tx:'text-accent-dark',border:'border-accent/20',   bg:'bg-accent-light'},
  'Activo'     :{dot:'bg-ink-light', tx:'text-ink-light', border:'border-paper-border', bg:'bg-paper-soft'},
  'Pausado'    :{dot:'bg-ink-faint', tx:'text-ink-muted', border:'border-paper-border', bg:'bg-paper-soft'},
  'Finalizado' :{dot:'bg-accent',    tx:'text-accent-dark',border:'border-accent/20',   bg:'bg-accent-light'},
  'Bloqueado'  :{dot:'bg-red-400',   tx:'text-red-600',   border:'border-red-200',      bg:'bg-red-50'},
};

/* ── ATOMS ── */
const Tag=({s})=>{
  const c=SM[s]||SM['Pendiente'];
  return(
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded text-xs font-medium border ${c.bg} ${c.border} ${c.tx}`}>
      <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${c.dot}`}/>
      {s}
    </span>
  );
};

const Bar=({v})=>(
  <div className="h-0.5 w-full bg-paper-border rounded-full overflow-hidden">
    <div className="h-full rounded-full transition-all duration-500"
      style={{width:`${Math.min(v,100)}%`,background:v===100?'#2a7a4b':'#111'}}/>
  </div>
);

const IS="w-full px-3 py-2.5 bg-white border border-paper-border rounded-lg text-sm text-ink outline-none focus:border-ink focus:ring-2 focus:ring-ink/5 transition-all placeholder:text-ink-faint";

const Lbl=({t})=><label className="block text-[11px] font-semibold text-ink-muted uppercase tracking-widest mb-1.5">{t}</label>;

const Inp=({label,...p})=>(
  <div className="mb-4">
    {label&&<Lbl t={label}/>}
    <input className={IS} {...p}/>
  </div>
);

const TA=({label,...p})=>(
  <div className="mb-4">
    {label&&<Lbl t={label}/>}
    <textarea className={`${IS} resize-none`} rows={3} {...p}/>
  </div>
);

const Sel=({label,opts,...p})=>(
  <div className="mb-4">
    {label&&<Lbl t={label}/>}
    <select className={`${IS} appearance-none cursor-pointer`} {...p}>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  </div>
);

const Btn=({children,v='primary',sm,full,className='',disabled,...p})=>{
  const base=`inline-flex items-center justify-center gap-1.5 font-semibold rounded-lg transition-all duration-150 select-none ${sm?'px-3 py-1.5 text-xs':'px-4 py-2.5 text-sm'} ${full?'w-full':''}`;
  const vs={
    primary:`${base} bg-ink text-white hover:bg-ink-light active:scale-95`,
    ghost:`${base} bg-white border border-paper-border text-ink-muted hover:border-ink hover:text-ink active:scale-95`,
    accent:`${base} bg-accent text-white hover:bg-accent-dark active:scale-95`,
    red:`${base} bg-white border border-paper-border text-ink-muted hover:border-red-300 hover:text-red-500 active:scale-95`,
  };
  return(
    <button
      className={`${vs[v]||vs.primary} ${disabled?'opacity-40 cursor-not-allowed pointer-events-none':''} ${className}`}
      disabled={disabled} {...p}>
      {children}
    </button>
  );
};

/* ── MODAL — renders via portal to document.body, bypasses overflow issues ── */
const Modal=({title,sub,onClose,wide,children})=>{
  // close on Escape
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[]);

  const content=(
    <div
      style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',background:'rgba(0,0,0,0.3)'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div
        className={`bg-white border border-paper-border rounded-xl shadow-2xl w-full ${wide?'max-w-2xl':'max-w-md'} flex flex-col modal-in`}
        style={{maxHeight:'90vh'}}
        onClick={e=>e.stopPropagation()}>
        {/* header */}
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid #e4e4e0',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',flexShrink:0}}>
          <div>
            <div className="garamond text-xl font-medium text-ink">{title}</div>
            {sub&&<div className="text-xs text-ink-muted mt-0.5">{sub}</div>}
          </div>
          <button onClick={onClose}
            style={{width:'28px',height:'28px',borderRadius:'50%',border:'1px solid #e4e4e0',background:'#f4f4f2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',color:'#888',cursor:'pointer',flexShrink:0}}
            onMouseEnter={e=>e.target.style.color='#111'}
            onMouseLeave={e=>e.target.style.color='#888'}>
            ×
          </button>
        </div>
        {/* body */}
        <div style={{padding:'20px 24px',overflowY:'auto',flex:1}}>
          {children}
        </div>
      </div>
    </div>
  );

  return createPortal(content, document.body);
};

/* ── AUTH ── */
const Auth=({onLogin})=>{
  const[mode,setMode]=useState('login');
  const[f,sf]=useState({name:'',pin:'',role:'empleado',code:''});
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const u=k=>e=>sf(p=>({...p,[k]:e.target.value}));

  const doLogin=async()=>{
    if(!f.name||!f.pin){setErr('Completa nombre y PIN');return}
    setBusy(true);setErr('');
    if(f.name.toLowerCase()==='admin'&&f.pin==='0000'){onLogin(ADMIN);return}
    const users=await window.DB.getUsers();
    const found=Object.values(users).find(x=>x.name.toLowerCase()===f.name.toLowerCase()&&x.pin===f.pin);
    if(!found){setErr('Nombre o PIN incorrecto');setBusy(false);return}
    onLogin(found);
  };

  const doReg=async()=>{
    if(!f.name||f.pin.length!==4){setErr('Nombre y PIN de 4 dígitos requeridos');return}
    if(f.role==='gerencia'&&f.code!==GC){setErr('Código de gerencia incorrecto');return}
    setBusy(true);setErr('');
    const users=await window.DB.getUsers();
    if(Object.values(users).find(x=>x.name.toLowerCase()===f.name.toLowerCase())){setErr('Ese nombre ya existe');setBusy(false);return}
    const id=uid();
    const nu={id,name:f.name,pin:f.pin,role:f.role,company:'Inverfin',createdAt:now()};
    await window.DB.setUser(id,nu);onLogin(nu);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex'}}>
      {/* panel izquierdo */}
      <div className="hidden lg:flex flex-col justify-between w-80 xl:w-96 bg-ink flex-shrink-0 p-12">
        <div>
          <div className="flex items-center gap-2.5 mb-14">
            <img src={LOGO} className="w-9 h-9 rounded-xl opacity-90" alt=""/>
            <span className="garamond text-white text-2xl font-medium">InverWork</span>
          </div>
          <h2 className="garamond text-white text-3xl font-medium leading-snug mb-4">Gestión de proyectos para Inverfin Holding</h2>
          <p className="text-white/40 text-sm leading-relaxed">Proyectos, tareas, tiempo y reportes — todo centralizado y en tiempo real.</p>
        </div>
        <div>
          <p className="text-white/25 text-xs">© 2025 Inverfin Holding</p>
          <p className="text-white/15 text-xs mt-0.5 italic">Owned by Jesús Santiago</p>
        </div>
      </div>

      {/* panel derecho */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'32px',background:'#fafaf8'}}>
        <div className="w-full max-w-sm fade-in">
          <div className="lg:hidden flex items-center gap-2.5 mb-10">
            <img src={LOGO} className="w-8 h-8 rounded-xl" alt=""/>
            <div>
              <div className="garamond text-xl font-medium text-ink">InverWork</div>
              <div className="text-[10px] text-ink-muted tracking-widest uppercase">Inverfin Holding</div>
            </div>
          </div>

          <h1 className="garamond text-3xl font-medium text-ink mb-1">{mode==='login'?'Iniciar sesión':'Crear cuenta'}</h1>
          <p className="text-sm text-ink-muted mb-8">{mode==='login'?'Accede con tu nombre y PIN de 4 dígitos.':'Elige tu nombre y crea un PIN.'}</p>

          {mode==='login'?(
            <>
              <Inp label="Nombre" placeholder="Tu nombre completo" value={f.name} onChange={u('name')}/>
              <Inp label="PIN" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={f.pin} onChange={u('pin')} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
              {err&&<p className="text-red-500 text-xs mb-4 flex items-center gap-1.5">⚠ {err}</p>}
              <Btn full onClick={doLogin} disabled={busy}>{busy?'Verificando…':'Entrar →'}</Btn>
              <p className="text-sm text-ink-muted text-center mt-6">¿Sin cuenta? <span className="text-ink underline cursor-pointer hover:no-underline" onClick={()=>{setMode('reg');setErr('')}}>Regístrate</span></p>
            </>
          ):(
            <>
              <Inp label="Nombre completo" placeholder="Ej. María González" value={f.name} onChange={u('name')}/>
              <Inp label="PIN (4 dígitos)" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={f.pin} onChange={u('pin')}/>
              <div className="mb-4">
                <Lbl t="Rol"/>
                <div className="grid grid-cols-2 gap-2">
                  {['empleado','gerencia'].map(r=>(
                    <button key={r} onClick={()=>sf(p=>({...p,role:r}))}
                      className={`py-3 border rounded-lg text-sm font-semibold transition-all capitalize ${f.role===r?'border-ink bg-ink text-white':'border-paper-border text-ink-muted hover:border-ink-faint'}`}>
                      {r}
                    </button>
                  ))}
                </div>
              </div>
              {f.role==='gerencia'&&<Inp label="Código de gerencia" placeholder="Código confidencial" value={f.code} onChange={u('code')}/>}
              {err&&<p className="text-red-500 text-xs mb-4">⚠ {err}</p>}
              <Btn full onClick={doReg} disabled={busy}>{busy?'Registrando…':'Crear cuenta →'}</Btn>
              <p className="text-sm text-ink-muted text-center mt-6">¿Ya tienes cuenta? <span className="text-ink underline cursor-pointer hover:no-underline" onClick={()=>{setMode('login');setErr('')}}>Entrar</span></p>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <Inp label="Fecha inicio" type="date" value={form.startDate} onChange={upd('startDate')}/>
            <Inp label="Fecha fin est." type="date" value={form.endDate} onChange={upd('endDate')}/>
          </div>
          <Sel label="Estado" value={form.status} onChange={upd('status')} opts={['Activo','En progreso','Pausado','Finalizado']}/>
          <div style={{display:'flex',gap:'12px',paddingTop:'8px'}}>
            <Btn v="ghost" full onClick={()=>setShowCreate(false)}>Cancelar</Btn>
            <Btn full onClick={create} disabled={!form.name.trim()}>Crear proyecto</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ── PROJECT DETAIL ── */
const ProjectDetail=({user,pid,project,onBack})=>{
  const[tasks,setTasks]=useState({});
  const[costs,setCosts]=useState({});
  const[pane,setPane]=useState('tasks');
  const[showTask,setShowTask]=useState(false);
  const[showCost,setShowCost]=useState(false);
  const[tf,stf]=useState({name:'',description:'',status:'Pendiente',timeEstimated:''});
  const[cf,scf]=useState({description:'',amount:'',date:''});
  const[timers,setTimers]=useState({});
  const[elapsed,setElapsed]=useState({});
  const canEdit=project.ownerId===user.id;

  useEffect(()=>{
    const u1=window.DB.onTasks(pid,d=>setTasks(d||{}));
    const u2=window.DB.onCosts(pid,d=>setCosts(d||{}));
    return()=>{u1();u2()};
  },[pid]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      setElapsed(prev=>{
        const next={...prev};
        Object.entries(timers).forEach(([tid,t])=>{if(t.running)next[tid]=Math.floor((Date.now()-t.start)/1000)});
        return next;
      });
    },1000);
    return()=>clearInterval(iv);
  },[timers]);

  const v=calcPct(tasks);
  const taskArr=Object.entries(tasks);
  const totalCost=Object.values(costs).reduce((a,c)=>a+(+c.amount||0),0);

  const saveTask=async()=>{
    if(!tf.name.trim())return;
    await window.DB.addTask(pid,{...tf,assignedTo:user.id,assignedName:user.name,timeSpent:0,createdAt:now()});
    setShowTask(false);stf({name:'',description:'',status:'Pendiente',timeEstimated:''});
  };

  const changeStatus=async(tid,status)=>{
    await window.DB.updTask(pid,tid,{status});
    const upd={...tasks,[tid]:{...tasks[tid],status}};
    await window.DB.updProject(pid,{progress:calcPct(upd)});
  };

  const delTask=async tid=>{
    if(!confirm('¿Eliminar tarea?'))return;
    await window.DB.delTask(pid,tid);
    const upd={...tasks};delete upd[tid];
    await window.DB.updProject(pid,{progress:calcPct(upd)});
  };

  const startTimer=tid=>setTimers(p=>({...p,[tid]:{start:Date.now(),running:true}}));
  const stopTimer=async tid=>{
    const t=timers[tid];if(!t?.running)return;
    const mins=Math.round((Date.now()-t.start)/60000);
    await window.DB.addTimeLog(tid,{userId:user.id,userName:user.name,duration:mins,createdAt:now()});
    const prev=+tasks[tid]?.timeSpent||0;
    await window.DB.updTask(pid,tid,{timeSpent:prev+mins});
    setTimers(p=>({...p,[tid]:{running:false}}));
    setElapsed(p=>({...p,[tid]:0}));
  };

  const fmtEl=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`};

  const addCost=async()=>{
    if(!cf.description.trim()||!cf.amount)return;
    await window.DB.addCost(pid,{...cf,createdAt:now()});
    setShowCost(false);scf({description:'',amount:'',date:''});
  };

  return(
    <div className="fade-in">
      {/* breadcrumb */}
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',color:'#888',background:'none',border:'none',cursor:'pointer',marginBottom:'20px',padding:0}}
        onMouseEnter={e=>e.currentTarget.style.color='#111'} onMouseLeave={e=>e.currentTarget.style.color='#888'}>
        ← Proyectos
      </button>

      {/* header */}
      <div style={{paddingBottom:'24px',borderBottom:'1px solid #e4e4e0',marginBottom:'24px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'16px',marginBottom:'12px'}}>
          <h1 className="garamond" style={{fontSize:'38px',fontWeight:500,color:'#111',lineHeight:1.1}}>{project.name}</h1>
          {canEdit&&(
            <select value={project.status}
              onChange={e=>window.DB.updProject(pid,{status:e.target.value})}
              style={{padding:'8px 12px',border:'1px solid #e4e4e0',borderRadius:'8px',fontSize:'13px',color:'#111',background:'#fff',cursor:'pointer',flexShrink:0,outline:'none'}}>
              {['Activo','En progreso','Pausado','Finalizado','Bloqueado'].map(s=><option key={s}>{s}</option>)}
            </select>
          )}
        </div>
        {project.description&&<p style={{fontSize:'13px',color:'#888',marginBottom:'12px'}}>{project.description}</p>}
        <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap',marginBottom:'16px'}}>
          <Tag s={project.status}/>
          <span style={{fontSize:'12px',color:'#888'}}>{taskArr.length} tarea{taskArr.length!==1?'s':''}</span>
          <span style={{fontSize:'12px',color:'#888'}}>{project.ownerName}</span>
          {project.startDate&&<span style={{fontSize:'12px',color:'#888'}}>Inicio: {fmtD(project.startDate)}</span>}
        </div>
        {/* progress */}
        <div style={{maxWidth:'480px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#888',marginBottom:'6px'}}>
            <span>Progreso automático por tareas</span>
            <span style={{fontFamily:'monospace',color:'#111',fontWeight:600}}>{v}%</span>
          </div>
          <div style={{height:'3px',background:'#e4e4e0',borderRadius:'99px',overflow:'hidden'}}>
            <div style={{height:'100%',background:v===100?'#2a7a4b':'#111',width:`${v}%`,transition:'width 0.5s',borderRadius:'99px'}}/>
          </div>
        </div>
        {/* mini stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1px',background:'#e4e4e0',border:'1px solid #e4e4e0',borderRadius:'8px',overflow:'hidden',maxWidth:'360px',marginTop:'16px'}}>
          {[['Pendiente',taskArr.filter(([,t])=>t.status==='Pendiente').length],
            ['En progreso',taskArr.filter(([,t])=>t.status==='En progreso').length],
            ['Completado',taskArr.filter(([,t])=>t.status==='Completado').length]
          ].map(([s,n])=>(
            <div key={s} style={{background:'#fff',padding:'12px',textAlign:'center'}}>
              <div className="garamond" style={{fontSize:'28px',fontWeight:500,color:'#111'}}>{n}</div>
              <div style={{fontSize:'10px',color:'#888',marginTop:'2px'}}>{s}</div>
            </div>
          ))}
        </div>
      </div>

      {/* tabs */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #e4e4e0',marginBottom:'20px'}}>
        <div style={{display:'flex'}}>
          {[['tasks','Tareas'],['costs','Costes']].map(([id,lbl])=>(
            <button key={id} onClick={()=>setPane(id)}
              style={{padding:'10px 16px',fontSize:'14px',fontWeight:500,border:'none',borderBottom:`2px solid ${pane===id?'#111':'transparent'}`,marginBottom:'-1px',color:pane===id?'#111':'#888',background:'transparent',cursor:'pointer',transition:'all 0.15s'}}>
              {lbl}
              {id==='tasks'&&<span style={{marginLeft:'6px',fontSize:'11px',color:'#bbb'}}>({taskArr.length})</span>}
              {id==='costs'&&totalCost>0&&<span style={{marginLeft:'6px',fontSize:'11px',color:'#bbb'}}>${Math.round(totalCost)}</span>}
            </button>
          ))}
        </div>
        <div style={{marginBottom:'8px'}}>
          {pane==='tasks'&&canEdit&&<Btn sm onClick={()=>setShowTask(true)}>+ Tarea</Btn>}
          {pane==='costs'&&canEdit&&<Btn sm onClick={()=>setShowCost(true)}>+ Coste</Btn>}
        </div>
      </div>

      {/* TASKS */}
      {pane==='tasks'&&(taskArr.length===0?(
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'64px',textAlign:'center'}}>
          <p className="garamond" style={{fontSize:'22px',color:'#bbb',marginBottom:'6px'}}>Sin tareas</p>
          <p style={{fontSize:'13px',color:'#888'}}>{canEdit?'Añade la primera tarea.':'No hay tareas aún.'}</p>
        </div>
      ):(
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden'}}>
          {taskArr.map(([tid,t],i)=>{
            const running=timers[tid]?.running;
            const spent=(+t.timeSpent||0);
            return(
              <div key={tid} style={{background:'#fff',padding:'16px 20px',borderTop:i>0?'1px solid #e4e4e0':'none'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',marginBottom:'8px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:500,color:'#111',marginBottom:'4px'}}>{t.name}</div>
                    {t.description&&<p style={{fontSize:'12px',color:'#888',lineHeight:1.5}}>{t.description}</p>}
                  </div>
                  <Tag s={t.status}/>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'16px',fontSize:'12px',color:'#888',marginBottom:canEdit?'12px':'0',flexWrap:'wrap'}}>
                  {t.timeEstimated&&<span>Est. <span style={{fontFamily:'monospace',color:'#111'}}>{t.timeEstimated}h</span></span>}
                  <span>Real <span style={{fontFamily:'monospace',color:'#111'}}>{(spent/60).toFixed(1)}h</span></span>
                  {t.assignedName&&<span>👤 {t.assignedName}</span>}
                  {running&&<span style={{color:'#2a7a4b',fontWeight:600,fontFamily:'monospace'}}>⏱ {fmtEl(elapsed[tid]||0)}</span>}
                </div>
                {canEdit&&(
                  <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                    {['Pendiente','En progreso','Completado'].map(s=>(
                      <button key={s} onClick={()=>changeStatus(tid,s)}
                        style={{padding:'4px 10px',borderRadius:'6px',border:`1px solid ${t.status===s?'#111':'#e4e4e0'}`,background:t.status===s?'#111':'transparent',color:t.status===s?'#fff':'#888',fontSize:'12px',fontWeight:500,cursor:'pointer',transition:'all 0.15s'}}>
                        {s}
                      </button>
                    ))}
                    <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
                      {running
                        ?<button onClick={()=>stopTimer(tid)} style={{padding:'4px 10px',borderRadius:'6px',border:'1px solid #fca5a5',background:'#fef2f2',color:'#dc2626',fontSize:'12px',fontWeight:500,cursor:'pointer'}}>⏹ Detener</button>
                        :<button onClick={()=>startTimer(tid)} style={{padding:'4px 10px',borderRadius:'6px',border:'1px solid #e4e4e0',background:'transparent',color:'#888',fontSize:'12px',fontWeight:500,cursor:'pointer'}}>▶ Timer</button>
                      }
                      <button onClick={()=>delTask(tid)} style={{padding:'4px 8px',borderRadius:'6px',border:'1px solid #e4e4e0',background:'transparent',color:'#bbb',fontSize:'14px',cursor:'pointer',lineHeight:1}}>×</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}

      {/* COSTS */}
      {pane==='costs'&&(
        <>
          {Object.keys(costs).length>0&&(
            <div style={{display:'flex',alignItems:'baseline',gap:'8px',marginBottom:'16px'}}>
              <span className="garamond" style={{fontSize:'22px',fontWeight:500,color:'#111'}}>Total</span>
              <span className="garamond" style={{fontSize:'32px',fontWeight:500,color:'#2a7a4b'}}>${totalCost.toFixed(2)}</span>
            </div>
          )}
          {Object.keys(costs).length===0?(
            <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'64px',textAlign:'center'}}>
              <p className="garamond" style={{fontSize:'22px',color:'#bbb',marginBottom:'6px'}}>Sin costes</p>
              <p style={{fontSize:'13px',color:'#888'}}>{canEdit?'Registra costes externos.':'No hay costes.'}</p>
            </div>
          ):(
            <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden'}}>
              {Object.entries(costs).map(([cid,c],i)=>(
                <div key={cid} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',background:'#fff',borderTop:i>0?'1px solid #e4e4e0':'none'}}>
                  <div>
                    <div style={{fontWeight:500,color:'#111'}}>{c.description}</div>
                    <div style={{fontSize:'12px',color:'#888',marginTop:'2px'}}>{fmtD(c.date)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
                    <span className="garamond" style={{fontSize:'22px',fontWeight:500,color:'#111'}}>${(+c.amount).toFixed(2)}</span>
                    {canEdit&&<button onClick={()=>window.DB.delCost(pid,cid)} style={{fontSize:'18px',color:'#bbb',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>×</button>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* TASK MODAL */}
      {showTask&&(
        <Modal title="Nueva tarea" onClose={()=>setShowTask(false)}>
          <Inp label="Nombre *" value={tf.name} onChange={e=>stf(p=>({...p,name:e.target.value}))} placeholder="Nombre de la tarea" autoFocus/>
          <TA label="Descripción" value={tf.description} onChange={e=>stf(p=>({...p,description:e.target.value}))} placeholder="Descripción opcional"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <Inp label="Tiempo estimado (h)" type="number" value={tf.timeEstimated} onChange={e=>stf(p=>({...p,timeEstimated:e.target.value}))} placeholder="0"/>
            <Sel label="Estado" value={tf.status} onChange={e=>stf(p=>({...p,status:e.target.value}))} opts={['Pendiente','En progreso','Completado']}/>
          </div>
          <div style={{display:'flex',gap:'12px',paddingTop:'8px'}}>
            <Btn v="ghost" full onClick={()=>setShowTask(false)}>Cancelar</Btn>
            <Btn full onClick={saveTask} disabled={!tf.name.trim()}>Guardar tarea</Btn>
          </div>
        </Modal>
      )}

      {/* COST MODAL */}
      {showCost&&(
        <Modal title="Añadir coste externo" onClose={()=>setShowCost(false)}>
          <TA label="Concepto *" value={cf.description} onChange={e=>scf(p=>({...p,description:e.target.value}))} placeholder="Ej. Consultor, dominio, API, freelancer…"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <Inp label="Importe ($) *" type="number" value={cf.amount} onChange={e=>scf(p=>({...p,amount:e.target.value}))} placeholder="0.00"/>
            <Inp label="Fecha" type="date" value={cf.date} onChange={e=>scf(p=>({...p,date:e.target.value}))}/>
          </div>
          <div style={{display:'flex',gap:'12px',paddingTop:'8px'}}>
            <Btn v="ghost" full onClick={()=>setShowCost(false)}>Cancelar</Btn>
            <Btn full onClick={addCost} disabled={!cf.description.trim()||!cf.amount}>Añadir coste</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ── REPORTS ── */
const Reports=({user,projects,reports})=>{

            {isAdmin&&(
              <div style={{display:'flex',gap:'8px'}}>
                <input className={IS} style={{flex:1}} placeholder="Añadir comentario…" value={comment} onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendComment()}/>
                <Btn sm onClick={sendComment} disabled={!comment.trim()}>Enviar</Btn>
              </div>
            )}
          </div>
        </Modal>
      )}

      {/* Create modal */}
      {show&&(
        <Modal title="Nuevo reporte diario" onClose={()=>setShow(false)} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <Inp label="Fecha *" type="date" value={f.date} onChange={upd('date')}/>
            <div className="mb-4">
              <Lbl t="Proyecto"/>
              <select className={`${IS} appearance-none`} value={f.projectId} onChange={upd('projectId')}>
                <option value="">— Sin proyecto —</option>
                {Object.entries(projects).filter(([,p])=>p.ownerId===user.id).map(([pid,p])=>(
                  <option key={pid} value={pid}>{p.name}</option>
                ))}
              </select>
            </div>
          </div>
          <Inp label="Horas trabajadas" type="number" value={f.hoursWorked} onChange={upd('hoursWorked')} placeholder="0"/>
          <TA label="Tareas realizadas hoy" value={f.tasks} onChange={upd('tasks')} placeholder="Describe el trabajo completado…"/>
          <TA label="Problemas encontrados" value={f.problems} onChange={upd('problems')} placeholder="Errores, bloqueos, obstáculos…"/>
          <TA label="Notas y observaciones" value={f.notes} onChange={upd('notes')} placeholder="Ideas, aprendizajes, próximos pasos…"/>
          <div style={{display:'flex',gap:'12px',paddingTop:'8px'}}>
            <Btn v="ghost" full onClick={()=>setShow(false)}>Cancelar</Btn>
            <Btn full onClick={create}>Enviar reporte</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ── TEAM ── */
const Team=({user,projects,allTasks})=>{
  const others=Object.entries(projects).filter(([,p])=>p.ownerId!==user.id);
  return(
    <div className="fade-in">
      <div style={{marginBottom:'28px',paddingBottom:'24px',borderBottom:'1px solid #e4e4e0'}}>
        <h1 className="garamond" style={{fontSize:'38px',fontWeight:500,color:'#111'}}>Equipo</h1>
        <p style={{fontSize:'13px',color:'#888',marginTop:'4px'}}>Vista general — sin acceso a tareas, tiempos ni costes de otros.</p>
      </div>
      {others.length===0?(
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'64px',textAlign:'center'}}>
          <p style={{fontSize:'13px',color:'#888'}}>Ningún compañero tiene proyectos activos aún.</p>
        </div>
      ):(
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden'}}>
          {others.map(([pid,p],i)=>{
            const v=calcPct(allTasks[pid]||{});
            return(
              <div key={pid} style={{display:'flex',alignItems:'center',gap:'20px',padding:'14px 20px',borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,color:'#111'}}>{p.name}</div>
                  <div style={{fontSize:'12px',color:'#888',marginTop:'2px'}}>{p.ownerName}</div>
                </div>
                <div style={{width:'96px'}}>
                  <Bar v={v}/>
                  <div style={{fontSize:'11px',color:'#888',fontFamily:'monospace',textAlign:'right',marginTop:'2px'}}>{v}%</div>
                </div>
                <Tag s={p.status}/>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ── OVERVIEW ── */
const Overview=({user,projects,allTasks,reports,users})=>{
  const cDonut=useRef(null),cBar=useRef(null);
  const iD=useRef(null),iB=useRef(null);
  const pa=Object.entries(projects);
  const avgPct=pa.length?Math.round(pa.reduce((a,[pid])=>a+calcPct(allTasks[pid]||{}),0)/pa.length):0;
  const today=new Date().toDateString();

  useEffect(()=>{
    if(!cDonut.current)return;
    if(iD.current)iD.current.destroy();
    const sts=['Activo','En progreso','Pausado','Finalizado','Bloqueado'];
    iD.current=new Chart(cDonut.current,{type:'doughnut',
      data:{labels:sts,datasets:[{data:sts.map(s=>pa.filter(([,p])=>p.status===s).length),
        backgroundColor:['#111','#444','#888','#2a7a4b','#c0392b'],borderWidth:3,borderColor:'#fff',hoverOffset:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Inter'},padding:12,color:'#888'}}}}});
  },[projects]);

  useEffect(()=>{
    if(!cBar.current||!pa.length)return;
    if(iB.current)iB.current.destroy();
    const data=pa.map(([pid])=>calcPct(allTasks[pid]||{}));
    iB.current=new Chart(cBar.current,{type:'bar',
      data:{labels:pa.map(([,p])=>p.name.length>22?p.name.slice(0,22)+'…':p.name),
        datasets:[{data,backgroundColor:data.map(v=>v===100?'#2a7a4b':'#111'),borderRadius:2,barThickness:14}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10,family:'Inter'},color:'#bbb'},grid:{color:'#f0f0ee'}},
          y:{grid:{display:false},ticks:{font:{size:10,family:'Inter'},color:'#888'}}}}});
  },[projects,allTasks]);

  const kpis=[
    {n:pa.length,l:'Proyectos'},
    {n:`${avgPct}%`,l:'Avance promedio'},
    {n:Object.values(users||{}).filter(u=>u.role==='empleado').length,l:'Empleados'},
    {n:Object.values(reports||{}).filter(r=>new Date(r.date).toDateString()===today).length,l:'Reportes hoy'},
  ];

  return(
    <div className="fade-in">
      <div style={{marginBottom:'28px',paddingBottom:'24px',borderBottom:'1px solid #e4e4e0'}}>
        <h1 className="garamond" style={{fontSize:'38px',fontWeight:500,color:'#111'}}>Dashboard</h1>
        <p style={{fontSize:'13px',color:'#888',marginTop:'4px'}}>Visibilidad completa del equipo en tiempo real.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1px',background:'#e4e4e0',border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden',marginBottom:'24px'}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{background:'#fff',padding:'20px 24px'}}>
            <div className="garamond" style={{fontSize:'36px',fontWeight:500,color:'#111',marginBottom:'4px'}}>{k.n}</div>
            <div style={{fontSize:'12px',color:'#888'}}>{k.l}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 3fr',gap:'16px',marginBottom:'24px'}}>
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'20px',background:'#fff'}}>
          <div className="garamond" style={{fontSize:'18px',fontWeight:500,marginBottom:'4px'}}>Por estado</div>
          <div style={{fontSize:'12px',color:'#888',marginBottom:'16px'}}>Distribución de proyectos</div>
          <div style={{height:'180px'}}><canvas ref={cDonut}/></div>
        </div>
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'20px',background:'#fff'}}>
          <div className="garamond" style={{fontSize:'18px',fontWeight:500,marginBottom:'4px'}}>Avance por proyecto</div>
          <div style={{fontSize:'12px',color:'#888',marginBottom:'16px'}}>Verde = 100% completado</div>
          <div style={{height:Math.max(pa.length*28+20,80)}}><canvas ref={cBar}/></div>
        </div>
      </div>

      <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden'}}>
        <div style={{padding:'12px 20px',background:'#f4f4f2',borderBottom:'1px solid #e4e4e0'}}>
          <span style={{fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px'}}>Todos los proyectos</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:'1px solid #e4e4e0',background:'#fff'}}>
              {['Proyecto','Responsable','Estado','Avance','Tareas'].map(h=>(
                <th key={h} style={{padding:'10px 20px',textAlign:'left',fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pa.length===0&&<tr><td colSpan={5} style={{padding:'40px',textAlign:'center',fontSize:'13px',color:'#888'}}>Sin proyectos.</td></tr>}
            {pa.map(([pid,p],i)=>{
              const tasks=allTasks[pid]||{};
              const v=calcPct(tasks);
              const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
              return(
                <tr key={pid} style={{borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff'}}>
                  <td style={{padding:'12px 20px',fontWeight:500,color:'#111'}}>{p.name}</td>
                  <td style={{padding:'12px 20px',fontSize:'13px',color:'#888'}}>{p.ownerName}</td>
                  <td style={{padding:'12px 20px'}}><Tag s={p.status}/></td>
                  <td style={{padding:'12px 20px'}}>
                    <div style={{width:'80px',marginBottom:'3px'}}><Bar v={v}/></div>
                    <span style={{fontSize:'11px',color:'#888',fontFamily:'monospace'}}>{v}%</span>
                  </td>
                  <td style={{padding:'12px 20px',fontSize:'12px',color:'#888',fontFamily:'monospace'}}>{done}/{Object.keys(tasks).length}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ── USERS ── */
const Users=({users,onDelete})=>{
  const all=[ADMIN,...Object.values(users)];
  const rl={admin:'Admin',gerencia:'Gerencia',empleado:'Empleado'};
  return(
    <div className="fade-in">
      <div style={{marginBottom:'28px',paddingBottom:'24px',borderBottom:'1px solid #e4e4e0'}}>
        <h1 className="garamond" style={{fontSize:'38px',fontWeight:500,color:'#111'}}>Usuarios</h1>
        <p style={{fontSize:'13px',color:'#888',marginTop:'4px'}}>{all.length} usuario{all.length!==1?'s':''} registrados</p>
      </div>
      <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden'}}>
        {all.map((u,i)=>(
          <div key={u.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 20px',borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff'}}>
            <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#f4f4f2',border:'1px solid #e4e4e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:600,color:'#888',flexShrink:0}}>
              {u.name[0].toUpperCase()}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,color:'#111',fontSize:'14px'}}>{u.name}</div>
              <div style={{fontSize:'11px',color:'#bbb'}}>{u.company||'Inverfin'}</div>
            </div>
            <span style={{fontSize:'11px',color:'#888',border:'1px solid #e4e4e0',borderRadius:'6px',padding:'3px 10px'}}>{rl[u.role]||u.role}</span>
            {u.id!=='admin'&&<button onClick={()=>confirm('¿Eliminar usuario?')&&window.DB.setUser(u.id,null)} style={{fontSize:'16px',color:'#bbb',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>×</button>}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   APP
══════════════════════════════════ */
const App=()=>{
  const[ready,   setReady]   =useState(false);
  const[splash,  setSplash]  =useState(true);
  const[user,    setUser]    =useState(null);
  const[tab,     setTab]     =useState('dashboard');
  const[openProj,setOpenProj]=useState(null);
  const[projects,setProjects]=useState({});
  const[allTasks,setAllTasks]=useState({});
  const[reports, setReports] =useState({});
  const[users,   setUsers]   =useState({});
  const[synced,  setSynced]  =useState(false);
  const[notifs,  setNotifs]  =useState(0);
  const[showNotif,setShowNotif]=useState(false);

  useEffect(()=>{
    const h=()=>{setReady(true);setSynced(true);setTimeout(()=>setSplash(false),1000)};
    window.addEventListener('firebase-ready',h);
    setTimeout(()=>{setSplash(false)},4000);
    return()=>window.removeEventListener('firebase-ready',h);
  },[]);

  useEffect(()=>{
    if(!ready||!user)return;
    const subs=[];
    subs.push(window.DB.onProjects(d=>setProjects(d||{})));
    subs.push(window.DB.onReports(d=>{const rd=d||{};setReports(rd);setNotifs(Object.values(rd).filter(r=>r.userId!==user.id).length);}));
    subs.push(window.DB.onUsers(d=>setUsers(d||{})));
    const loadT=()=>window.DB.snapTasks().then(d=>setAllTasks(d||{}));
    loadT();
    const iv=setInterval(loadT,8000);
    return()=>{subs.forEach(u=>u());clearInterval(iv)};
  },[ready,user]);

  const isAdmin=user?.role==='admin'||user?.role==='gerencia';

  const TABS=user?[
    ...(!isAdmin?[{id:'dashboard',label:'Inicio',icon:'⌂'}]:[]),
    {id:'projects',label:'Proyectos',icon:'▤'},
    ...(!isAdmin?[{id:'team',label:'Equipo',icon:'◎'}]:[]),
    {id:'reports',label:'Reportes',icon:'✎'},
    ...(isAdmin?[{id:'overview',label:'Dashboard',icon:'◈'},{id:'users',label:'Usuarios',icon:'◉'}]:[]),
  ]:[];

  const goTab=t=>{setTab(t);setOpenProj(null)};

  const login=u=>{setUser(u);setTab((u.role==='admin'||u.role==='gerencia')?'overview':'dashboard')};
  const logout=()=>{setUser(null);setTab('dashboard');setOpenProj(null)};

  if(splash)return <Splash/>;
  if(!user)return <Auth onLogin={login}/>;

  const activeTab=openProj?'projects':tab;

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'row',background:'#fff'}}>
      {/* Sidebar desktop */}
      <div className="hidden md:block">
        <Sidebar user={user} tab={activeTab} setTab={goTab} tabs={TABS} synced={synced} notifs={notifs} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>
      </div>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* Mobile header */}
        <div className="md:hidden">
          <MobileHeader user={user} tab={activeTab} tabs={TABS} setTab={goTab} notifs={notifs} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>
        </div>

        {/* Content — simple div scroll, NOT overflow:hidden */}
        <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          <div style={{maxWidth:'960px',margin:'0 auto',padding:'32px 32px 80px'}}>
            {tab==='projects'&&<Projects user={user} projects={projects} allTasks={allTasks} openProj={openProj} setOpenProj={setOpenProj}/>}
            {tab==='dashboard'&&!isAdmin&&<Dashboard user={user} projects={projects} allTasks={allTasks} reports={reports} onGo={(t,pid,p)=>{if(pid){setOpenProj({id:pid,data:p});setTab('projects')}else goTab(t)}}/>}
            {tab==='team'&&!isAdmin&&<Team user={user} projects={projects} allTasks={allTasks}/>}
            {tab==='reports'&&<Reports user={user} projects={projects} reports={reports}/>}
            {tab==='overview'&&isAdmin&&<Overview user={user} projects={projects} allTasks={allTasks} reports={reports} users={users}/>}
            {tab==='users'&&isAdmin&&<Users users={users}/>}
          </div>
        </div>

        {/* Footer */}
        <div className="hidden md:flex" style={{alignItems:'center',justifyContent:'space-between',padding:'12px 32px',borderTop:'1px solid #e4e4e0',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <img src={LOGO} style={{width:'18px',height:'18px',borderRadius:'4px',opacity:.4}} alt=""/>
            <span className="garamond" style={{fontSize:'13px',color:'#888'}}>InverWork <span style={{color:'#ccc'}}>· Inverfin Holding</span></span>
          </div>
          <span style={{fontSize:'11px',color:'#ccc',fontStyle:'italic'}}>Owned by Jesús Santiago · © 2025</span>
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="md:hidden" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:200,background:'#fff',borderTop:'1px solid #e4e4e0',display:'flex'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>goTab(t.id)}
            style={{flex:1,padding:'10px 4px',fontSize:'10px',fontWeight:500,border:'none',borderTop:`2px solid ${activeTab===t.id?'#111':'transparent'}`,color:activeTab===t.id?'#111':'#bbb',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',textTransform:'uppercase',letterSpacing:'0.5px'}}>
            <span style={{fontSize:'16px'}}>{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>

      {/* Notif panel */}
      {showNotif&&createPortal(
        <div style={{position:'fixed',inset:0,zIndex:9998}} onClick={()=>setShowNotif(false)}>
          <div style={{position:'absolute',top:'60px',right:'16px',width:'280px',background:'#fff',border:'1px solid #e4e4e0',borderRadius:'12px',boxShadow:'0 8px 32px rgba(0,0,0,0.12)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'14px 16px',borderBottom:'1px solid #e4e4e0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span className="garamond" style={{fontSize:'16px',fontWeight:500}}>Notificaciones</span>
              <button onClick={()=>setShowNotif(false)} style={{fontSize:'18px',color:'#888',background:'none',border:'none',cursor:'pointer'}}>×</button>
            </div>
            <div style={{maxHeight:'280px',overflowY:'auto'}}>
              {Object.values(reports).length===0&&<div style={{padding:'32px',textAlign:'center',fontSize:'13px',color:'#888'}}>Sin notificaciones.</div>}
              {Object.values(reports).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,12).map((r,i)=>(
                <div key={i} style={{padding:'10px 16px',borderTop:i>0?'1px solid #e4e4e0':'none'}}>
                  <p style={{fontSize:'12px',color:'#111'}}><span style={{fontWeight:500}}>{r.userName}</span> envió un reporte</p>
                  <p style={{fontSize:'11px',color:'#bbb',marginTop:'2px'}}>{fmtD(r.date)}{r.projectName?' · '+r.projectName:''}</p>
                </div>
              ))}
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
