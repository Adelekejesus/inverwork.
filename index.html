*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:#ffffff;color:#111111;-webkit-font-smoothing:antialiased;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d0d0cc;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#aaaaaa}
.garamond{font-family:'EB Garamond','Georgia',serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
@keyframes spinLoad{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease both}
.fade-scale{animation:fadeScale .2s ease both}
.spin{animation:spinLoad .8s linear infinite}
input,textarea,select{font-family:'Inter',system-ui,sans-serif}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Progress bar shimmer */
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.pbar-inner{position:relative;overflow:hidden}
.pbar-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2.5s ease infinite}

const{useState,useEffect,useRef}=React;

// ── UTILS ──
const now=()=>new Date().toISOString();
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtDate=d=>d?new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtTime=d=>d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'';
const calcPct=tasks=>{const a=Object.values(tasks||{});return a.length?Math.round(a.filter(t=>t.status==='Completado').length/a.length*100):0};

const ADMIN={id:'admin',name:'Administrador',role:'admin',pin:'0000',company:'Inverfin'};
const GER_CODE='inverfin2025';

// Status config — monochrome first, accent only for done
const ST={
  'Pendiente':   {dot:'bg-ink-faint',   tx:'text-ink-muted',  bg:'bg-paper-soft border-paper-border'},
  'En progreso': {dot:'bg-ink-light',   tx:'text-ink-light',  bg:'bg-paper-soft border-paper-border'},
  'Completado':  {dot:'bg-accent',      tx:'text-accent-dark',bg:'bg-accent-light border-accent/20'},
  'Activo':      {dot:'bg-ink-light',   tx:'text-ink-light',  bg:'bg-paper-soft border-paper-border'},
  'Pausado':     {dot:'bg-ink-faint',   tx:'text-ink-muted',  bg:'bg-paper-soft border-paper-border'},
  'Finalizado':  {dot:'bg-accent',      tx:'text-accent-dark',bg:'bg-accent-light border-accent/20'},
  'Bloqueado':   {dot:'bg-red-400',     tx:'text-red-600',    bg:'bg-red-50 border-red-100'},
};

// ── DESIGN ATOMS ──

const Tag=({s})=>{
  const c=ST[s]||ST['Pendiente'];
  return(
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-sm text-xs font-medium border ${c.bg} ${c.tx}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot} flex-shrink-0`}/>
      {s}
    </span>
  );
};

const PBar=({pct})=>(
  <div className="w-full h-0.5 bg-paper-border rounded-full overflow-hidden">
    <div className="pbar-inner h-full bg-ink rounded-full transition-all duration-700" style={{width:`${Math.min(pct,100)}%`,background: pct===100?'#2a7a4b':'#111111'}}/>
  </div>
);

const Field=({label,children})=>(
  <div className="mb-5">
    <label className="block text-xs font-medium text-ink-muted uppercase tracking-widest mb-2">{label}</label>
    {children}
  </div>
);

const inp="w-full px-3 py-2.5 bg-white border border-paper-border rounded text-sm text-ink outline-none focus:border-ink transition-colors placeholder:text-ink-faint";
const Inp=({label,...p})=>label?<Field label={label}><input className={inp} {...p}/></Field>:<input className={inp} {...p}/>;
const TA=({label,...p})=>label?<Field label={label}><textarea className={`${inp} resize-none`} rows={3} {...p}/></Field>:<textarea className={`${inp} resize-none`} rows={3} {...p}/>;
const Sel=({label,opts,...p})=>label?(
  <Field label={label}>
    <select className={`${inp} appearance-none cursor-pointer`} {...p}>
      {opts.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </Field>
):<select className={`${inp} appearance-none cursor-pointer`} {...p}>{p.opts?.map(o=><option key={o} value={o}>{o}</option>)}</select>;

const Btn=({children,v='primary',sm,className='',disabled,...p})=>{
  const base=`inline-flex items-center justify-center font-medium transition-all duration-150 rounded disabled:opacity-40 disabled:cursor-not-allowed ${sm?'px-3 py-1.5 text-xs':'px-4 py-2.5 text-sm'}`;
  const vs={
    primary:`${base} bg-ink text-white hover:bg-ink-light`,
    ghost:`${base} bg-white border border-paper-border text-ink-light hover:border-ink hover:text-ink`,
    accent:`${base} bg-accent text-white hover:bg-accent-dark`,
    danger:`${base} bg-white border border-paper-border text-ink-muted hover:border-red-300 hover:text-red-600`,
  };
  return<button className={`${vs[v]||vs.primary} ${className}`} disabled={disabled} {...p}>{children}</button>;
};

const Divider=()=><div className="h-px bg-paper-border my-1"/>;

const Modal=({title,sub,onClose,children,wide=false})=>(
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/30" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className={`bg-white border border-paper-border rounded-lg shadow-2xl shadow-black/10 w-full ${wide?'max-w-2xl':'max-w-md'} max-h-[90vh] overflow-y-auto fade-scale`}>
      <div className="flex items-start justify-between px-6 py-5 border-b border-paper-border">
        <div>
          <h2 className="garamond text-xl font-medium text-ink">{title}</h2>
          {sub&&<p className="text-xs text-ink-muted mt-0.5">{sub}</p>}
        </div>
        <button onClick={onClose} className="text-ink-faint hover:text-ink transition-colors text-lg leading-none mt-0.5">×</button>
      </div>
      <div className="px-6 py-5">{children}</div>
    </div>
  </div>
);

// ── AUTH ──
const Auth=({onLogin})=>{
  const[mode,setMode]=useState('login');
  const[f,sf]=useState({name:'',pin:'',role:'empleado',code:''});
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const upd=k=>e=>sf(p=>({...p,[k]:e.target.value}));

  const doLogin=async()=>{
    if(!f.name||!f.pin){setErr('Completa todos los campos');return}
    setBusy(true);setErr('');
    if(f.name.toLowerCase()==='admin'&&f.pin==='0000'){onLogin(ADMIN);return}
    const users=await window.DB.getUsers();
    const found=Object.values(users).find(u=>u.name.toLowerCase()===f.name.toLowerCase()&&u.pin===f.pin);
    if(!found){setErr('Nombre o PIN incorrecto');setBusy(false);return}
    onLogin(found);
  };

  const doReg=async()=>{
    if(!f.name||f.pin.length!==4){setErr('Nombre y PIN de 4 dígitos requeridos');return}
    if(f.role==='gerencia'&&f.code!==GER_CODE){setErr('Código de gerencia incorrecto');return}
    setBusy(true);setErr('');
    const users=await window.DB.getUsers();
    if(Object.values(users).find(u=>u.name.toLowerCase()===f.name.toLowerCase())){setErr('Ya existe ese nombre de usuario');setBusy(false);return}
    const id=uid();
    const nu={id,name:f.name,pin:f.pin,role:f.role,company:'Inverfin',createdAt:now()};
    await window.DB.setUser(id,nu);
    onLogin(nu);
  };

  return(
    <div className="min-h-screen bg-paper-warm flex">
      {/* Left panel */}
      <div className="hidden lg:flex flex-col justify-between w-80 xl:w-96 bg-ink p-12 flex-shrink-0">
        <div>
          <img src={LOGO} className="w-10 h-10 rounded-lg mb-12 opacity-90" alt="Inverfin"/>
          <h2 className="garamond text-white text-3xl font-medium leading-snug mb-4">Gestión de proyectos para Inverfin Holding</h2>
          <p className="text-ink-faint text-sm leading-relaxed">Centraliza el trabajo diario de tu equipo. Proyectos, tareas, tiempo y reportes — todo en un solo lugar.</p>
        </div>
        <div>
          <p className="text-ink-faint text-xs">© 2025 Inverfin Holding</p>
          <p className="text-ink-faint/50 text-xs mt-1">Owned by Jesús Santiago</p>
        </div>
      </div>

      {/* Right panel */}
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="w-full max-w-sm fade-in">
          {/* Mobile logo */}
          <div className="lg:hidden flex items-center gap-3 mb-10">
            <img src={LOGO} className="w-9 h-9 rounded-lg" alt="Inverfin"/>
            <div>
              <div className="garamond text-xl font-medium text-ink">InverWork</div>
              <div className="text-[10px] text-ink-muted tracking-widest uppercase">Inverfin Holding</div>
            </div>
          </div>

          <h1 className="garamond text-2xl font-medium text-ink mb-1">{mode==='login'?'Iniciar sesión':'Crear cuenta'}</h1>
          <p className="text-sm text-ink-muted mb-8">{mode==='login'?'Accede con tu nombre y PIN.':'Regístrate para empezar.'}</p>

          {mode==='login'?(
            <>
              <Inp label="Nombre" placeholder="Tu nombre completo" value={f.name} onChange={upd('name')}/>
              <Inp label="PIN" type="password" maxLength={4} inputMode="numeric" placeholder="4 dígitos" value={f.pin} onChange={upd('pin')} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
              {err&&<p className="text-red-500 text-xs mb-4">{err}</p>}
              <Btn className="w-full mb-5" onClick={doLogin} disabled={busy}>{busy?'Verificando…':'Entrar'}</Btn>
              <p className="text-sm text-ink-muted text-center">¿Sin cuenta? <span className="text-ink underline cursor-pointer hover:no-underline" onClick={()=>{setMode('reg');setErr('')}}>Regístrate</span></p>
            </>
          ):(
            <>
              <Inp label="Nombre completo" placeholder="Ej. María González" value={f.name} onChange={upd('name')}/>
              <Inp label="PIN (4 dígitos)" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={f.pin} onChange={upd('pin')}/>
              <Field label="Rol en Inverfin">
                <div className="grid grid-cols-2 gap-2">
                  {['empleado','gerencia'].map(r=>(
                    <button key={r} onClick={()=>sf(p=>({...p,role:r}))}
                      className={`py-3 border rounded text-sm font-medium transition-all capitalize ${f.role===r?'border-ink bg-ink text-white':'border-paper-border text-ink-muted hover:border-ink-faint'}`}>
                      {r}
                    </button>
                  ))}
                </div>
              </Field>
              {f.role==='gerencia'&&<Inp label="Código de gerencia" placeholder="Código confidencial" value={f.code} onChange={upd('code')}/>}
              {err&&<p className="text-red-500 text-xs mb-4">{err}</p>}
              <Btn className="w-full mb-5" onClick={doReg} disabled={busy}>{busy?'Registrando…':'Crear cuenta'}</Btn>
              <p className="text-sm text-ink-muted text-center">¿Ya tienes cuenta? <span className="text-ink underline cursor-pointer hover:no-underline" onClick={()=>{setMode('login');setErr('')}}>Entrar</span></p>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

const Dashboard=({user,projects,allTasks,reports})=>{
  const isAdmin=user.role==='admin'||user.role==='gerencia';
  const myP=isAdmin?Object.entries(projects):Object.entries(projects).filter(([,p])=>p.ownerId===user.id);
  const today=new Date().toDateString();
  const myReps=Object.values(reports||{}).filter(r=>r.userId===user.id);
  const todayH=myReps.filter(r=>new Date(r.date).toDateString()===today).reduce((a,r)=>a+(Number(r.hoursWorked)||0),0);
  const myT=Object.entries(allTasks).filter(([pid])=>myP.find(([p])=>p===pid)).flatMap(([,pt])=>Object.values(pt||{}));
  const done=myT.filter(t=>t.status==='Completado').length;
  const active=myP.filter(([,p])=>p.status==='Activo'||p.status==='En progreso').length;

  return(
    <div className="fade-in">
      {/* Header */}
      <div className="mb-10 pb-8 border-b border-paper-border">
        <p className="text-xs text-ink-muted tracking-widest uppercase mb-3">{new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
        <h1 className="garamond text-4xl font-medium text-ink">Bienvenido, {user.name}</h1>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-px bg-paper-border border border-paper-border rounded-lg overflow-hidden mb-10">
        {[
          {n:active,l:'Proyectos activos'},
          {n:myT.filter(t=>t.status==='Pendiente').length,l:'Tareas pendientes'},
          {n:done,l:'Tareas completadas'},
          {n:`${todayH}h`,l:'Horas hoy'},
        ].map((s,i)=>(
          <div key={i} className="bg-white px-6 py-5">
            <div className="garamond text-3xl font-medium text-ink mb-1.5">{s.n}</div>
            <div className="text-xs text-ink-muted">{s.l}</div>
          </div>
        ))}
      </div>

      {/* Projects */}
      <div>
        <div className="flex items-center justify-between mb-5">
          <h2 className="garamond text-xl font-medium text-ink">Proyectos recientes</h2>
          <span className="text-xs text-ink-muted">{myP.length} total</span>
        </div>
        {myP.length===0?(
          <p className="text-sm text-ink-muted py-8 text-center border border-paper-border rounded-lg">Sin proyectos aún.</p>
        ):(
          <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
            {myP.slice(0,8).map(([pid,p])=>{
              const pct=calcPct(allTasks[pid]||{});
              return(
                <div key={pid} className="flex items-center gap-6 px-5 py-4 bg-white hover:bg-paper-warm transition-colors">
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-ink text-sm truncate mb-2">{p.name}</div>
                    <PBar pct={pct}/>
                  </div>
                  <div className="text-right flex-shrink-0 flex items-center gap-4">
                    <span className="text-xs text-ink-muted font-mono">{pct}%</span>
                    <Tag s={p.status}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

// ── PROJECT DETAIL ──
const ProjectDetail=({user,pid,project,onBack})=>{
  const[tasks,setTasks]=useState({});
  const[costs,setCosts]=useState({});
  const[pane,setPane]=useState('tasks');
  const[showTask,setShowTask]=useState(false);
  const[showCost,setShowCost]=useState(false);
  const[tf,stf]=useState({name:'',description:'',status:'Pendiente',timeEstimated:''});
  const[cf,scf]=useState({description:'',amount:'',date:''});
  const[timers,setTimers]=useState({});
  const ut=k=>e=>stf(p=>({...p,[k]:e.target.value}));
  const uc=k=>e=>scf(p=>({...p,[k]:e.target.value}));
  const canEdit=project.ownerId===user.id;
  const pct=calcPct(tasks);
  const ta=Object.entries(tasks);
  const totalCost=Object.values(costs).reduce((a,c)=>a+(Number(c.amount)||0),0);

  useEffect(()=>{
    const u1=window.DB.onTasks(pid,setTasks);
    const u2=window.DB.onCosts(pid,setCosts);
    return()=>{u1();u2()};
  },[pid]);

  const saveTask=async()=>{
    if(!tf.name)return;
    await window.DB.addTask(pid,{...tf,assignedTo:user.id,assignedName:user.name,timeSpent:0,createdAt:now()});
    setShowTask(false);stf({name:'',description:'',status:'Pendiente',timeEstimated:''});
  };

  const changeStatus=async(tid,status)=>{
    await window.DB.updTask(pid,tid,{status});
    const upd={...tasks,[tid]:{...tasks[tid],status}};
    await window.DB.updProject(pid,{progress:calcPct(upd)});
  };

  const startTimer=tid=>setTimers(p=>({...p,[tid]:{start:Date.now(),running:true}}));
  const stopTimer=async tid=>{
    const t=timers[tid];if(!t?.running)return;
    const mins=Math.round((Date.now()-t.start)/60000);
    await window.DB.addTimeLog(tid,{userId:user.id,userName:user.name,duration:mins,createdAt:now()});
    const prev=tasks[tid]?.timeSpent||0;
    await window.DB.updTask(pid,tid,{timeSpent:prev+mins});
    setTimers(p=>({...p,[tid]:{running:false}}));
  };

  const addCost=async()=>{
    if(!cf.description||!cf.amount)return;
    await window.DB.addCost(pid,{...cf,createdAt:now()});
    setShowCost(false);scf({description:'',amount:'',date:''});
  };

  return(
    <div className="fade-in">
      {/* Breadcrumb + header */}
      <div className="mb-8 pb-6 border-b border-paper-border">
        <button onClick={onBack} className="text-xs text-ink-muted hover:text-ink transition-colors mb-4 flex items-center gap-1.5">
          <span>←</span> Proyectos
        </button>
        <div className="flex items-start justify-between gap-4">
          <div>
            <h1 className="garamond text-4xl font-medium text-ink">{project.name}</h1>
            {project.description&&<p className="text-sm text-ink-muted mt-1.5">{project.description}</p>}
            <div className="flex items-center gap-4 mt-3">
              <Tag s={project.status}/>
              <span className="text-xs text-ink-muted">{pct}% completado</span>
              <span className="text-xs text-ink-muted">{ta.length} tareas</span>
            </div>
          </div>
        </div>
        {/* Progress */}
        <div className="mt-5">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs text-ink-muted">Progreso automático según tareas</span>
            <span className="text-xs font-mono text-ink">{pct}%</span>
          </div>
          <PBar pct={pct}/>
        </div>
      </div>

      {/* Stats row */}
      <div className="grid grid-cols-3 gap-px bg-paper-border border border-paper-border rounded-lg overflow-hidden mb-8">
        {[['Pendiente','📋'],['En progreso','⚡'],['Completado','✓']].map(([s,i])=>(
          <div key={s} className="bg-white px-5 py-4 text-center">
            <div className="garamond text-3xl font-medium text-ink mb-1">{Object.values(tasks).filter(t=>t.status===s).length}</div>
            <div className="text-xs text-ink-muted">{s}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div className="flex gap-0 border-b border-paper-border mb-6">
        {[['tasks','Tareas'],['costs','Costes']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setPane(id)}
            className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-all ${pane===id?'border-ink text-ink':'border-transparent text-ink-muted hover:text-ink'}`}>
            {lbl}
          </button>
        ))}
        <div className="ml-auto mb-1 flex gap-2">
          {pane==='tasks'&&canEdit&&<Btn sm onClick={()=>setShowTask(true)}>+ Tarea</Btn>}
          {pane==='costs'&&canEdit&&<Btn sm onClick={()=>setShowCost(true)}>+ Coste</Btn>}
        </div>
      </div>

      {pane==='tasks'&&(
        ta.length===0?(
          <div className="text-center py-16 border border-paper-border rounded-lg">
            <p className="garamond text-xl text-ink-muted mb-1">Sin tareas</p>
            <p className="text-xs text-ink-muted">{canEdit?'Añade la primera tarea.':'No hay tareas en este proyecto.'}</p>
          </div>
        ):(
          <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
            {ta.map(([tid,t])=>(
              <div key={tid} className="bg-white px-5 py-4 hover:bg-paper-warm transition-colors">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-ink text-sm">{t.name}</div>
                    {t.description&&<p className="text-xs text-ink-muted mt-0.5">{t.description}</p>}
                    <div className="flex items-center gap-4 mt-2 text-xs text-ink-muted">
                      <span>Est. {t.timeEstimated||0}h</span>
                      <span>Real {Math.round((t.timeSpent||0)/60*10)/10}h</span>
                      {t.assignedName&&<span>{t.assignedName}</span>}
                      {timers[tid]?.running&&<span className="text-accent font-medium">● Cronómetro</span>}
                    </div>
                  </div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <Tag s={t.status}/>
                  </div>
                </div>
                {canEdit&&(
                  <div className="flex items-center gap-2 mt-3 pt-3 border-t border-paper-border">
                    <div className="flex gap-1.5">
                      {['Pendiente','En progreso','Completado'].map(s=>(
                        <button key={s} onClick={()=>changeStatus(tid,s)}
                          className={`px-2.5 py-1 rounded text-xs font-medium transition-all border ${t.status===s?'bg-ink border-ink text-white':'border-paper-border text-ink-muted hover:border-ink-faint hover:text-ink'}`}>
                          {s}
                        </button>
                      ))}
                    </div>
                    <div className="ml-auto flex gap-1.5">
                      {timers[tid]?.running
                        ?<Btn v="danger" sm onClick={()=>stopTimer(tid)}>⏹ Stop</Btn>
                        :<Btn v="ghost" sm onClick={()=>startTimer(tid)}>▶ Timer</Btn>
                      }
                      <Btn v="danger" sm onClick={()=>confirm('¿Eliminar?')&&window.DB.delTask(pid,tid)}>×</Btn>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )
      )}

      {pane==='costs'&&(
        <div>
          <div className="flex items-center justify-between mb-4">
            <span className="garamond text-2xl font-medium text-ink">Total: <span className="text-accent">${totalCost.toFixed(2)}</span></span>
          </div>
          {Object.keys(costs).length===0?(
            <div className="text-center py-16 border border-paper-border rounded-lg">
              <p className="garamond text-xl text-ink-muted mb-1">Sin costes</p>
              <p className="text-xs text-ink-muted">{canEdit?'Registra costes externos de este proyecto.':'No hay costes registrados.'}</p>
            </div>
          ):(
            <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
              {Object.entries(costs).map(([cid,c])=>(
                <div key={cid} className="bg-white flex items-center justify-between px-5 py-4 hover:bg-paper-warm transition-colors">
                  <div>
                    <div className="font-medium text-ink text-sm">{c.description}</div>
                    <div className="text-xs text-ink-muted mt-0.5">{fmtDate(c.date)}</div>
                  </div>
                  <div className="flex items-center gap-4">
                    <span className="garamond text-xl font-medium text-ink">${Number(c.amount).toFixed(2)}</span>
                    {canEdit&&<button onClick={()=>window.DB.delCost(pid,cid)} className="text-ink-faint hover:text-red-500 transition-colors text-sm">×</button>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {showTask&&(
        <Modal title="Nueva tarea" onClose={()=>setShowTask(false)}>
          <Inp label="Nombre" value={tf.name} onChange={ut('name')} placeholder="Nombre de la tarea"/>
          <TA label="Descripción" value={tf.description} onChange={ut('description')} placeholder="Descripción opcional"/>
          <div className="grid grid-cols-2 gap-4">
            <Inp label="Tiempo estimado (h)" type="number" value={tf.timeEstimated} onChange={ut('timeEstimated')} placeholder="0"/>
            <Sel label="Estado" value={tf.status} onChange={ut('status')} opts={['Pendiente','En progreso','Completado']}/>
          </div>
          <div className="flex gap-3 pt-2">
            <Btn v="ghost" className="flex-1" onClick={()=>setShowTask(false)}>Cancelar</Btn>
            <Btn className="flex-1" onClick={saveTask}>Guardar</Btn>
          </div>
        </Modal>
      )}

      {showCost&&(
        <Modal title="Añadir coste externo" onClose={()=>setShowCost(false)}>
          <TA label="Concepto" value={cf.description} onChange={uc('description')} placeholder="Ej. Consultor Stripe, dominio, freelancer…"/>
          <div className="grid grid-cols-2 gap-4">
            <Inp label="Importe ($)" type="number" value={cf.amount} onChange={uc('amount')} placeholder="0.00"/>
            <Inp label="Fecha" type="date" value={cf.date} onChange={uc('date')}/>
          </div>
          <div className="flex gap-3 pt-2">
            <Btn v="ghost" className="flex-1" onClick={()=>setShowCost(false)}>Cancelar</Btn>
            <Btn className="flex-1" onClick={addCost}>Añadir</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};


// ── REPORTS ──
const Reports=({user,projects,reports})=>{
  const[show,setShow]=useState(false);
  const[sel,setSel]=useState(null);
  const[f,sf]=useState({projectId:'',tasks:'',hoursWorked:'',problems:'',notes:'',date:new Date().toISOString().slice(0,10)});
  const[comment,setComment]=useState('');
  const[comments,setComments]=useState({});
  const upd=k=>e=>sf(p=>({...p,[k]:e.target.value}));
  const isAdmin=user.role==='admin'||user.role==='gerencia';
  const list=isAdmin?Object.entries(reports):Object.entries(reports).filter(([,r])=>r.userId===user.id);
  list.sort((a,b)=>new Date(b[1].createdAt||0)-new Date(a[1].createdAt||0));

  useEffect(()=>{
    if(!sel)return;
    return window.DB.onComments(sel[0],d=>setComments(d||{}));
  },[sel]);

  const create=async()=>{
    if(!f.date)return;
    await window.DB.addReport({...f,userId:user.id,userName:user.name,projectName:projects[f.projectId]?.name||'',createdAt:now()});
    setShow(false);sf({projectId:'',tasks:'',hoursWorked:'',problems:'',notes:'',date:new Date().toISOString().slice(0,10)});
  };

  const sendComment=async()=>{
    if(!comment.trim()||!sel)return;
    await window.DB.addComment(sel[0],{userId:user.id,userName:user.name,text:comment,createdAt:now()});
    setComment('');
  };

  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-8 pb-6 border-b border-paper-border">
        <div>
          <h1 className="garamond text-4xl font-medium text-ink">Reportes diarios</h1>
          <p className="text-sm text-ink-muted mt-1">{list.length} reporte{list.length!==1?'s':''}</p>
        </div>
        {!isAdmin&&<Btn onClick={()=>setShow(true)}>Nuevo reporte</Btn>}
      </div>

      {list.length===0?(
        <div className="text-center py-20 border border-paper-border rounded-lg">
          <p className="garamond text-2xl text-ink-muted mb-2">Sin reportes</p>
          {!isAdmin&&<Btn onClick={()=>setShow(true)} className="mt-4">Crear primer reporte</Btn>}
        </div>
      ):(
        <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
          {list.map(([rid,r])=>(
            <div key={rid} className="bg-white px-5 py-4 hover:bg-paper-warm transition-colors cursor-pointer" onClick={()=>setSel([rid,r])}>
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-3 mb-1.5">
                    <span className="font-medium text-ink text-sm">{r.userName}</span>
                    <span className="text-xs text-ink-muted">{fmtDate(r.date)}</span>
                    {r.projectName&&<span className="text-xs text-ink-muted">· {r.projectName}</span>}
                  </div>
                  {r.tasks&&<p className="text-xs text-ink-muted line-clamp-2">{r.tasks}</p>}
                  {r.problems&&<p className="text-xs text-red-500 mt-1">⚠ {r.problems}</p>}
                </div>
                <div className="flex-shrink-0 text-right">
                  <div className="text-sm font-mono text-ink">{r.hoursWorked}h</div>
                  <div className="text-[10px] text-ink-faint mt-0.5">trabajadas</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Detail */}
      {sel&&(
        <Modal title={sel[1].userName} sub={fmtDate(sel[1].date)} onClose={()=>setSel(null)} wide>
          <div className="grid grid-cols-3 gap-px bg-paper-border border border-paper-border rounded-lg overflow-hidden mb-5">
            {[['Horas',`${sel[1].hoursWorked}h`],['Proyecto',sel[1].projectName||'—'],['Fecha',fmtDate(sel[1].date)]].map(([l,v])=>(
              <div key={l} className="bg-white px-4 py-3">
                <div className="text-[10px] text-ink-muted uppercase tracking-widest mb-1">{l}</div>
                <div className="text-sm font-medium text-ink">{v}</div>
              </div>
            ))}
          </div>
          {sel[1].tasks&&(
            <div className="mb-4">
              <div className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-2">Tareas realizadas</div>
              <p className="text-sm text-ink leading-relaxed border-l-2 border-paper-border pl-4">{sel[1].tasks}</p>
            </div>
          )}
          {sel[1].problems&&(
            <div className="mb-4 p-3 border border-red-100 rounded-lg bg-red-50">
              <div className="text-[10px] font-semibold text-red-400 uppercase tracking-widest mb-1.5">Problemas</div>
              <p className="text-sm text-red-700">{sel[1].problems}</p>
            </div>
          )}
          {sel[1].notes&&(
            <div className="mb-5 p-3 border border-paper-border rounded-lg bg-paper-soft">
              <div className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-1.5">Notas</div>
              <p className="text-sm text-ink">{sel[1].notes}</p>
            </div>
          )}
          <Divider/>
          <div className="mt-4">
            <div className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-3">Comentarios</div>
            <div className="space-y-2 mb-3 max-h-40 overflow-y-auto">
              {Object.values(comments).map((c,i)=>(
                <div key={i} className="flex gap-3">
                  <div className="w-6 h-6 rounded-full bg-paper-soft border border-paper-border flex items-center justify-center text-xs font-medium text-ink-muted flex-shrink-0 mt-0.5">{c.userName.charAt(0)}</div>
                  <div>
                    <div className="text-xs font-medium text-ink">{c.userName} <span className="text-ink-faint font-normal">{fmtTime(c.createdAt)}</span></div>
                    <div className="text-sm text-ink mt-0.5">{c.text}</div>
                  </div>
                </div>
              ))}
              {!Object.keys(comments).length&&<p className="text-xs text-ink-faint">Sin comentarios.</p>}
            </div>
            {isAdmin&&(
              <div className="flex gap-2 mt-3">
                <input className={`${inp} flex-1`} placeholder="Añadir comentario…" value={comment} onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendComment()}/>
                <Btn sm onClick={sendComment}>Enviar</Btn>
              </div>
            )}
          </div>
        </Modal>
      )}

      {show&&(
        <Modal title="Nuevo reporte diario" onClose={()=>setShow(false)} wide>
          <div className="grid grid-cols-2 gap-4">
            <Inp label="Fecha" type="date" value={f.date} onChange={upd('date')}/>
            <Field label="Proyecto">
              <select className={`${inp} appearance-none`} value={f.projectId} onChange={upd('projectId')}>
                <option value="">— Sin proyecto —</option>
                {Object.entries(projects).filter(([,p])=>p.ownerId===user.id).map(([pid,p])=>(
                  <option key={pid} value={pid}>{p.name}</option>
                ))}
              </select>
            </Field>
          </div>
          <Inp label="Horas trabajadas" type="number" value={f.hoursWorked} onChange={upd('hoursWorked')} placeholder="0"/>
          <TA label="Tareas realizadas" value={f.tasks} onChange={upd('tasks')} placeholder="Describe el trabajo del día…"/>
          <TA label="Problemas encontrados" value={f.problems} onChange={upd('problems')} placeholder="Errores, bloqueos, obstáculos…"/>
          <TA label="Notas / observaciones" value={f.notes} onChange={upd('notes')} placeholder="Ideas, aprendizajes, próximos pasos…"/>
          <div className="flex gap-3 pt-2">
            <Btn v="ghost" className="flex-1" onClick={()=>setShow(false)}>Cancelar</Btn>
            <Btn className="flex-1" onClick={create}>Enviar reporte</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

        <h1 className="garamond text-4xl font-medium text-ink">Equipo</h1>
        <p className="text-sm text-ink-muted mt-1">Proyectos de compañeros — vista general, sin detalles privados.</p>

        <p className="text-sm text-ink-muted py-12 text-center border border-paper-border rounded-lg">No hay proyectos de otros empleados aún.</p>
      ):(
        <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
          {others.map(([pid,p])=>{
            const pct=calcPct(allTasks[pid]||{});
            return(
              <div key={pid} className="bg-white flex items-center gap-6 px-5 py-4 hover:bg-paper-warm transition-colors">

};


// ── OVERVIEW (Admin/Gerencia) ──
const Overview=({user,projects,allTasks,reports,users})=>{
  const cDonut=useRef(null),cBar=useRef(null),iD=useRef(null),iB=useRef(null);
  const pa=Object.entries(projects);
  const avgPct=pa.length?Math.round(pa.reduce((a,[pid])=>a+calcPct(allTasks[pid]||{}),0)/pa.length):0;

  useEffect(()=>{
    if(!cDonut.current)return;
    if(iD.current)iD.current.destroy();
    const sts=['Activo','En progreso','Pausado','Finalizado','Bloqueado'];
    iD.current=new Chart(cDonut.current,{
      type:'doughnut',
      data:{labels:sts,datasets:[{data:sts.map(s=>pa.filter(([,p])=>p.status===s).length),
        backgroundColor:['#111111','#555555','#999999','#2a7a4b','#cc0000'],
        borderWidth:3,borderColor:'#ffffff',hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Inter'},padding:12,color:'#888888'}}},
        animation:{duration:600}}
    });
  },[projects]);

  useEffect(()=>{
    if(!cBar.current||!pa.length)return;
    if(iB.current)iB.current.destroy();
    const labels=pa.map(([,p])=>p.name.length>22?p.name.slice(0,22)+'…':p.name);
    const data=pa.map(([pid])=>calcPct(allTasks[pid]||{}));
    iB.current=new Chart(cBar.current,{
      type:'bar',
      data:{labels,datasets:[{data,backgroundColor:data.map(v=>v===100?'#2a7a4b':'#111111'),borderRadius:2,barThickness:16}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x}%`}}},
        scales:{
          x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10,family:'Inter'},color:'#bbbbbb'},grid:{color:'#f0f0ee'}},
          y:{grid:{display:false},ticks:{font:{size:10,family:'Inter'},color:'#888888'}}
        },
        animation:{duration:600}}
    });
  },[projects,allTasks]);

  const today=new Date().toDateString();
  const kpis=[
    {n:pa.length,l:'Proyectos'},
    {n:`${avgPct}%`,l:'Avance promedio'},
    {n:Object.values(users||{}).filter(u=>u.role==='empleado').length,l:'Empleados'},
    {n:Object.values(reports||{}).filter(r=>new Date(r.date).toDateString()===today).length,l:'Reportes hoy'},
  ];

  return(
    <div className="fade-in">
      <div className="mb-8 pb-6 border-b border-paper-border">
        <h1 className="garamond text-4xl font-medium text-ink">Dashboard</h1>
        <p className="text-sm text-ink-muted mt-1">Visibilidad completa del equipo en tiempo real.</p>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-px bg-paper-border border border-paper-border rounded-lg overflow-hidden mb-8">
        {kpis.map((k,i)=>(
          <div key={i} className="bg-white px-6 py-5">
            <div className="garamond text-3xl font-medium text-ink mb-1.5">{k.n}</div>
            <div className="text-xs text-ink-muted">{k.l}</div>
          </div>
        ))}
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-8">
        <div className="lg:col-span-2 border border-paper-border rounded-lg p-6 bg-white">
          <h3 className="garamond text-lg font-medium text-ink mb-1">Por estado</h3>
          <p className="text-xs text-ink-muted mb-5">Distribución de proyectos</p>
          <div style={{height:'200px'}}><canvas ref={cDonut}/></div>
        </div>
        <div className="lg:col-span-3 border border-paper-border rounded-lg p-6 bg-white">
          <h3 className="garamond text-lg font-medium text-ink mb-1">Avance por proyecto</h3>
          <p className="text-xs text-ink-muted mb-5">Verde = completado al 100%</p>
          <div style={{height:`${Math.max(pa.length*32+24,100)}px`}}><canvas ref={cBar}/></div>
        </div>
      </div>

      {/* Full table */}
      <div className="border border-paper-border rounded-lg overflow-hidden">
        <div className="px-5 py-3.5 bg-paper-soft border-b border-paper-border">
          <h2 className="text-xs font-semibold text-ink-muted uppercase tracking-widest">Todos los proyectos</h2>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead>
              <tr className="border-b border-paper-border bg-white">
                <th className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Proyecto</th>
                <th className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Responsable</th>
                <th className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Estado</th>
                <th className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Avance</th>
                <th className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Tareas</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-paper-border bg-white">
              {pa.map(([pid,p])=>{
                const tasks=allTasks[pid]||{};
                const pct=calcPct(tasks);
                const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
                return(
                  <tr key={pid} className="hover:bg-paper-warm transition-colors">
                    <td className="px-5 py-3.5 font-medium text-ink text-sm">{p.name}</td>
                    <td className="px-5 py-3.5 text-sm text-ink-muted">{p.ownerName}</td>
                    <td className="px-5 py-3.5"><Tag s={p.status}/></td>
                    <td className="px-5 py-3.5">
                      <div className="w-24 mb-1"><PBar pct={pct}/></div>
                      <div className="text-xs text-ink-muted font-mono">{pct}%</div>
                    </td>
                    <td className="px-5 py-3.5 text-xs text-ink-muted font-mono">{done}/{Object.keys(tasks).length}</td>
                  </tr>
                );
              })}
              {!pa.length&&<tr><td colSpan={5} className="px-5 py-12 text-center text-sm text-ink-muted">Sin proyectos registrados.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── USERS ──
const Users=({users})=>{
  const all=[ADMIN,...Object.values(users)];
  const roleLabel={admin:'Administrador',gerencia:'Gerencia',empleado:'Empleado'};
  return(
    <div className="fade-in">
      <div className="mb-8 pb-6 border-b border-paper-border">
        <h1 className="garamond text-4xl font-medium text-ink">Usuarios</h1>
        <p className="text-sm text-ink-muted mt-1">{all.length} usuario{all.length!==1?'s':''} registrados</p>
      </div>
      <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
        {all.map(u=>(
          <div key={u.id} className="bg-white flex items-center gap-4 px-5 py-4 hover:bg-paper-warm transition-colors">
            <div className="w-8 h-8 rounded-full bg-paper-soft border border-paper-border flex items-center justify-center text-xs font-medium text-ink-light flex-shrink-0">
              {u.name.charAt(0).toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-ink text-sm">{u.name}</div>
              <div className="text-xs text-ink-muted">{u.company||'Inverfin'}</div>
            </div>
            <span className="text-xs text-ink-muted border border-paper-border px-2.5 py-1 rounded">{roleLabel[u.role]||u.role}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── NOTIF PANEL ──
const NotifPanel=({reports,onClose})=>{
  const recent=Object.values(reports||{}).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,12);
  return(
    <div className="fixed inset-0 z-50 flex items-start justify-end p-4 pt-16 md:pt-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white border border-paper-border rounded-lg shadow-xl w-72 overflow-hidden fade-scale">
        <div className="px-4 py-3.5 border-b border-paper-border flex items-center justify-between">
          <span className="garamond text-base font-medium text-ink">Notificaciones</span>
          <button onClick={onClose} className="text-ink-faint hover:text-ink transition-colors">×</button>
        </div>
        <div className="max-h-80 overflow-y-auto divide-y divide-paper-border">
          {!recent.length&&<div className="px-4 py-8 text-center text-sm text-ink-muted">Sin notificaciones</div>}
          {recent.map((r,i)=>(
            <div key={i} className="px-4 py-3 hover:bg-paper-warm transition-colors">
              <div className="text-xs text-ink"><span className="font-medium">{r.userName}</span> envió un reporte</div>
              <div className="text-[10px] text-ink-faint mt-0.5">{fmtDate(r.date)}{r.projectName?` · ${r.projectName}`:''}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};


// ── MAIN APP ──
const App=()=>{
  const[fbReady,setFbReady]=useState(false);
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState('dashboard');
  const[projects,setProjects]=useState({});
  const[allTasks,setAllTasks]=useState({});
  const[reports,setReports]=useState({});
  const[users,setUsers]=useState({});
  const[synced,setSynced]=useState(false);
  const[openProj,setOpenProj]=useState(null);
  const[showNotif,setShowNotif]=useState(false);
  const[notifCnt,setNotifCnt]=useState(0);
  const[splashDone,setSplashDone]=useState(false);

  useEffect(()=>{
    const h=()=>{setFbReady(true);setSynced(true);setTimeout(()=>setSplashDone(true),1600)};
    window.addEventListener('firebase-ready',h);
    setTimeout(()=>setSplashDone(true),5000);
    return()=>window.removeEventListener('firebase-ready',h);
  },[]);

  useEffect(()=>{
    if(!fbReady||!user)return;
    const u1=window.DB.onProjects(setProjects);
    const u2=window.DB.onReports(d=>{setReports(d||{});setNotifCnt(Object.values(d||{}).filter(r=>r.userId!==user.id).length)});
    const u3=window.DB.onUsers(setUsers);
    const load=async()=>{const t=await window.DB.getAllTasks();setAllTasks(t||{})};
    load();const iv=setInterval(load,15000);
    return()=>{u1();u2();u3();clearInterval(iv)};
  },[fbReady,user]);

  const isAdmin=user?.role==='admin'||user?.role==='gerencia';

  const TABS=user?[
    ...(!isAdmin?[{id:'dashboard',label:'Inicio',icon:''}]:[]),
    {id:'projects',label:'Proyectos',icon:''},
    ...(!isAdmin?[{id:'team',label:'Equipo',icon:''}]:[]),
    {id:'reports',label:'Reportes',icon:''},
    ...(isAdmin?[{id:'overview',label:'Dashboard',icon:''},{id:'users',label:'Usuarios',icon:''}]:[]),
  ]:[];

  const login=u=>{setUser(u);setTab(u.role==='admin'||u.role==='gerencia'?'overview':'dashboard')};
  const logout=()=>{setUser(null);setTab('dashboard');setOpenProj(null)};
  const goTab=t=>{setTab(t);setOpenProj(null)};

  if(!splashDone)return<Splash/>;
  if(!user)return<Auth onLogin={login}/>;

  return(
    <div className="min-h-screen bg-white flex flex-col md:flex-row">
      {/* Desktop Sidebar */}
      <Sidebar user={user} tab={tab} setTab={goTab} tabs={TABS} synced={synced}
        notifCnt={notifCnt} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>

      {/* Main */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* Mobile header */}
        <MobileBar user={user} tab={tab} tabs={TABS} setTab={goTab}
          notifCnt={notifCnt} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>

        {/* Content */}
        <main className="flex-1 px-6 md:px-10 lg:px-14 py-8 md:py-12 max-w-5xl w-full pb-24 md:pb-12">
          {openProj?(
            <ProjectDetail user={user} pid={openProj.id} project={openProj.data} onBack={()=>setOpenProj(null)}/>
          ):(
            <>
              {tab==='dashboard'&&<Dashboard user={user} projects={projects} allTasks={allTasks} reports={reports}/>}
              {tab==='projects'&&<Projects user={user} projects={projects} allTasks={allTasks} onOpen={(pid,p)=>setOpenProj({id:pid,data:p})}/>}
              {tab==='team'&&<Team user={user} projects={projects} allTasks={allTasks}/>}
              {tab==='reports'&&<Reports user={user} projects={projects} reports={reports}/>}
              {tab==='overview'&&<Overview user={user} projects={projects} allTasks={allTasks} reports={reports} users={users}/>}
              {tab==='users'&&<Users users={users}/>}
            </>
          )}
        </main>

        {/* Footer */}
        <footer className="hidden md:block border-t border-paper-border px-10 lg:px-14 py-5">
          <div className="flex items-center justify-between text-xs text-ink-faint">
            <div className="flex items-center gap-3">
              <img src={LOGO} className="w-5 h-5 rounded opacity-60" alt=""/>
              <span className="garamond text-sm text-ink-muted">InverWork <span className="text-ink-faint font-normal">· Inverfin Holding</span></span>
            </div>
            <div className="flex items-center gap-6">
              <span>Owned by <span className="garamond italic text-ink-muted">Jesús Santiago</span></span>
              <span>© 2025</span>
            </div>
          </div>
        </footer>
      </div>

      {/* Mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t border-paper-border flex">
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>goTab(t.id)}
            className={`flex-1 py-3 text-[10px] font-medium uppercase tracking-wide transition-all border-t-2 ${tab===t.id?'border-ink text-ink':'border-transparent text-ink-faint hover:text-ink-muted'}`}>
            {t.label}
          </button>
        ))}
      </nav>

      {showNotif&&<NotifPanel reports={reports} onClose={()=>setShowNotif(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
