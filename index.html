══════════════════════════════════ */
const exportExcel = async (projects, allTasks, reports, users) => {
  const EX = window.ExcelJS;
  if (!EX) { alert('ExcelJS no cargado'); return; }
  const btn = document.querySelector('[data-export-btn]');
  if (btn) { btn.textContent = 'Generando...'; btn.disabled = true; }
  try {
    const costs = {};
    await Promise.all(Object.keys(projects).map(pid =>
      new Promise(res => { const u = window.FB.onCosts(pid, c => { u(); costs[pid]=c||{}; res(); }); })
    ));
    const wb = new EX.Workbook();
    wb.creator = 'InverWork — Inverfin Holding'; wb.created = new Date();
    const pa = Object.entries(projects);
    const today = new Date();
    const todayStr = today.toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
    const fmtD = d => d ? new Date(d).toLocaleDateString('es-ES') : '';
    const pct = (tsk) => { const a=Object.values(tsk||{}); return a.length?Math.round(a.filter(t=>t.status==='Completado').length/a.length*100):0; };
    const P = { sb:'1E2433',sb2:'2D3748',blue:'4F73F5',green:'2D8A58',green2:'10B981',amber:'D97706',purple:'6B4FA8',gold:'FFC000',ink:'1A1D23',muted:'6B7280',input:'0070C0',formula:'000000',even:'F7F8FA',odd:'FFFFFF',border:'D0D5DD' };
    const fill = hex => ({type:'pattern',pattern:'solid',fgColor:{argb:'FF'+hex}});
    const fnt = (bold=false,color='000000',size=9,italic=false) => ({name:'Arial',bold,color:{argb:'FF'+color},size,italic});
    const aln = (horizontal='left',wrapText=false) => ({horizontal,vertical:'middle',wrapText});
    const bdr = () => ({top:{style:'thin',color:{argb:'FFD0D5DD'}},bottom:{style:'thin',color:{argb:'FFD0D5DD'}},left:{style:'thin',color:{argb:'FFD0D5DD'}},right:{style:'thin',color:{argb:'FFD0D5DD'}}});
    const FCFA='#,##0 "FCFA"', HRS='#,##0.0 "h"', PCT='0%', PCT1='0.0%';
    const addHeaderRow = (ws,headers,bg,rowH=20) => {
      const row=ws.addRow(headers); row.height=rowH;
      headers.forEach((_,i)=>{ const c=row.getCell(i+1); c.font=fnt(true,'FFFFFF',9); c.fill=fill(bg); c.alignment=aln('center'); c.border=bdr(); });
      return row;
    };
    /* HOJA 1 — RESUMEN */
    const ws1=wb.addWorksheet('Resumen Ejecutivo',{properties:{tabColor:{argb:'FF4F73F5'}}});
    ws1.views=[{showGridLines:false}];
    const tot_costs=pa.reduce((s,[pid])=>s+Object.values(costs[pid]||{}).reduce((ss,c)=>ss+(+c.amount||0),0),0);
    const tot_hrs=pa.reduce((s,[pid])=>s+Object.values(allTasks[pid]||{}).reduce((ss,t)=>ss+(+t.timeSpent||0)/60,0),0);
    const completados=pa.filter(([,p])=>p.status==='Finalizado').length;
    const activos=pa.filter(([,p])=>['Activo','En progreso'].includes(p.status)).length;
    const avg_pct=pa.length?Math.round(pa.reduce((s,[pid])=>s+pct(allTasks[pid]||{}),0)/pa.length):0;
    ws1.mergeCells('A1:M1'); ws1.getRow(1).height=44;
    const b1=ws1.getCell('A1'); b1.value='INVERFIN HOLDING  ·  InverWork — Informe General de Proyectos';
    b1.font=fnt(true,'FFFFFF',15); b1.fill=fill(P.sb); b1.alignment=aln('center');
    ws1.mergeCells('A2:M2'); ws1.getRow(2).height=18;
    const b2=ws1.getCell('A2'); b2.value=`Generado: ${todayStr}   |   Período: Acumulado   |   Empresa: Inverfin Holding`;
    b2.font=fnt(false,'AAAAAA',9,true); b2.fill=fill(P.sb2); b2.alignment=aln('center');
    ws1.mergeCells('A3:M3'); ws1.getRow(3).height=8; ws1.getCell('A3').fill=fill('EEEEEE');
    ws1.getRow(4).height=18; ws1.getRow(5).height=40;
    const kpis=[['Total Proyectos',pa.length,null,P.blue,'A','B'],['Activos',activos,null,P.sb,'C','D'],['Finalizados',completados,null,P.green,'E','F'],['Avance Promedio',avg_pct/100,PCT,P.sb,'G','H'],['Total Costes',tot_costs,FCFA,P.amber,'I','J'],['Horas Totales',Math.round(tot_hrs*10)/10,HRS,P.sb,'K','M']];
    kpis.forEach(([lbl,val,fmt,bg,sc,ec])=>{
      ws1.mergeCells(`${sc}4:${ec}4`); ws1.mergeCells(`${sc}5:${ec}5`);
      const cl=ws1.getCell(`${sc}4`); cl.value=lbl; cl.font=fnt(true,'FFFFFF',9); cl.fill=fill(bg); cl.alignment=aln('center');
      const cv=ws1.getCell(`${sc}5`); cv.value=val; cv.font=fnt(true,'FFFFFF',20); cv.fill=fill(bg); cv.alignment=aln('center');
      if(fmt) cv.numFmt=fmt;
      ['4','5'].forEach(r=>{ for(let col=sc.charCodeAt(0);col<=ec.charCodeAt(0);col++){ ws1.getCell(`${String.fromCharCode(col)}${r}`).fill=fill(bg); } });
    });
    ws1.mergeCells('A6:M6'); ws1.getRow(6).height=8; ws1.getCell('A6').fill=fill('F4F4F2');
    addHeaderRow(ws1,['#','Proyecto','Responsable','Empresa','Estado','F.Inicio','F.Fin Est.','Avance','Tareas','Hechas','Horas','Costes (FCFA)','Descripción'],P.blue,22);
    pa.forEach(([pid,p],i)=>{
      const ptsk=allTasks[pid]||{}; const pcst=Object.values(costs[pid]||{});
      const v=pct(ptsk); const allT=Object.values(ptsk); const done=allT.filter(t=>t.status==='Completado').length;
      const hrs=allT.reduce((s,t)=>s+(+t.timeSpent||0)/60,0); const costSum=pcst.reduce((s,c)=>s+(+c.amount||0),0);
      const row=ws1.addRow([i+1,p.name,p.ownerName||'',p.company||'Inverfin',p.status||'',fmtD(p.startDate),fmtD(p.endDate),v/100,allT.length,done,Math.round(hrs*10)/10,costSum,p.description||'']);
      row.height=17; const bg=i%2===0?P.even:P.odd;
      const fmts=[null,null,null,null,null,null,null,PCT,null,null,HRS,FCFA,null];
      const fcs=[P.muted,P.ink,P.muted,P.muted,P.muted,P.muted,P.muted,v===100?P.green:P.input,P.muted,P.muted,P.input,P.input,P.muted];
      row.eachCell((c,idx)=>{ c.fill=fill(bg); c.border=bdr(); c.font=fnt(idx===2,fcs[idx-1],9); c.alignment=aln(idx<=2||idx===13?'left':'center'); if(fmts[idx-1]) c.numFmt=fmts[idx-1]; });
    });
    const tRow1=ws1.addRow(['TOTALES','','','','','','','',pa.length>0?Math.round(pa.reduce((s,[pid])=>s+Object.values(allTasks[pid]||{}).length,0)):0,'','',tot_costs,'']);
    tRow1.height=20; ws1.mergeCells(`A${tRow1.number}:H${tRow1.number}`);
    tRow1.eachCell((c,i)=>{ c.fill=fill(P.gold); c.font=fnt(true,P.ink,10); c.border=bdr(); c.alignment=aln(i===1?'right':'center'); if(i===12) c.numFmt=FCFA; });
    ws1.columns=[{width:5},{width:26},{width:18},{width:16},{width:14},{width:13},{width:13},{width:12},{width:8},{width:8},{width:10},{width:16},{width:30}];
    ws1.views=[{state:'frozen',ySplit:7,showGridLines:false}];
    /* HOJA 2 — PROYECTOS */
    const ws2=wb.addWorksheet('Proyectos',{properties:{tabColor:{argb:'FF2D8A58'}}});
    ws2.views=[{showGridLines:false}];
    ws2.mergeCells('A1:L1'); ws2.getRow(1).height=32;
    const h2=ws2.getCell('A1'); h2.value='Proyectos — Cuentas Analíticas'; h2.font=fnt(true,'FFFFFF',12); h2.fill=fill(P.green); h2.alignment=aln('center');
    addHeaderRow(ws2,['Cta. Analítica','Proyecto','Responsable','Empresa','Estado','F.Inicio','F.Fin Est.','Avance','Centro Coste','Tareas','Costes (FCFA)','Descripción'],P.green);
    pa.forEach(([pid,p],i)=>{
      const acc=`AN-${String(i+1).padStart(3,'0')}`; const cc='CC-'+(p.name||'').slice(0,4).toUpperCase().replace(/\s/g,'');

      const row=ws2.addRow([acc,p.name,p.ownerName||'',p.company||'Inverfin',p.status||'',fmtD(p.startDate),fmtD(p.endDate),v/100,cc,ptsk.length,costSum,p.description||'']);
      row.height=16; const bg=i%2===0?P.even:P.odd;
      const fmts=[null,null,null,null,null,null,null,PCT,null,null,FCFA,null];
      const fcs=[P.formula,P.ink,P.muted,P.muted,P.muted,P.muted,P.muted,P.input,P.formula,P.muted,P.input,P.muted];
      row.eachCell((c,idx)=>{ c.fill=fill(bg); c.border=bdr(); c.font=fnt(idx===2,fcs[idx-1],9); c.alignment=aln(idx<=2||idx===12?'left':'center'); if(fmts[idx-1]) c.numFmt=fmts[idx-1]; });

    ws2.columns=[{width:12},{width:28},{width:18},{width:16},{width:14},{width:14},{width:14},{width:14},{width:10},{width:12},{width:12},{width:30}];
    ws2.views=[{state:'frozen',ySplit:2,showGridLines:false}];
    /* HOJA 3 — TAREAS */

    ws3.views=[{showGridLines:false}];
    ws3.mergeCells('A1:K1'); ws3.getRow(1).height=32;
    const h3=ws3.getCell('A1'); h3.value='Tareas — Partes de Horas'; h3.font=fnt(true,'FFFFFF',12); h3.fill=fill(P.green2); h3.alignment=aln('center');
    addHeaderRow(ws3,['ID Tarea','Proyecto','Nombre Tarea','Asignado A','Estado','Fecha Creación','T.Est (h)','T.Real (h)','Eficiencia %','Cta. Analítica','Descripción'],P.green2);
    let tIdx=1, totEst=0, totReal=0;
    pa.forEach(([pid,p],pi)=>{
      const acc=`AN-${String(pi+1).padStart(3,'0')}`;
      Object.values(allTasks[pid]||{}).forEach(t=>{
        const est=+(t.timeEstimated||0); const real=(+(t.timeSpent||0))/60; const eff=est>0?Math.round(real/est*1000)/1000:0;
        totEst+=est; totReal+=real;
        const row=ws3.addRow([`TSK-${String(tIdx++).padStart(3,'0')}`,p.name,t.name,t.assignedName||'',t.status||'',fmtD(t.createdAt),Math.round(est*10)/10,Math.round(real*10)/10,eff,acc,t.description||'']);
        row.height=16; const bg=(tIdx-2)%2===0?P.even:P.odd;
        const fcs=[P.muted,P.muted,P.ink,P.muted,P.muted,P.muted,P.input,P.input,eff>=1?P.green:(eff<0.5&&est>0?'C0392B':P.formula),P.formula,P.muted];
        row.eachCell((c,idx)=>{ c.fill=fill(bg); c.border=bdr(); c.font=fnt(idx===3,fcs[idx-1],9); c.alignment=aln(['center','left','left','left','center','center','center','center','center','center','left'][idx-1]); const fmts=[null,null,null,null,null,null,HRS,HRS,PCT1,null,null]; if(fmts[idx-1]) c.numFmt=fmts[idx-1]; });

    const tRow3=ws3.addRow(['TOTALES','','','','','',Math.round(totEst*10)/10,Math.round(totReal*10)/10,totEff,'','']);

    ws3.columns=[{width:12},{width:22},{width:26},{width:18},{width:14},{width:14},{width:14},{width:13},{width:12},{width:12},{width:30}];
    ws3.views=[{state:'frozen',ySplit:2,showGridLines:false}];
    /* HOJA 4 — COSTES */
    const ws4=wb.addWorksheet('Costes',{properties:{tabColor:{argb:'FFD97706'}}});
    ws4.views=[{showGridLines:false}];
    ws4.mergeCells('A1:L1'); ws4.getRow(1).height=32;
    const h4=ws4.getCell('A1'); h4.value='Costes — Facturas y Apuntes Contables'; h4.font=fnt(true,'FFFFFF',12); h4.fill=fill(P.amber); h4.alignment=aln('center');
    addHeaderRow(ws4,['ID Coste','Proyecto','Concepto','Fecha','Base (FCFA)','Imp.CEMAC (18%)','Total c/Imp (FCFA)','Cta. Contable','Cta. Analítica','Centro Coste','Estado Pago','Notas'],P.amber);
    let cIdx=1, totBase=0, totImp=0, totTot=0;
    pa.forEach(([pid,p],pi)=>{
      const acc=`AN-${String(pi+1).padStart(3,'0')}`; const cc='CC-'+(p.name||'').slice(0,4).toUpperCase().replace(/\s/g,'');
      Object.values(costs[pid]||{}).forEach(co=>{
        const base=+(co.amount||0); const imp=Math.round(base*0.18); const tot=base+imp;
        totBase+=base; totImp+=imp; totTot+=tot;
        const row=ws4.addRow([`CST-${String(cIdx++).padStart(3,'0')}`,p.name,co.description||'',fmtD(co.date),base,imp,tot,'627000',acc,cc,'Pagado','']);
        row.height=16; const bg=(cIdx-2)%2===0?P.even:P.odd;
        const fcs=[P.muted,P.muted,P.ink,P.muted,P.input,P.formula,P.formula,P.formula,P.formula,P.formula,P.muted,P.muted];
        row.eachCell((c,idx)=>{ c.fill=fill(bg); c.border=bdr(); c.font=fnt(idx===3,fcs[idx-1],9); c.alignment=aln(['center','left','left','center','center','center','center','center','center','center','center','left'][idx-1]); const fmts=[null,null,null,null,FCFA,FCFA,FCFA,null,null,null,null,null]; if(fmts[idx-1]) c.numFmt=fmts[idx-1]; });
      });
    });
    const tRow4=ws4.addRow(['TOTALES','','','',Math.round(totBase),Math.round(totImp),Math.round(totTot),'','','','','']);
    tRow4.height=20; ws4.mergeCells(`A${tRow4.number}:D${tRow4.number}`);
    tRow4.eachCell((c,i)=>{ c.fill=fill(P.gold); c.font=fnt(true,P.ink,10); c.border=bdr(); c.alignment=aln(i===1?'right':'center'); if([5,6,7].includes(i)) c.numFmt=FCFA; });
    ws4.columns=[{width:12},{width:22},{width:26},{width:13},{width:18},{width:15},{width:18},{width:13},{width:13},{width:13},{width:12},{width:20}];
    ws4.views=[{state:'frozen',ySplit:2,showGridLines:false}];
    /* HOJA 5 — REPORTES */
    const ws5=wb.addWorksheet('Reportes',{properties:{tabColor:{argb:'FF6B4FA8'}}});
    ws5.views=[{showGridLines:false}];
    ws5.mergeCells('A1:I1'); ws5.getRow(1).height=32;
    const h5=ws5.getCell('A1'); h5.value='Reportes Diarios — Partes de Trabajo'; h5.font=fnt(true,'FFFFFF',12); h5.fill=fill(P.purple); h5.alignment=aln('center');
    addHeaderRow(ws5,['ID Reporte','Empleado','Proyecto','Fecha','Horas','Tareas Realizadas','Problemas Detectados','Notas','Cta. Analítica'],P.purple);
    const repList=Object.values(reports||{}).sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
    let totH=0;
    repList.forEach((r,i)=>{
      const pid=r.projectId||''; const pi=pa.findIndex(([p])=>p===pid);
      const acc=`AN-${String(pi+1).padStart(3,'0')}`; const hrs=+(r.hoursWorked||0); totH+=hrs;
      const row=ws5.addRow([`RPT-${String(i+1).padStart(3,'0')}`,r.userName||'',r.projectName||'—',fmtD(r.date),hrs,r.tasks||'',r.problems||'',r.notes||'',acc]);
      row.height=18; const bg=i%2===0?P.even:P.odd;
      const fcs=[P.muted,P.ink,P.muted,P.muted,P.input,P.muted,!!(r.problems||'').trim()?'C0392B':P.muted,P.muted,P.formula];
      row.eachCell((c,idx)=>{ c.fill=fill(bg); c.border=bdr(); c.font=fnt(idx===2,fcs[idx-1],9); c.alignment=aln(['center','left','left','center','center','left','left','left','center'][idx-1],[6,7,8].includes(idx)); if(idx===5) c.numFmt=HRS; });
    });
    const tRow5=ws5.addRow(['TOTAL HORAS','','','',Math.round(totH*10)/10,'','','','']);
    tRow5.height=20; ws5.mergeCells(`A${tRow5.number}:D${tRow5.number}`);
    tRow5.eachCell((c,i)=>{ c.fill=fill(P.gold); c.font=fnt(true,P.ink,10); c.border=bdr(); c.alignment=aln(i===1?'right':'center'); if(i===5) c.numFmt=HRS; });
    ws5.columns=[{width:12},{width:18},{width:22},{width:13},{width:12},{width:36},{width:28},{width:24},{width:13}];
    ws5.views=[{state:'frozen',ySplit:2,showGridLines:false}];
    /* DOWNLOAD */
    const buffer=await wb.xlsx.writeBuffer();
    const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=`InverWork_Informe_${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) {
    alert('Error al exportar: '+e.message); console.error(e);
  } finally {
    if(btn){ btn.textContent='Exportar Excel'; btn.disabled=false; }
  }
};

/* ══════════════════════════════════
   APP
══════════════════════════════════ */
const App=()=>{
  const[splash,  setSplash]  =useState(true);
  const[user,    setUser]    =useState(null);
  const[tab,     setTab]     =useState('dashboard');
  const[openProj,setOpenProj]=useState(null);
  const[projects,setProjects]=useState({});
  const[allTasks,setAllTasks]=useState({});
  const[reports, setReports] =useState({});
  const[users,   setUsers]   =useState({});
  const[synced,  setSynced]  =useState(false);
  const[notifs,  setNotifs]  =useState(0);
  const[notifOpen,setNotifOpen]=useState(false);
  const[seenNotifCount,setSeenNotifCount]=useState(()=>+(localStorage.getItem('iw_seen_notifs')||0));
  const[allCollabs,setAllCollabs]=useState({});
  const[invites,setInvites]=useState({});
  const UPDATE_KEY='iw_update_v4_seen';
  const[showUpdate,setShowUpdate]=useState(false);

  /* Firebase ready */
  useEffect(()=>{
    const done=()=>{setSynced(true);setTimeout(()=>setSplash(false),900)};
    if(window.FB){done();}
    else{window.addEventListener('fb',done);return()=>window.removeEventListener('fb',done);}
    setTimeout(()=>setSplash(false),5000);
  },[]);

  /* Live data subscriptions — start when user logs in */
  useEffect(()=>{
    if(!user)return;
    const startSubs=()=>{
      const u1=window.FB.onProjects(d=>{
        const raw=d||{};
        // auto-migrate projects without department → it
        const toFix=Object.entries(raw).filter(([,p])=>!p.department);
        if(toFix.length>0){
          toFix.forEach(([pid])=>window.FB.updProject(pid,{department:'it'}));
        }
        setProjects(raw);
      });
      const u2=window.FB.onReports(d=>{
        const rd=d||{};
        setReports(rd);
        setNotifs(Object.values(rd).filter(r=>r.userId!==user.id).length);
      });
      const u3=window.FB.onUsers(d=>setUsers(d||{}));
      const u4=window.FB.onAllTasks(d=>setAllTasks(d||{}));
      const u5=window.FB.onAllCollabs(d=>setAllCollabs(d||{}));
      const u6=window.FB.onInvites(user.id,d=>setInvites(d||{}));
      setSynced(true);
      return()=>{u1();u2();u3();u4();u5();u6()};
    };
    if(window.FB) return startSubs();
    const h=()=>{window.removeEventListener('fb',h);startSubs()};
    window.addEventListener('fb',h);
    return()=>window.removeEventListener('fb',h);
  },[user]);

  const isAdmin  = user?.role==='admin';
  const isGerenc = user?.role==='gerencia';
  const isEmp    = user?.role==='empleado';

  /* ── Tabs por rol ──
     Admin    : Dashboard global, Proyectos (solo ver), Reportes (ver+comentar), Usuarios (ver+eliminar)
     Gerencia : Dashboard global, Proyectos (solo ver), Reportes (ver+comentar)
     Empleado : Inicio personal, Proyectos (crear+gestionar propios), Equipo (ver), Reportes (crear propios)
  */
  const IC={
    overview:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    projects:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
    reports:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
    users:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    dashboard:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    team:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  };
  const TABS=!user?[]:
    isAdmin?[
      {id:'overview', label:'Dashboard', icon:IC.overview},
      {id:'projects', label:'Proyectos', icon:IC.projects},
      {id:'reports',  label:'Reportes',  icon:IC.reports},
      {id:'users',    label:'Usuarios',  icon:IC.users},
    ]:
    isGerenc?[
      {id:'overview', label:'Dashboard', icon:IC.overview},
      {id:'projects', label:'Proyectos', icon:IC.projects},
      {id:'reports',  label:'Reportes',  icon:IC.reports},
    ]:[
      {id:'dashboard',label:'Inicio',    icon:IC.dashboard},
      {id:'projects', label:'Proyectos', icon:IC.projects},
      {id:'team',     label:'Equipo',    icon:IC.team},
      {id:'reports',  label:'Reportes',  icon:IC.reports},
    ];

  const go=(t,pid,p)=>{
    if(t==='proj'&&pid){setOpenProj({id:pid,data:p});setTab('projects');}
    else{setTab(t);setOpenProj(null);}
  };

  const login=u=>{
    setUser(u);
    setTab(u.role==='admin'||u.role==='gerencia'?'overview':'dashboard');
    if(!localStorage.getItem(UPDATE_KEY)) setShowUpdate(true);
  };

  const logout=()=>{
    setUser(null);setTab('dashboard');setOpenProj(null);setSynced(false);
    localStorage.removeItem('iw_seen_notifs');
    setSeenNotifCount(0);
  };

  const pendingInvites=Object.entries(invites).filter(([,v])=>v.status==='pending');
  const totalNotifs=notifs+pendingInvites.length;
  const openNotifPanel=()=>{
    setNotifOpen(v=>!v);
    setSeenNotifCount(totalNotifs);
    localStorage.setItem('iw_seen_notifs', String(totalNotifs));
  };
  const unreadCount=totalNotifs>seenNotifCount?totalNotifs-seenNotifCount:0;
  const activeTab=openProj?'projects':tab;

  if(splash) return <Splash/>;
  if(!user)  return <Auth onLogin={login}/>;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'row',background:'var(--bg)',overflow:'hidden'}}>

      {/* SIDEBAR — desktop only */}
      <div className="hidden md:block" style={{flexShrink:0}}>
        <Sidebar user={user} tab={activeTab} go={go} tabs={TABS} synced={synced} notifs={unreadCount} onNotif={openNotifPanel} onLogout={logout}/>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,height:'100vh',overflow:'hidden'}}>

        {/* Mobile header */}
        <div className="md:hidden" style={{flexShrink:0}}>
          <MobileBar user={user} tab={activeTab} go={go} tabs={TABS} notifs={unreadCount} onNotif={openNotifPanel} onLogout={logout}/>
        </div>

        {/* Scrollable content — plain overflow-y:auto, no overflow:hidden wrapper */}
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',background:'var(--bg)'}}>
          <div style={{maxWidth:'960px',margin:'0 auto',padding:'36px 32px 100px'}}>
            {activeTab==='dashboard'&&isEmp   &&<Dashboard user={user} projects={projects} allTasks={allTasks} reports={reports} go={go} allCollabs={allCollabs}/>}
            {activeTab==='projects'          &&<Projects  user={user} projects={projects} allTasks={allTasks} openProj={openProj} setOpenProj={setOpenProj} allUsers={users} allCollabs={allCollabs} isAdmin={isAdmin}/>}
            {activeTab==='team'     &&isEmp   &&<Team      user={user} projects={projects} allTasks={allTasks} allCollabs={allCollabs}/>}
            {activeTab==='reports'           &&<Reports    user={user} projects={projects} reports={reports}/>}
            {activeTab==='overview'&&(isAdmin||isGerenc)&&<Overview projects={projects} allTasks={allTasks} reports={reports} users={users} onExport={()=>exportExcel(projects,allTasks,reports,users)}/>}
            {activeTab==='users'   &&isAdmin  &&<Users     users={users} projects={projects} allTasks={allTasks} allCollabs={allCollabs}/>}
          </div>
        </div>

        {/* Footer desktop */}
        <div className="hidden md:flex" style={{flexShrink:0,alignItems:'center',justifyContent:'space-between',padding:'9px 28px',borderTop:'1px solid var(--border)',background:'var(--surface2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
            <img src={LOGO} style={{width:'15px',height:'15px',borderRadius:'4px',opacity:.5}} alt=""/>
            <span style={{fontSize:'11.5px',color:'var(--ink4)',fontWeight:500}}>InverWork · Inverfin Holding</span>
          </div>
          <span style={{fontSize:'11px',color:'var(--ink4)',fontStyle:'italic'}}>Created by Jesús Santiago · © 2026</span>
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="md:hidden" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,background:'var(--sb)',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>go(t.id)}
            style={{flex:1,padding:'8px 4px',fontSize:'9px',fontWeight:500,border:'none',borderTop:`2px solid ${activeTab===t.id?'var(--blue)':'transparent'}`,color:activeTab===t.id?'#7fa4ff':'rgba(255,255,255,.35)',background:'transparent',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',textTransform:'uppercase',letterSpacing:.5}}>
            <span style={{width:'18px',height:'18px',display:'flex',alignItems:'center',justifyContent:'center'}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Invite Banner — floating for current user */}
      {user&&<InviteBanner user={user} projects={projects}/>}

      {/* Consultoría Welcome Banner */}
      {user&&<ConsultoriaBanner user={user}/>}

      {/* Notifications panel */}
      {notifOpen&&portal(
        <div onClick={()=>setNotifOpen(false)} style={{position:'fixed',inset:0,zIndex:8000}}>
          <div onClick={e=>e.stopPropagation()} className="mi"
            style={{position:'absolute',top:'60px',right:'16px',width:'300px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-lg)',overflow:'hidden'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:'14px',fontWeight:700,color:'var(--ink)'}}>Notificaciones</span>
              <button onClick={()=>setNotifOpen(false)} style={{fontSize:'17px',color:'var(--ink3)',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>×</button>
            </div>
            <div style={{maxHeight:'380px',overflowY:'auto'}}>

              {/* ── Invitaciones pendientes ── */}
              {pendingInvites.length>0&&(
                <div style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{padding:'4px 16px 8px',fontSize:'10px',fontWeight:700,color:'var(--purple)',textTransform:'uppercase',letterSpacing:'1px'}}>Invitaciones ({pendingInvites.length})</div>
                  {pendingInvites.map(([iid,inv])=>(
                    <div key={iid} style={{padding:'10px 14px',display:'flex',flexDirection:'column',gap:'8px',background:'#faf5ff',borderBottom:'1px solid #ede9fe',margin:'0 8px 6px',borderRadius:'8px',border:'1px solid #ddd6fe'}}>
                      <div style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
                        <div style={{width:'28px',height:'28px',borderRadius:'8px',background:'var(--purple)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:'12.5px',fontWeight:700,color:'var(--ink)',lineHeight:1.2}}>{inv.projectName}</div>
                          <div style={{fontSize:'11px',color:'var(--ink3)',marginTop:'2px'}}>De <b>{inv.fromName}</b> · Rol: <span style={{color:'var(--purple)',fontWeight:600}}>{inv.collabRole||'Colaborador'}</span></div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:'6px'}}>
                        <button onClick={async()=>{
                          await window.FB.updInvite(iid,{status:'declined'});
                        }} style={{flex:1,padding:'6px',fontSize:'11.5px',fontWeight:600,background:'transparent',border:'1px solid #e5e7eb',borderRadius:'6px',color:'var(--ink3)',cursor:'pointer',fontFamily:'inherit',transition:'all .13s'}}
                          onMouseEnter={e=>{e.currentTarget.style.background='#fef2f2';e.currentTarget.style.color='var(--red)';e.currentTarget.style.borderColor='#fca5a5'}}
                          onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--ink3)';e.currentTarget.style.borderColor='#e5e7eb'}}>
                          Rechazar
                        </button>
                        <button onClick={async()=>{
                          await window.FB.updInvite(iid,{status:'accepted'});
                          await window.FB.addCollab(inv.projectId,{userId:user.id,userName:user.name,role:inv.collabRole||'Colaborador',joinedAt:ts()});
                        }} style={{flex:1,padding:'6px',fontSize:'11.5px',fontWeight:700,background:'var(--purple)',border:'none',borderRadius:'6px',color:'#fff',cursor:'pointer',fontFamily:'inherit',transition:'background .13s'}}
                          onMouseEnter={e=>e.currentTarget.style.background='#6d28d9'}
                          onMouseLeave={e=>e.currentTarget.style.background='var(--purple)'}>
                          Aceptar
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* ── Reportes ── */}
              {Object.values(reports).length===0&&pendingInvites.length===0&&(
                <div style={{padding:'32px',textAlign:'center',fontSize:'13px',color:'var(--ink4)'}}>Sin notificaciones.</div>
              )}
              {Object.values(reports).length>0&&(
                <>
                  <div style={{padding:'10px 16px 4px',fontSize:'10px',fontWeight:700,color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'1px'}}>Reportes del equipo</div>
                  {Object.values(reports).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,8).map((r,i)=>(
                    <div key={i} style={{padding:'9px 16px',borderTop:i>0?'1px solid var(--border)':'none',display:'flex',alignItems:'center',gap:'10px'}}>
                      <div style={{width:'28px',height:'28px',borderRadius:'8px',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,color:'var(--ink3)',flexShrink:0}}>{(r.userName||'?')[0].toUpperCase()}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:'12px',color:'var(--ink)',fontWeight:500}}><b>{r.userName}</b> subió un reporte</div>
                        <div style={{fontSize:'11px',color:'var(--ink4)',marginTop:'1px'}}>{dFmt(r.date)}{r.projectName?' · '+r.projectName:''}</div>
                      </div>
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── BANNER DE ACTUALIZACIÓN ── */}
      {showUpdate&&portal(
        <div style={{position:'fixed',inset:0,zIndex:9500,display:'flex',alignItems:'flex-end',justifyContent:'flex-end',padding:'24px',pointerEvents:'none'}}>
          <div className="mi" style={{pointerEvents:'all',width:'336px',background:'#0d1117',border:'1px solid rgba(255,255,255,.1)',borderRadius:'16px',boxShadow:'0 24px 64px rgba(0,0,0,.5)',overflow:'hidden'}}>
            <div style={{background:'linear-gradient(135deg,#0f172a 0%,#1d4ed8 100%)',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'30px',height:'30px',borderRadius:'8px',background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </div>
                <div>
                  <div style={{color:'#fff',fontSize:'12.5px',fontWeight:700,letterSpacing:'-.01em',lineHeight:1}}>Nuevas funcionalidades</div>
                  <div style={{color:'rgba(255,255,255,.5)',fontSize:'10px',marginTop:'3px'}}>InverWork · v1.4  ·  2026</div>
                </div>
              </div>
              <button onClick={()=>{setShowUpdate(false);localStorage.setItem(UPDATE_KEY,'1')}}
                style={{width:'24px',height:'24px',borderRadius:'50%',background:'rgba(255,255,255,.12)',border:'none',cursor:'pointer',color:'rgba(255,255,255,.55)',fontSize:'15px',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .14s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.22)';e.currentTarget.style.color='#fff'}}
                onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.12)';e.currentTarget.style.color='rgba(255,255,255,.55)'}}>×</button>
            </div>
            <div style={{padding:'16px 18px 18px'}}>
              <div style={{color:'rgba(255,255,255,.35)',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.3px',marginBottom:'14px'}}>Novedades incluidas</div>
              <div style={{display:'flex',flexDirection:'column',gap:'11px'}}>
                {[
                  {color:'#818cf8',icon:<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,title:'Departamentos IT y Consultoría',desc:'Cada equipo gestiona sus propios proyectos con campos específicos. Visibilidad separada por departamento.'},
                  {color:'#34d399',icon:<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>,title:'Colaboración cross-departamento',desc:'Invita a miembros de otro departamento a colaborar. Acceso controlado solo al proyecto específico.'},
                  {color:'#f59e0b',icon:<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>,title:'Árbol de usuarios mejorado',desc:'El Admin filtra el diagrama por departamento y ve colaboraciones cross-dpto en tiempo real.'},
                ].map(({color,icon,title,desc},i)=>(
                  <div key={i} style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
                    <span style={{width:'26px',height:'26px',borderRadius:'7px',background:color+'18',border:`1px solid ${color}30`,color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:'1px'}}></span>
                    <div>
                      <div style={{color:'rgba(255,255,255,.82)',fontSize:'12px',fontWeight:600,lineHeight:1.2,letterSpacing:'-.01em'}}>{title}</div>
                      <div style={{color:'rgba(255,255,255,.3)',fontSize:'11px',marginTop:'3px',lineHeight:1.5}}>{desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={()=>{setShowUpdate(false);localStorage.setItem(UPDATE_KEY,'1')}}
                style={{width:'100%',marginTop:'18px',padding:'9px 0',background:'var(--blue)',border:'none',borderRadius:'8px',color:'#fff',fontSize:'13px',fontWeight:600,cursor:'pointer',letterSpacing:'-.01em',transition:'background .13s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#3558e0'}
                onMouseLeave={e=>e.currentTarget.style.background='var(--blue)'}>
                Entendido
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
