<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InverWork · Mantenimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1520;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;color:#f0f6ff}
canvas{position:fixed;inset:0;z-index:0}
.score-bar{position:fixed;top:0;left:0;right:0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;z-index:3}
.score-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f0f6ff;letter-spacing:-.03em}
.score-label{font-size:10px;color:rgba(240,246,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.brand{display:flex;align-items:center;gap:10px}
.brand-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:rgba(240,246,255,.7);letter-spacing:-.02em}
.ui{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:52px;pointer-events:none}
.card{background:rgba(15,21,32,.88);border:1px solid rgba(79,115,245,.2);border-radius:20px;padding:26px 34px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);max-width:380px;width:90%;pointer-events:all}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(90,158,58,.15);border:1px solid rgba(90,158,58,.3);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:700;color:#7cc44f;letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#7cc44f;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.title{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:800;letter-spacing:-.04em;line-height:1.15;color:#f0f6ff;margin-bottom:8px}
.sub{font-size:12.5px;color:rgba(240,246,255,.38);line-height:1.65;margin-bottom:18px}
.hint{font-size:11px;color:rgba(240,246,255,.22);letter-spacing:1px;text-transform:uppercase;cursor:pointer;pointer-events:all;transition:color .2s}
.hint:hover{color:rgba(240,246,255,.5)}
.progress-track{width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#5a9e3a,#4f73f5);border-radius:99px;animation:progLoop 2.8s cubic-bezier(.4,0,.6,1) infinite}
@keyframes progLoop{0%{width:0;opacity:1}65%{width:88%;opacity:1}85%{width:95%;opacity:.6}100%{width:0;opacity:0}}
.footer{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-size:10px;color:rgba(240,246,255,.13);letter-spacing:.5px;z-index:3}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="score-bar">
  <div><div class="score-val" id="score">0</div><div class="score-label">Actualizando</div></div>
  <div class="brand">
    <svg width="30" height="30" viewBox="0 0 64 64"><rect width="64" height="64" fill="#1e2433" rx="12"/><text x="9" y="46" font-family="serif" font-weight="700" font-size="34" fill="white">in</text><path d="M20 15 C20 9 27 5 32 9 C37 5 44 9 44 15 C44 22 37 27 32 30 C27 27 20 22 20 15Z" fill="#5a9e3a"/></svg>
    <div class="brand-name">InverWork</div>
  </div>
</div>

<div class="ui">
  <div class="card">
    <div class="badge"><div class="badge-dot"></div>Mantenimiento</div>
    <div class="title">Estamos en obras,<br/>volvemos pronto</div>
    <div class="sub">Invy está instalando la v1.3 con todo el equipo.<br/>Mientras tanto... ¿hasta dónde llegas?</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="hint" id="jumpHint" onclick="jump()">espacio / tap — saltar</div>
  </div>
</div>

<div class="footer">InverWork · Inverfin Holding · Created by Jesús Santiago · © 2026</div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const scoreEl=document.getElementById('score');
let W,H,dpr,GROUND;
function resize(){
  dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.scale(dpr,dpr);GROUND=H*.62;
}
resize();window.addEventListener('resize',()=>{resize();makeBG();});

let score=0,hiScore=0,dead=false,started=false,speed=5,frame=0,scoreFloat=0,scrollX=0;
const P={x:96,y:0,vy:0,onGround:true,jumps:0,maxJumps:2,w:42,h:52,animF:0,sq:1,st:1};
let obstacles=[],nextObs=120,coins=[],nextCoin=60,parts=[],msgs=[];

/* ── Stars ── */
const stars=Array.from({length:70},()=>({x:Math.random(),y:Math.random()*.5,r:Math.random()*1.3+.4,t:Math.random()*6.28}));

/* ── Buildings ── */
const buildings=[];
function makeBG(){
  buildings.length=0;let x=0;
  while(x<W+300){
    const bh=50+Math.random()*180,bw=28+Math.random()*65,layer=Math.random()<.5?0:1;
    const wins=[];
    for(let wy=8;wy<bh-10;wy+=14)for(let wx=4;wx<bw-6;wx+=11)if(Math.random()>.3)wins.push({x:wx,y:wy,on:Math.random()>.4});
    buildings.push({x,w:bw,h:bh,layer,wins});x+=bw+3+Math.random()*22;
  }
}
makeBG();

/* ── Round rect ── */
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

/* ── Leaf ── */
function leaf(x,y,sz,af){
  const w=Math.sin(af*.06)*10;
  ctx.save();ctx.translate(x,y);ctx.rotate(w*Math.PI/180);
  ctx.beginPath();ctx.moveTo(0,sz);
  ctx.bezierCurveTo(-sz*.9,sz*.3,-sz*.9,-sz*.4,0,-sz*.05);
  ctx.bezierCurveTo(sz*.9,-sz*.4,sz*.9,sz*.3,0,sz);
  ctx.fillStyle='#5a9e3a';ctx.fill();
  ctx.beginPath();ctx.moveTo(0,sz*.85);ctx.lineTo(0,-sz*.05);
  ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=.8;ctx.stroke();
  ctx.restore();
}

/* ── Limb ── */
function limb(x,y,w,h){
  rr(x-w/2,y,w,h,w/2);
  ctx.fillStyle='#1e2433';ctx.fill();
  ctx.strokeStyle='rgba(79,115,245,.35)';ctx.lineWidth=1.5;ctx.stroke();
}

/* ── Draw Invy ── */
function drawInvy(x,y,af,sq,st,isDead){
  const bw=P.w*sq,bh=P.h*st,bx=x-bw/2,by=y-bh;
  ctx.save();ctx.translate(x,y-bh/2);ctx.scale(sq,st);ctx.translate(-x,-(y-bh/2));
  if(isDead){ctx.globalAlpha=.55;ctx.save();ctx.translate(x,y-bh/2);ctx.rotate(.35);ctx.translate(-x,-(y-bh/2));}

  /* body */
  rr(bx+2,by+2,bw-4,bh-10,10);
  ctx.fillStyle='#1e2433';ctx.fill();
  ctx.strokeStyle='rgba(79,115,245,.45)';ctx.lineWidth=2;ctx.stroke();
  /* shine */
  rr(bx+4,by+4,bw-8,(bh-12)*.38,7);ctx.fillStyle='rgba(255,255,255,.05)';ctx.fill();
  /* "in" */
  ctx.font='bold 17px serif';ctx.fillStyle='rgba(240,246,255,.88)';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('in',x,by+(bh-10)*.58);
  /* leaf */
  leaf(x-5,by+6,11,af);
  /* eyes */
  const eyeY=by+(bh-10)*.27;
  [-9,9].forEach((ox,ei)=>{
    ctx.beginPath();ctx.arc(x+ox,eyeY,5,0,Math.PI*2);ctx.fillStyle='#f0f6ff';ctx.fill();
    if(!isDead){
      const blink=Math.abs(Math.sin(af*.04+ei*.5))>.94?.4:2.5;
      ctx.beginPath();ctx.arc(x+ox+Math.sin(af*.03)*1.8,eyeY+Math.cos(af*.04)*1.2,blink,0,Math.PI*2);
      ctx.fillStyle='#0a0f1a';ctx.fill();
    }else{
      ctx.font='8px sans-serif';ctx.fillStyle='#0a0f1a';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('×',x+ox,eyeY);
    }
  });
  /* mouth */
  ctx.beginPath();
  if(isDead)ctx.arc(x,by+(bh-10)*.6,7,Math.PI*.1,Math.PI*.9,true);
  else ctx.arc(x,by+(bh-10)*.6,7,Math.PI*.1,Math.PI*.9);
  ctx.strokeStyle='rgba(240,246,255,.6)';ctx.lineWidth=2;ctx.stroke();

  /* arms */
  const swing=Math.sin(af*.18)*22;
  ctx.save();ctx.translate(bx+2,by+(bh-10)*.37);ctx.rotate((-28+swing)*Math.PI/180);limb(0,0,8,24);ctx.restore();
  ctx.save();ctx.translate(bx+bw-2,by+(bh-10)*.37);ctx.rotate((28-swing)*Math.PI/180);limb(0,0,8,24);ctx.restore();
  /* tool */
  if(!isDead){
    ctx.save();ctx.translate(bx+bw+17,by+(bh-10)*.37+22+Math.sin(af*.18)*8);ctx.rotate(swing*.015);
    ctx.font='15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔧',0,0);ctx.restore();
  }
  /* legs */
  const legY=by+bh-12,legSw=Math.sin(af*.18)*28;
  ctx.save();ctx.translate(x-9,legY);ctx.rotate(-legSw*Math.PI/180);limb(0,0,9,20);ctx.restore();
  ctx.save();ctx.translate(x+9,legY);ctx.rotate(legSw*Math.PI/180);limb(0,0,9,20);ctx.restore();
  /* shoes */
  [[-9,Math.sin(af*.18)],[9,-Math.sin(af*.18)]].forEach(([ox,sw],i)=>{
    const sx=x+ox+sw*4,sy=legY+20;
    rr(sx-9,sy-5,18,10,5);
    ctx.fillStyle=i===0?'#4f73f5':'#5a9e3a';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.stroke();
  });

  if(isDead){ctx.restore();ctx.globalAlpha=1;}
  ctx.restore();
}

/* ── City ── */
function drawCity(){
  ctx.fillStyle='#080d18';ctx.fillRect(0,0,W,GROUND);
  stars.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x*W,s.y*GROUND,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,215,255,${.3+.25*Math.sin(s.t+frame*.008)})`;ctx.fill();
  });
  /* moon */
  ctx.beginPath();ctx.arc(W*.83,GROUND*.16,20,0,Math.PI*2);ctx.fillStyle='rgba(200,225,190,.06)';ctx.fill();
  /* buildings */
  buildings.forEach(b=>{
    const spd=b.layer?0.38:0.22;
    let bx=(b.x-scrollX*spd)%(W+350);if(bx<-b.w-5)bx+=W+400;
    const by=GROUND-b.h;
    ctx.fillStyle=b.layer?'#111827':'#0d1320';ctx.fillRect(bx,by,b.w,b.h);
    ctx.strokeStyle=b.layer?'rgba(79,115,245,.09)':'rgba(79,115,245,.05)';ctx.lineWidth=.5;ctx.strokeRect(bx,by,b.w,b.h);
    b.wins.forEach(w=>{
      ctx.fillStyle=w.on?'rgba(200,220,255,.45)':'rgba(79,115,245,.05)';
      ctx.fillRect(bx+w.x,by+w.y,7,7);
    });
    if(b.layer&&b.w>44){
      ctx.strokeStyle='rgba(79,115,245,.18)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bx+b.w/2,by);ctx.lineTo(bx+b.w/2,by-18);ctx.stroke();
      ctx.beginPath();ctx.arc(bx+b.w/2,by-20,2.5,0,Math.PI*2);ctx.fillStyle='#ef4444';ctx.fill();
    }
  });
  /* fog */
  const fog=ctx.createLinearGradient(0,GROUND*.72,0,GROUND);
  fog.addColorStop(0,'transparent');fog.addColorStop(1,'rgba(8,13,24,.55)');
  ctx.fillStyle=fog;ctx.fillRect(0,GROUND*.72,W,GROUND*.28);
}

/* ── Ground ── */
function drawGround(){
  ctx.fillStyle='#192030';ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle='#4f73f5';ctx.fillRect(0,GROUND,W,2.5);
  ctx.strokeStyle='rgba(79,115,245,.07)';ctx.lineWidth=1;
  for(let gx=-scrollX%64;gx<W+64;gx+=64){ctx.beginPath();ctx.moveTo(gx,GROUND);ctx.lineTo(gx,H);ctx.stroke();}
  ctx.strokeStyle='rgba(79,115,245,.03)';
  for(let gx=-scrollX%64;gx<W+64;gx+=64){ctx.beginPath();ctx.moveTo(gx+32,GROUND+4);ctx.lineTo(gx+32,GROUND+18);ctx.stroke();}
}

/* ── Obstacle types ── */
const OTYPES=[
  {w:26,h:46,col:'#ef4444',lbl:'Bug',ico:'🐛'},
  {w:38,h:30,col:'#f97316',lbl:'Error',ico:'404'},
  {w:20,h:62,col:'#dc2626',lbl:'Crash',ico:'💥'},
  {w:48,h:26,col:'#7c3aed',lbl:'Timeout',ico:'⏱'},
];
function spawnObs(){
  const t=OTYPES[Math.floor(Math.random()*OTYPES.length)];
  obstacles.push({x:W+60,w:t.w,h:t.h,col:t.col,lbl:t.lbl,ico:t.ico});
}
function drawObs(o){
  const y=GROUND-o.h;
  rr(o.x,y,o.w,o.h,5);ctx.fillStyle=o.col;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1.5;ctx.stroke();
  rr(o.x+2,y+2,o.w-4,o.h*.32,3);ctx.fillStyle='rgba(255,255,255,.07)';ctx.fill();
  ctx.font='bold 9px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.lbl,o.x+o.w/2,y+o.h*.36);
  ctx.font='11px sans-serif';ctx.fillText(o.ico,o.x+o.w/2,y+o.h*.7);
  for(let i=0;i<3;i++){const sx=o.x+o.w*.2+i*o.w*.25;ctx.beginPath();ctx.moveTo(sx,y);ctx.lineTo(sx-5,y-13);ctx.lineTo(sx+5,y-13);ctx.closePath();ctx.fillStyle=o.col;ctx.fill();}
}

/* ── Coins ── */
function spawnCoin(){coins.push({x:W+20,y:GROUND-65-Math.random()*75,c:false,sc:1,a:1});}
function drawCoin(c){
  ctx.save();ctx.translate(c.x,c.y);ctx.scale(c.sc,c.sc);
  ctx.beginPath();ctx.arc(0,0,7.5,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,200,50,${c.a})`;ctx.fill();
  ctx.strokeStyle=`rgba(220,150,0,${c.a*.7})`;ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 8px sans-serif';ctx.fillStyle=`rgba(150,80,0,${c.a})`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('i',0,0);
  ctx.restore();
}

/* ── Particles ── */
function dust(x,y){for(let i=0;i<5;i++)parts.push({x,y,vx:(Math.random()-.5)*2.5,vy:-(Math.random()*2+.5),l:1,s:Math.random()*3+1,col:null});}
function explode(x,y){
  for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*6+2;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,l:1,s:Math.random()*5+2,col:i%2?'#5a9e3a':'#4f73f5'});}
}

/* ── Jump / respawn ── */
function jump(){
  if(!started){started=true;return;}
  if(dead){respawn();return;}
  if(P.jumps<P.maxJumps){
    P.vy=-15.5;P.onGround=false;P.jumps++;P.sq=.82;P.st=1.28;
    dust(P.x,GROUND);
    document.getElementById('jumpHint').textContent=P.jumps===1?'▲ Doble salto!':'⚡ Doble salto activado';
  }
}
function respawn(){
  dead=false;score=0;scoreFloat=0;speed=5;frame=0;
  obstacles.length=0;coins.length=0;parts.length=0;msgs.length=0;nextObs=120;nextCoin=60;
  P.y=0;P.vy=0;P.onGround=true;P.jumps=0;P.animF=0;
  scoreEl.textContent='0';
  document.getElementById('jumpHint').textContent='espacio / tap — saltar';
}

document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
cv.addEventListener('click',jump);
cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

/* ── Main loop ── */
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/16.67,2.5);lastT=ts;
  ctx.clearRect(0,0,W,H);
  drawCity();drawGround();

  if(!started){
    P.y=GROUND;P.animF+=dt*.5;
    const iy=GROUND-Math.abs(Math.sin(P.animF*.04))*5;
    drawInvy(P.x,iy,P.animF,1,1,false);
    ctx.font='bold 14px DM Sans,sans-serif';ctx.fillStyle='rgba(240,246,255,.45)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=.5+.35*Math.sin(frame*.06);
    ctx.fillText('ESPACIO / TAP para empezar',W/2,GROUND-90);ctx.globalAlpha=1;
    frame++;return;
  }

  frame++;
  if(!dead){
    scoreFloat+=speed*.026*dt;score=Math.floor(scoreFloat);
    if(score>hiScore)hiScore=score;scoreEl.textContent=score;
    speed=5+score*.003;scrollX+=speed*dt;
  }

  /* physics */
  if(!dead){
    P.vy+=.68*dt;P.y+=P.vy*dt;
    if(P.y>=GROUND){
      if(P.vy>3)dust(P.x,GROUND);
      P.y=GROUND;P.vy=0;P.onGround=true;P.jumps=0;
      if(P.sq<1){P.sq=.78;P.st=1.18;}
      document.getElementById('jumpHint').textContent='espacio / tap — saltar';
    }
    P.sq+=(1-P.sq)*.2;P.st+=(1-P.st)*.2;
    P.animF+=dt*(P.onGround?2.4:1.3);
  }

  /* obstacles */
  if(!dead){nextObs-=speed*dt;if(nextObs<=0){spawnObs();nextObs=155+Math.random()*210-Math.min(score*.4,70);}}
  obstacles=obstacles.filter(o=>{
    o.x-=speed*dt;
    if(!dead){
      const ix=P.x-15,iy=P.y-P.h*.88,iw=30,ih=P.h*.82;
      if(ix<o.x+o.w&&ix+iw>o.x&&iy<GROUND-o.h*.05&&iy+ih>GROUND-o.h){
        dead=true;explode(P.x,P.y-P.h/2);P.vy=-11;
        document.getElementById('jumpHint').textContent='¡Invy cayó! — Tap para reintentar';
        scoreEl.textContent='💥 '+score;
      }
    }
    drawObs(o);return o.x>-80;
  });

  /* coins */
  if(!dead){nextCoin-=speed*dt;if(nextCoin<=0){spawnCoin();nextCoin=75+Math.random()*95;}}
  coins=coins.filter(c=>{
    c.x-=speed*dt;
    if(!c.c&&Math.abs(c.x-P.x)<18&&Math.abs(c.y-(P.y-P.h/2))<26){
      c.c=true;scoreFloat+=5;msgs.push({t:'+5',x:c.x,y:c.y,l:1,vy:-1.8});
    }
    if(c.c){c.sc+=.05*dt;c.a-=.1*dt;}
    drawCoin(c);return c.x>-20&&c.a>0;
  });

  /* draw Invy */
  drawInvy(P.x,P.y,P.animF,P.sq,P.st,dead);
  if(dead&&P.y<GROUND){P.vy+=.8*dt;P.y+=P.vy*dt;if(P.y>=GROUND){P.y=GROUND;P.vy=0;}}

  /* particles */
  parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.28*dt;p.l-=.04*dt;
    ctx.globalAlpha=Math.max(0,p.l);
    ctx.beginPath();ctx.arc(p.x,p.y,p.s*(p.col?1:.65),0,Math.PI*2);
    ctx.fillStyle=p.col||'rgba(190,205,255,.55)';ctx.fill();ctx.globalAlpha=1;
  });
  for(let i=parts.length-1;i>=0;i--)if(parts[i].l<=0)parts.splice(i,1);

  /* float msgs */
  msgs.forEach(m=>{m.y+=m.vy*dt;m.l-=.025*dt;
    ctx.globalAlpha=Math.max(0,m.l);ctx.font='bold 13px DM Sans,sans-serif';
    ctx.fillStyle='#7cc44f';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.t,m.x,m.y);ctx.globalAlpha=1;
  });
  for(let i=msgs.length-1;i>=0;i--)if(msgs[i].l<=0)msgs.splice(i,1);

  /* hi score */
  if(hiScore>0){ctx.font='11px DM Sans,sans-serif';ctx.fillStyle='rgba(240,246,255,.25)';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('MEJOR: '+hiScore,W-22,22);}

  /* game over */
  if(dead){
    ctx.fillStyle='rgba(8,12,20,.62)';ctx.fillRect(0,0,W,H);
    ctx.font='bold 30px Syne,sans-serif';ctx.fillStyle='#f0f6ff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('¡Invy cayó! 😅',W/2,H*.39);
    ctx.font='15px DM Sans,sans-serif';ctx.fillStyle='rgba(240,246,255,.45)';ctx.fillText('Puntuación: '+score+'  ·  Mejor: '+hiScore,W/2,H*.46);
    ctx.font='12px DM Sans,sans-serif';ctx.fillStyle='rgba(90,158,58,.75)';
    ctx.globalAlpha=.5+.38*Math.sin(frame*.08);ctx.fillText('Tap o Espacio para reintentar',W/2,H*.53);ctx.globalAlpha=1;
  }
}
requestAnimationFrame(loop);
</script>
