<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#111;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#d4d4d0;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
.garamond{font-family:'EB Garamond','Georgia',serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .2s ease both}
.scale-in{animation:scaleIn .18s ease both}
.spinner{animation:spin .7s linear infinite}
input,textarea,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.line-clamp-1{overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1}
.line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2}
</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,remove,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={
  apiKey:"AIzaSyCVBfb-baz0rIN8s-rPhqSazMCF8u8JcM8",
  authDomain:"inverwork-inverfin.firebaseapp.com",
  databaseURL:"https://inverwork-inverfin-default-rtdb.firebaseio.com",
  projectId:"inverwork-inverfin",
  storageBucket:"inverwork-inverfin.firebasestorage.app",
  messagingSenderId:"459905480268",
  appId:"1:459905480268:web:d65e2a6b8821238ff226e9"
};
const app=initializeApp(cfg);
const db=getDatabase(app);
window.DB={
  /* users */
  setUser:(id,d)=>set(ref(db,`users/${id}`),d),
  getUsers:()=>get(ref(db,'users')).then(s=>s.val()||{}),
  onUsers:cb=>onValue(ref(db,'users'),s=>cb(s.val()||{})),
  /* projects */
  addProject:d=>push(ref(db,'projects'),d),
  updProject:(id,d)=>update(ref(db,`projects/${id}`),d),
  delProject:id=>remove(ref(db,`projects/${id}`)),
  onProjects:cb=>onValue(ref(db,'projects'),s=>cb(s.val()||{})),
  /* tasks — live per project */
  addTask:(pid,d)=>push(ref(db,`tasks/${pid}`),d),
  updTask:(pid,tid,d)=>update(ref(db,`tasks/${pid}/${tid}`),d),
  delTask:(pid,tid)=>remove(ref(db,`tasks/${pid}/${tid}`)),
  onTasks:(pid,cb)=>onValue(ref(db,`tasks/${pid}`),s=>cb(s.val()||{})),
  /* tasks — snapshot all */
  snapTasks:()=>get(ref(db,'tasks')).then(s=>s.val()||{}),
  /* time logs */
  addTimeLog:(tid,d)=>push(ref(db,`timelogs/${tid}`),d),
  /* costs */
  addCost:(pid,d)=>push(ref(db,`costs/${pid}`),d),
  delCost:(pid,cid)=>remove(ref(db,`costs/${pid}/${cid}`)),
  onCosts:(pid,cb)=>onValue(ref(db,`costs/${pid}`),s=>cb(s.val()||{})),
  /* reports */
  addReport:d=>push(ref(db,'reports'),d),
  onReports:cb=>onValue(ref(db,'reports'),s=>cb(s.val()||{})),
  /* comments */
  addComment:(rid,d)=>push(ref(db,`comments/${rid}`),d),
  onComments:(rid,cb)=>onValue(ref(db,`comments/${rid}`),s=>cb(s.val()||{})),
};
window.dispatchEvent(new Event('firebase-ready'));
</script>

const{useState,useEffect,useRef,useCallback}=React;

/* ── utils ── */
const now   = ()=>new Date().toISOString();
const uid   = ()=>Math.random().toString(36).slice(2,9);
const fmtD  = d=>d?new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtT  = d=>d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'';
const pct   = tasks=>{const a=Object.values(tasks||{});return a.length?Math.round(a.filter(t=>t.status==='Completado').length/a.length*100):0};
const ADMIN = {id:'admin',name:'Administrador',role:'admin',pin:'0000',company:'Inverfin'};
const GC    = 'inverfin2025';

/* ── status map ── */
const SM={
  'Pendiente'  :{dot:'bg-ink-faint', tx:'text-ink-muted', bg:'bg-paper-soft border-paper-border'},
  'En progreso':{dot:'bg-ink-light', tx:'text-ink-light', bg:'bg-paper-soft border-paper-border'},
  'Completado' :{dot:'bg-accent',    tx:'text-accent-dark',bg:'bg-accent-light border-accent/25'},
  'Activo'     :{dot:'bg-ink-light', tx:'text-ink-light', bg:'bg-paper-soft border-paper-border'},
  'Pausado'    :{dot:'bg-ink-faint', tx:'text-ink-muted', bg:'bg-paper-soft border-paper-border'},
  'Finalizado' :{dot:'bg-accent',    tx:'text-accent-dark',bg:'bg-accent-light border-accent/25'},
  'Bloqueado'  :{dot:'bg-red-400',   tx:'text-red-600',   bg:'bg-red-50 border-red-100'},
};

/* ── ATOMS ── */
const Tag=({s})=>{const c=SM[s]||SM['Pendiente'];return(
  <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded text-xs font-medium border ${c.bg} ${c.tx}`}>
    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${c.dot}`}/>
    {s}
  </span>
)};

const Bar=({v})=>(
  <div className="h-1 w-full bg-paper-border rounded-full overflow-hidden">
    <div className="h-full rounded-full transition-all duration-500"
      style={{width:`${Math.min(v,100)}%`,background:v===100?'#2a7a4b':'#111'}}/>
  </div>
);

/* shared input style */
const IS="w-full px-3 py-2.5 bg-white border border-paper-border rounded text-sm text-ink outline-none focus:border-ink transition-colors placeholder:text-ink-faint";

const F=({label,children,half})=>(
  <div className={`mb-4 ${half?'flex-1':''}`}>
    {label&&<label className="block text-xs font-medium text-ink-muted uppercase tracking-widest mb-1.5">{label}</label>}
    {children}
  </div>
);
const Inp=({label,half,...p})=><F label={label} half={half}><input className={IS} {...p}/></F>;
const TA=({label,...p})=><F label={label}><textarea className={`${IS} resize-none`} rows={3} {...p}/></F>;
const Sel=({label,opts,...p})=><F label={label}><select className={`${IS} appearance-none`} {...p}>{opts.map(o=><option key={o}>{o}</option>)}</select></F>;

const B=({children,v='primary',sm,full,className='',disabled,...p})=>{
  const base=`inline-flex items-center justify-center font-medium rounded transition-colors disabled:opacity-40 disabled:cursor-not-allowed ${sm?'px-3 py-1.5 text-xs':'px-4 py-2.5 text-sm'} ${full?'w-full':''}`;
  const vs={
    primary:`${base} bg-ink text-white hover:bg-ink-light`,
    ghost:`${base} bg-white border border-paper-border text-ink-muted hover:border-ink hover:text-ink`,
    accent:`${base} bg-accent text-white hover:bg-accent-dark`,
    red:`${base} bg-white border border-paper-border text-ink-muted hover:border-red-300 hover:text-red-500`,
  };
  return<button className={`${vs[v]||vs.primary} ${className}`} disabled={disabled} {...p}>{children}</button>;
};

const Hr=()=><div className="my-1 h-px bg-paper-border"/>;

const Modal=({title,sub,onClose,wide,children})=>(
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/25 backdrop-blur-[2px]"
    onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
    <div className={`bg-white border border-paper-border rounded-lg shadow-xl w-full ${wide?'max-w-2xl':'max-w-md'} max-h-[92vh] flex flex-col scale-in`}>
      <div className="flex items-start justify-between px-6 py-5 border-b border-paper-border flex-shrink-0">
        <div>
          <h2 className="garamond text-xl font-medium text-ink">{title}</h2>
          {sub&&<p className="text-xs text-ink-muted mt-0.5">{sub}</p>}
        </div>
        <button onMouseDown={onClose} className="text-ink-faint hover:text-ink transition-colors text-xl leading-none ml-4">×</button>
      </div>
      <div className="px-6 py-5 overflow-y-auto flex-1">{children}</div>
    </div>
  </div>
);

/* ── AUTH ── */
const Auth=({onLogin})=>{
  const[mode,setMode]=useState('login');
  const[f,sf]=useState({name:'',pin:'',role:'empleado',code:''});
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const u=k=>e=>sf(p=>({...p,[k]:e.target.value}));

  const login=async()=>{
    if(!f.name||!f.pin){setErr('Completa nombre y PIN');return}
    setBusy(true);setErr('');
    if(f.name.toLowerCase()==='admin'&&f.pin==='0000'){onLogin(ADMIN);return}
    const users=await window.DB.getUsers();
    const found=Object.values(users).find(x=>x.name.toLowerCase()===f.name.toLowerCase()&&x.pin===f.pin);
    if(!found){setErr('Nombre o PIN incorrecto');setBusy(false);return}
    onLogin(found);
  };

  const reg=async()=>{
    if(!f.name||f.pin.length!==4){setErr('Nombre y PIN de 4 dígitos requeridos');return}
    if(f.role==='gerencia'&&f.code!==GC){setErr('Código de gerencia incorrecto');return}
    setBusy(true);setErr('');
    const users=await window.DB.getUsers();
    if(Object.values(users).find(x=>x.name.toLowerCase()===f.name.toLowerCase())){setErr('Ese nombre ya existe');setBusy(false);return}
    const id=uid();
    const nu={id,name:f.name,pin:f.pin,role:f.role,company:'Inverfin',createdAt:now()};
    await window.DB.setUser(id,nu);
    onLogin(nu);
  };

  return(
    <div className="min-h-screen flex">
      {/* left dark panel */}
      <div className="hidden lg:flex flex-col justify-between w-80 xl:w-96 bg-ink flex-shrink-0 p-12">
        <div>
          <div className="flex items-center gap-2.5 mb-14">
            <img src={LOGO} className="w-8 h-8 rounded-lg opacity-90" alt=""/>
            <span className="garamond text-white text-xl font-medium">InverWork</span>
          </div>
          <h2 className="garamond text-white text-3xl font-medium leading-snug mb-4">Gestión de proyectos para Inverfin Holding</h2>
          <p className="text-white/40 text-sm leading-relaxed">Proyectos, tareas, tiempo y reportes — todo centralizado y en tiempo real.</p>
        </div>
        <div>
          <p className="text-white/25 text-xs">© 2025 Inverfin Holding</p>
          <p className="text-white/15 text-xs mt-0.5 italic">Owned by Jesús Santiago</p>
        </div>
      </div>

      {/* right white panel */}
      <div className="flex-1 flex items-center justify-center p-8 bg-paper-warm">
        <div className="w-full max-w-sm fade-in">
          <div className="lg:hidden flex items-center gap-2.5 mb-10">
            <img src={LOGO} className="w-8 h-8 rounded-lg" alt=""/>
            <div>
              <div className="garamond text-xl font-medium text-ink">InverWork</div>
              <div className="text-[10px] text-ink-muted tracking-widest uppercase">Inverfin Holding</div>
            </div>
          </div>

          <h1 className="garamond text-2xl font-medium text-ink mb-1">{mode==='login'?'Iniciar sesión':'Crear cuenta'}</h1>
          <p className="text-sm text-ink-muted mb-8">{mode==='login'?'Accede con tu nombre y PIN de 4 dígitos.':'Elige tu nombre y crea un PIN.'}</p>

          {mode==='login'?(
            <>
              <Inp label="Nombre" placeholder="Tu nombre completo" value={f.name} onChange={u('name')}/>
              <Inp label="PIN" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={f.pin} onChange={u('pin')} onKeyDown={e=>e.key==='Enter'&&login()}/>
              {err&&<p className="text-red-500 text-xs mb-4">⚠ {err}</p>}
              <B full onClick={login} disabled={busy}>{busy?'Verificando…':'Entrar →'}</B>
              <p className="text-sm text-ink-muted text-center mt-5">¿Sin cuenta? <span className="text-ink underline cursor-pointer" onClick={()=>{setMode('reg');setErr('')}}>Regístrate</span></p>
            </>
          ):(
            <>
              <Inp label="Nombre completo" placeholder="Ej. María González" value={f.name} onChange={u('name')}/>
              <Inp label="PIN (4 dígitos)" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={f.pin} onChange={u('pin')}/>

/* ── PROJECT DETAIL — fully reactive ── */
const ProjectDetail=({user,pid,project,onBack})=>{
  const[tasks,setTasks]=useState({});
  const[costs,setCosts]=useState({});
  const[pane,setPane]=useState('tasks');
  const[showTask,setShowTask]=useState(false);
  const[showCost,setShowCost]=useState(false);
  const[tf,stf]=useState({name:'',description:'',status:'Pendiente',timeEstimated:''});
  const[cf,scf]=useState({description:'',amount:'',date:''});
  const[timers,setTimers]=useState({});
  const[elapsed,setElapsed]=useState({});

  /* live subscriptions */
  useEffect(()=>{
    const u1=window.DB.onTasks(pid,d=>setTasks(d||{}));
    const u2=window.DB.onCosts(pid,d=>setCosts(d||{}));
    return()=>{u1();u2()};
  },[pid]);

  /* elapsed counter for running timers */
  useEffect(()=>{
    const iv=setInterval(()=>{
      setElapsed(prev=>{
        const next={...prev};
        Object.entries(timers).forEach(([tid,t])=>{
          if(t.running) next[tid]=Math.floor((Date.now()-t.start)/1000);
        });
        return next;
      });
    },1000);
    return()=>clearInterval(iv);
  },[timers]);

  const canEdit=project.ownerId===user.id;
  const v=pct(tasks);
  const taskArr=Object.entries(tasks);
  const totalCost=Object.values(costs).reduce((a,c)=>a+(Number(c.amount)||0),0);

  const ut=k=>e=>stf(p=>({...p,[k]:e.target.value}));
  const uc=k=>e=>scf(p=>({...p,[k]:e.target.value}));

  const saveTask=async()=>{
    if(!tf.name.trim())return;
    await window.DB.addTask(pid,{...tf,assignedTo:user.id,assignedName:user.name,timeSpent:0,createdAt:now()});
    setShowTask(false);
    stf({name:'',description:'',status:'Pendiente',timeEstimated:''});
  };

  const changeStatus=async(tid,status)=>{
    await window.DB.updTask(pid,tid,{status});
    /* recalc project progress */
    const updated={...tasks,[tid]:{...tasks[tid],status}};
    await window.DB.updProject(pid,{progress:pct(updated)});
  };

  const delTask=async tid=>{
    if(!confirm('¿Eliminar esta tarea?'))return;
    await window.DB.delTask(pid,tid);
    const updated={...tasks};delete updated[tid];
    await window.DB.updProject(pid,{progress:pct(updated)});
  };

  const startTimer=tid=>{
    setTimers(p=>({...p,[tid]:{start:Date.now(),running:true}}));
  };

  const stopTimer=async tid=>{
    const t=timers[tid];
    if(!t?.running)return;
    const mins=Math.round((Date.now()-t.start)/60000);
    await window.DB.addTimeLog(tid,{userId:user.id,userName:user.name,duration:mins,createdAt:now()});
    const prev=Number(tasks[tid]?.timeSpent)||0;
    await window.DB.updTask(pid,tid,{timeSpent:prev+mins});
    setTimers(p=>({...p,[tid]:{running:false}}));
    setElapsed(p=>({...p,[tid]:0}));
  };

  const addCost=async()=>{
    if(!cf.description.trim()||!cf.amount)return;
    await window.DB.addCost(pid,{...cf,createdAt:now()});
    setShowCost(false);
    scf({description:'',amount:'',date:''});
  };

  const fmtElapsed=secs=>{
    const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  return(
    <div className="fade-in">
      {/* breadcrumb */}
      <button onMouseDown={onBack} className="flex items-center gap-1.5 text-xs text-ink-muted hover:text-ink transition-colors mb-5 group">
        <span className="group-hover:-translate-x-0.5 transition-transform">←</span>
        <span>Proyectos</span>
      </button>

      {/* project header */}
      <div className="pb-7 border-b border-paper-border mb-7">
        <div className="flex items-start justify-between gap-4 mb-4">
          <div>
            <h1 className="garamond text-4xl font-medium text-ink">{project.name}</h1>
            {project.description&&<p className="text-sm text-ink-muted mt-1.5 max-w-xl">{project.description}</p>}
          </div>
          {canEdit&&(
            <Sel label="" value={project.status}
              onChange={e=>window.DB.updProject(pid,{status:e.target.value})}
              opts={['Activo','En progreso','Pausado','Finalizado','Bloqueado']}
              className="w-36 flex-shrink-0"/>
          )}
        </div>
        <div className="flex items-center gap-4">
          <Tag s={project.status}/>
          <span className="text-xs text-ink-muted">{taskArr.length} tarea{taskArr.length!==1?'s':''}</span>
          <span className="text-xs text-ink-muted">{project.ownerName}</span>
          {project.startDate&&<span className="text-xs text-ink-muted">Inicio: {fmtD(project.startDate)}</span>}
          {project.endDate&&<span className="text-xs text-ink-muted">Fin: {fmtD(project.endDate)}</span>}
        </div>

        {/* progress */}
        <div className="mt-5 max-w-lg">
          <div className="flex justify-between text-xs mb-1.5">
            <span className="text-ink-muted">Progreso automático</span>
            <span className="font-mono text-ink">{v}%</span>
          </div>
          <div className="h-1.5 bg-paper-border rounded-full overflow-hidden">
            <div className="h-full rounded-full transition-all duration-500"
              style={{width:`${v}%`,background:v===100?'#2a7a4b':'#111'}}/>
          </div>
        </div>

        {/* mini stats */}
        <div className="grid grid-cols-3 gap-px mt-5 border border-paper-border rounded-lg overflow-hidden max-w-lg">
          {[['Pendiente',taskArr.filter(([,t])=>t.status==='Pendiente').length],
            ['En progreso',taskArr.filter(([,t])=>t.status==='En progreso').length],
            ['Completado',taskArr.filter(([,t])=>t.status==='Completado').length]
          ].map(([s,n])=>(
            <div key={s} className="bg-white px-4 py-3 text-center">
              <div className="garamond text-2xl font-medium text-ink">{n}</div>
              <div className="text-[10px] text-ink-muted mt-0.5">{s}</div>
            </div>
          ))}
        </div>
      </div>

      {/* tabs */}
      <div className="flex items-center justify-between border-b border-paper-border mb-6">
        <div className="flex">
          {[['tasks','Tareas'],['costs','Costes']].map(([id,lbl])=>(
            <button key={id} onMouseDown={()=>setPane(id)}
              className={`px-4 py-2.5 text-sm font-medium border-b-2 -mb-px transition-all ${pane===id?'border-ink text-ink':'border-transparent text-ink-muted hover:text-ink'}`}>
              {lbl}
              {id==='tasks'&&<span className="ml-1.5 text-xs text-ink-faint">({taskArr.length})</span>}
              {id==='costs'&&totalCost>0&&<span className="ml-1.5 text-xs text-ink-faint">${totalCost.toFixed(0)}</span>}
            </button>
          ))}
        </div>
        <div className="mb-1">
          {pane==='tasks'&&canEdit&&<B sm onMouseDown={()=>setShowTask(true)}>+ Tarea</B>}
          {pane==='costs'&&canEdit&&<B sm onMouseDown={()=>setShowCost(true)}>+ Coste</B>}
        </div>
      </div>

      {/* ── TASKS ── */}
      {pane==='tasks'&&(
        taskArr.length===0?(
          <div className="border border-paper-border rounded-lg py-16 text-center">
            <p className="garamond text-xl text-ink-muted mb-1">Sin tareas</p>
            <p className="text-xs text-ink-muted">{canEdit?'Añade la primera tarea a este proyecto.':'No hay tareas en este proyecto.'}</p>
          </div>
        ):(
          <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
            {taskArr.map(([tid,t])=>{
              const running=timers[tid]?.running;
              const spent=Number(t.timeSpent)||0;
              return(
                <div key={tid} className="bg-white px-5 py-4">
                  {/* task header */}
                  <div className="flex items-start justify-between gap-4 mb-2">
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-ink">{t.name}</div>
                      {t.description&&<p className="text-xs text-ink-muted mt-0.5 leading-relaxed">{t.description}</p>}
                    </div>
                    <Tag s={t.status}/>
                  </div>

                  {/* task meta */}
                  <div className="flex items-center gap-4 text-xs text-ink-muted mb-3 flex-wrap">
                    {t.timeEstimated&&<span>Est. <span className="font-mono text-ink">{t.timeEstimated}h</span></span>}
                    <span>Real <span className="font-mono text-ink">{(spent/60).toFixed(1)}h</span></span>
                    {t.assignedName&&<span>👤 {t.assignedName}</span>}
                    {running&&<span className="text-accent font-medium font-mono">⏱ {fmtElapsed(elapsed[tid]||0)}</span>}
                  </div>

                  {/* actions */}
                  {canEdit&&(
                    <div className="flex items-center gap-2 flex-wrap">
                      {/* status buttons */}
                      {['Pendiente','En progreso','Completado'].map(s=>(
                        <button key={s} onMouseDown={()=>changeStatus(tid,s)}
                          className={`px-2.5 py-1 rounded border text-xs font-medium transition-all ${t.status===s?'bg-ink border-ink text-white':'border-paper-border text-ink-muted hover:border-ink-faint hover:text-ink'}`}>
                          {s}
                        </button>
                      ))}
                      <div className="ml-auto flex gap-2">
                        {running
                          ?<button onMouseDown={()=>stopTimer(tid)} className="px-3 py-1 bg-red-50 border border-red-200 text-red-600 rounded text-xs font-medium hover:bg-red-500 hover:text-white transition-all">⏹ Detener</button>
                          :<button onMouseDown={()=>startTimer(tid)} className="px-3 py-1 bg-paper-soft border border-paper-border text-ink-muted rounded text-xs font-medium hover:border-ink hover:text-ink transition-all">▶ Timer</button>
                        }
                        <button onMouseDown={()=>delTask(tid)} className="px-2.5 py-1 border border-paper-border text-ink-faint rounded text-xs hover:border-red-300 hover:text-red-500 transition-all">×</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )
      )}

      {/* ── COSTS ── */}
      {pane==='costs'&&(
        <div>
          {Object.keys(costs).length>0&&(
            <div className="flex items-center gap-3 mb-5">
              <span className="garamond text-2xl font-medium text-ink">Total</span>
              <span className="garamond text-3xl font-medium text-accent">${totalCost.toFixed(2)}</span>
            </div>
          )}
          {Object.keys(costs).length===0?(
            <div className="border border-paper-border rounded-lg py-16 text-center">
              <p className="garamond text-xl text-ink-muted mb-1">Sin costes</p>
              <p className="text-xs text-ink-muted">{canEdit?'Registra costes externos de este proyecto.':'No hay costes registrados.'}</p>
            </div>
          ):(
            <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
              {Object.entries(costs).map(([cid,c])=>(
                <div key={cid} className="bg-white flex items-center justify-between px-5 py-4">
                  <div>
                    <div className="font-medium text-ink">{c.description}</div>
                    <div className="text-xs text-ink-muted mt-0.5">{fmtD(c.date)}</div>
                  </div>
                  <div className="flex items-center gap-4">
                    <span className="garamond text-xl font-medium text-ink">${Number(c.amount).toFixed(2)}</span>
                    {canEdit&&<button onMouseDown={()=>window.DB.delCost(pid,cid)} className="text-ink-faint hover:text-red-500 transition-colors text-lg leading-none">×</button>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── TASK MODAL ── */}
      {showTask&&(
        <Modal title="Nueva tarea" onClose={()=>setShowTask(false)}>
          <Inp label="Nombre *" value={tf.name} onChange={ut('name')} placeholder="Nombre de la tarea"/>
          <TA label="Descripción" value={tf.description} onChange={ut('description')} placeholder="Descripción opcional"/>
          <div className="flex gap-3">
            <Inp label="Tiempo estimado (h)" type="number" value={tf.timeEstimated} onChange={ut('timeEstimated')} placeholder="0" half/>
            <Sel label="Estado" value={tf.status} onChange={ut('status')} opts={['Pendiente','En progreso','Completado']}/>
          </div>
          <div className="flex gap-3 pt-2">
            <B v="ghost" full onMouseDown={()=>setShowTask(false)}>Cancelar</B>
            <B full onMouseDown={saveTask} disabled={!tf.name.trim()}>Guardar tarea</B>
          </div>
        </Modal>
      )}

      {/* ── COST MODAL ── */}
      {showCost&&(
        <Modal title="Añadir coste externo" onClose={()=>setShowCost(false)}>
          <TA label="Concepto *" value={cf.description} onChange={uc('description')} placeholder="Ej. Consultor, dominio, API, freelancer…"/>
          <div className="flex gap-3">
            <Inp label="Importe ($) *" type="number" value={cf.amount} onChange={uc('amount')} placeholder="0.00" half/>
            <Inp label="Fecha" type="date" value={cf.date} onChange={uc('date')} half/>
          </div>
          <div className="flex gap-3 pt-2">
            <B v="ghost" full onMouseDown={()=>setShowCost(false)}>Cancelar</B>
            <B full onMouseDown={addCost} disabled={!cf.description.trim()||!cf.amount}>Añadir</B>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ── PROJECTS PAGE — wrapper ── */
const Projects=({user,projects,allTasks,openProj,setOpenProj})=>{
  if(openProj) return <ProjectDetail user={user} pid={openProj.id} project={openProj.data} onBack={()=>setOpenProj(null)}/>;
  return <ProjectsList user={user} projects={projects} allTasks={allTasks} onOpen={(pid,p)=>setOpenProj({id:pid,data:p})}/>;
};

/* ── REPORTS ── */
const Reports=({user,projects,reports})=>{
  const[show,setShow]=useState(false);
  const[sel,setSel]=useState(null);
  const[f,sf]=useState({projectId:'',tasks:'',hoursWorked:'',problems:'',notes:'',date:new Date().toISOString().slice(0,10)});
  const[comment,setComment]=useState('');
  const[comments,setComments]=useState({});
  const upd=k=>e=>sf(p=>({...p,[k]:e.target.value}));
  const isAdmin=user.role==='admin'||user.role==='gerencia';
  const list=Object.entries(reports||{})
    .filter(([,r])=>isAdmin||r.userId===user.id)
    .sort((a,b)=>new Date(b[1].createdAt||0)-new Date(a[1].createdAt||0));

  useEffect(()=>{
    if(!sel)return;
    return window.DB.onComments(sel[0],d=>setComments(d||{}));
  },[sel]);

  const create=async()=>{
    if(!f.date)return;
    await window.DB.addReport({...f,userId:user.id,userName:user.name,
      projectName:projects[f.projectId]?.name||'',createdAt:now()});
    setShow(false);
    sf({projectId:'',tasks:'',hoursWorked:'',problems:'',notes:'',date:new Date().toISOString().slice(0,10)});
  };

  const sendComment=async()=>{
    if(!comment.trim()||!sel)return;
    await window.DB.addComment(sel[0],{userId:user.id,userName:user.name,text:comment,createdAt:now()});
    setComment('');
  };

  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-7 pb-6 border-b border-paper-border">
        <div>
          <h1 className="garamond text-4xl font-medium text-ink">Reportes diarios</h1>
          <p className="text-sm text-ink-muted mt-1">{list.length} reporte{list.length!==1?'s':''}</p>
        </div>
        {!isAdmin&&<B onMouseDown={()=>setShow(true)}>+ Nuevo reporte</B>}
      </div>

      {list.length===0?(
        <div className="border border-paper-border rounded-lg py-20 text-center">
          <p className="garamond text-2xl text-ink-muted mb-2">Sin reportes</p>
          {!isAdmin&&<B onMouseDown={()=>setShow(true)} className="mt-4">Crear primer reporte</B>}
        </div>
      ):(
        <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
          {list.map(([rid,r])=>(
            <div key={rid} className="bg-white px-5 py-4 hover:bg-paper-warm transition-colors cursor-pointer"
              onMouseDown={()=>setSel([rid,r])}>
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-3 flex-wrap mb-1">
                    <span className="font-medium text-ink">{r.userName}</span>
                    <span className="text-xs text-ink-muted">{fmtD(r.date)}</span>
                    {r.projectName&&<span className="text-xs text-ink-muted">· {r.projectName}</span>}
                  </div>
                  {r.tasks&&<p className="text-xs text-ink-muted line-clamp-2">{r.tasks}</p>}
                  {r.problems&&<p className="text-xs text-red-500 mt-1">⚠ {r.problems}</p>}
                </div>
                <div className="text-right flex-shrink-0">
                  <span className="garamond text-xl font-medium text-ink">{r.hoursWorked||0}h</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* detail modal */}
      {sel&&(
        <Modal title={sel[1].userName} sub={`${fmtD(sel[1].date)}${sel[1].projectName?' · '+sel[1].projectName:''}`} onClose={()=>setSel(null)} wide>
          <div className="grid grid-cols-2 gap-px border border-paper-border rounded-lg overflow-hidden mb-5">
            {[['Horas trabajadas',`${sel[1].hoursWorked||0}h`],['Proyecto',sel[1].projectName||'—']].map(([l,v])=>(
              <div key={l} className="bg-paper-soft px-4 py-3">
                <div className="text-[10px] text-ink-muted uppercase tracking-widest mb-1">{l}</div>
                <div className="garamond text-xl font-medium text-ink">{v}</div>
              </div>
            ))}
          </div>
          {sel[1].tasks&&<div className="mb-4"><p className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-2">Tareas realizadas</p><p className="text-sm text-ink leading-relaxed border-l-2 border-paper-border pl-3">{sel[1].tasks}</p></div>}
          {sel[1].problems&&<div className="mb-4 p-3 border border-red-100 rounded-lg bg-red-50"><p className="text-[10px] font-semibold text-red-400 uppercase tracking-widest mb-1">Problemas</p><p className="text-sm text-red-700">{sel[1].problems}</p></div>}
          {sel[1].notes&&<div className="mb-4 p-3 border border-paper-border rounded-lg bg-paper-soft"><p className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-1">Notas</p><p className="text-sm text-ink">{sel[1].notes}</p></div>}
          <Hr/>
          <div className="mt-4">
            <p className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest mb-3">Comentarios</p>
            <div className="space-y-3 mb-3 max-h-44 overflow-y-auto">
              {Object.values(comments).length===0&&<p className="text-xs text-ink-faint">Sin comentarios aún.</p>}
              {Object.values(comments).map((c,i)=>(
                <div key={i} className="flex gap-3">
                  <div className="w-6 h-6 rounded-full bg-paper-soft border border-paper-border flex items-center justify-center text-xs font-medium text-ink-muted flex-shrink-0">{c.userName[0]}</div>
                  <div className="flex-1">
                    <div className="text-xs font-medium text-ink">{c.userName} <span className="text-ink-faint font-normal">{fmtT(c.createdAt)}</span></div>
                    <div className="text-sm text-ink mt-0.5">{c.text}</div>
                  </div>
                </div>
              ))}
            </div>
            {isAdmin&&(
              <div className="flex gap-2">
                <input className={`${IS} flex-1`} placeholder="Añadir comentario…" value={comment}
                  onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendComment()}/>
                <B sm onMouseDown={sendComment} disabled={!comment.trim()}>Enviar</B>
              </div>
            )}
          </div>
        </Modal>
      )}

      {/* create modal */}
      {show&&(
        <Modal title="Nuevo reporte diario" onClose={()=>setShow(false)} wide>
          <div className="flex gap-3">
            <Inp label="Fecha *" type="date" value={f.date} onChange={upd('date')} half/>
            <F label="Proyecto" half>
              <select className={`${IS} appearance-none`} value={f.projectId} onChange={upd('projectId')}>
                <option value="">— Sin proyecto —</option>
                {Object.entries(projects).filter(([,p])=>p.ownerId===user.id).map(([pid,p])=>(
                  <option key={pid} value={pid}>{p.name}</option>
                ))}
              </select>
            </F>
          </div>
          <Inp label="Horas trabajadas" type="number" value={f.hoursWorked} onChange={upd('hoursWorked')} placeholder="0"/>
          <TA label="Tareas realizadas hoy" value={f.tasks} onChange={upd('tasks')} placeholder="Describe el trabajo completado hoy…"/>
          <TA label="Problemas encontrados" value={f.problems} onChange={upd('problems')} placeholder="Errores, bloqueos, obstáculos…"/>
          <TA label="Notas y observaciones" value={f.notes} onChange={upd('notes')} placeholder="Ideas, aprendizajes, próximos pasos…"/>
          <div className="flex gap-3 pt-2">
            <B v="ghost" full onMouseDown={()=>setShow(false)}>Cancelar</B>
            <B full onMouseDown={create}>Enviar reporte</B>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ── TEAM ── */

        <h1 className="garamond text-4xl font-medium text-ink">Equipo</h1>
        <p className="text-sm text-ink-muted mt-1">Vista general — sin acceso a tareas, tiempos ni costes de otros.</p>

        </div>
      ):(
        <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
          {others.map(([pid,p])=>{
            const v=pct(allTasks[pid]||{});
            return(
              <div key={pid} className="bg-white flex items-center gap-5 px-5 py-4 hover:bg-paper-warm transition-colors">

                  <div className="font-medium text-ink">{p.name}</div>
                  <div className="text-xs text-ink-muted mt-0.5">{p.ownerName}</div>

                <div className="w-28">
                  <div className="mb-1"><Bar v={v}/></div>
                  <div className="text-xs text-ink-muted font-mono text-right">{v}%</div>

                <Tag s={p.status}/>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ── OVERVIEW (admin/gerencia) ── */
const Overview=({user,projects,allTasks,reports,users})=>{
  const cDonut=useRef(null),cBar=useRef(null);
  const iD=useRef(null),iB=useRef(null);
  const pa=Object.entries(projects);
  const avgPct=pa.length?Math.round(pa.reduce((a,[pid])=>a+pct(allTasks[pid]||{}),0)/pa.length):0;
  const today=new Date().toDateString();

  useEffect(()=>{
    if(!cDonut.current)return;
    if(iD.current)iD.current.destroy();
    const sts=['Activo','En progreso','Pausado','Finalizado','Bloqueado'];
    iD.current=new Chart(cDonut.current,{
      type:'doughnut',
      data:{
        labels:sts,
        datasets:[{
          data:sts.map(s=>pa.filter(([,p])=>p.status===s).length),
          backgroundColor:['#111111','#444444','#888888','#2a7a4b','#c0392b'],
          borderWidth:3,borderColor:'#fff',hoverOffset:3
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'68%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Inter'},padding:12,color:'#888'}}}
      }
    });
  },[projects]);

  useEffect(()=>{
    if(!cBar.current||!pa.length)return;
    if(iB.current)iB.current.destroy();
    const labels=pa.map(([,p])=>p.name.length>22?p.name.slice(0,22)+'…':p.name);
    const data=pa.map(([pid])=>pct(allTasks[pid]||{}));
    iB.current=new Chart(cBar.current,{
      type:'bar',
      data:{
        labels,
        datasets:[{
          data,
          backgroundColor:data.map(v=>v===100?'#2a7a4b':'#111'),
          borderRadius:2,barThickness:14
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10,family:'Inter'},color:'#bbb'},grid:{color:'#f0f0ee'}},
          y:{grid:{display:false},ticks:{font:{size:10,family:'Inter'},color:'#888'}}
        }
      }
    });
  },[projects,allTasks]);

  const kpis=[
    {n:pa.length,             l:'Proyectos'},
    {n:`${avgPct}%`,          l:'Avance promedio'},
    {n:Object.values(users||{}).filter(u=>u.role==='empleado').length, l:'Empleados'},
    {n:Object.values(reports||{}).filter(r=>new Date(r.date).toDateString()===today).length, l:'Reportes hoy'},
  ];

  return(
    <div className="fade-in">
      <div className="mb-7 pb-6 border-b border-paper-border">
        <h1 className="garamond text-4xl font-medium text-ink">Dashboard</h1>
        <p className="text-sm text-ink-muted mt-1">Visibilidad completa del equipo en tiempo real.</p>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-px bg-paper-border border border-paper-border rounded-lg overflow-hidden mb-7">
        {kpis.map((k,i)=>(
          <div key={i} className="bg-white px-5 py-5">
            <div className="garamond text-3xl font-medium text-ink mb-1">{k.n}</div>
            <div className="text-xs text-ink-muted">{k.l}</div>
          </div>
        ))}
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-5 mb-7">
        <div className="lg:col-span-2 border border-paper-border rounded-lg p-5 bg-white">
          <h3 className="garamond text-lg font-medium text-ink mb-0.5">Por estado</h3>
          <p className="text-xs text-ink-muted mb-4">Distribución de proyectos</p>
          <div style={{height:180}}><canvas ref={cDonut}/></div>
        </div>
        <div className="lg:col-span-3 border border-paper-border rounded-lg p-5 bg-white">
          <h3 className="garamond text-lg font-medium text-ink mb-0.5">Avance por proyecto</h3>
          <p className="text-xs text-ink-muted mb-4">Verde = 100% completado</p>
          <div style={{height:Math.max(pa.length*28+20,80)}}><canvas ref={cBar}/></div>
        </div>
      </div>

      {/* Table */}
      <div className="border border-paper-border rounded-lg overflow-hidden">
        <div className="px-5 py-3 bg-paper-soft border-b border-paper-border">
          <span className="text-[10px] font-semibold text-ink-muted uppercase tracking-widest">Todos los proyectos</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead>
              <tr className="border-b border-paper-border bg-white">
                {['Proyecto','Responsable','Estado','Avance','Tareas'].map(h=>(
                  <th key={h} className="px-5 py-3 text-left text-[10px] font-semibold text-ink-muted uppercase tracking-widest">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-paper-border">
              {pa.length===0&&(
                <tr><td colSpan={5} className="px-5 py-10 text-center text-sm text-ink-muted">Sin proyectos registrados.</td></tr>
              )}
              {pa.map(([pid,p])=>{
                const tasks=allTasks[pid]||{};
                const v=pct(tasks);
                const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
                return(
                  <tr key={pid} className="bg-white hover:bg-paper-warm transition-colors">
                    <td className="px-5 py-3.5 font-medium text-ink text-sm">{p.name}</td>
                    <td className="px-5 py-3.5 text-sm text-ink-muted">{p.ownerName}</td>
                    <td className="px-5 py-3.5"><Tag s={p.status}/></td>
                    <td className="px-5 py-3.5">
                      <div className="w-24 mb-1"><Bar v={v}/></div>
                      <span className="text-xs text-ink-muted font-mono">{v}%</span>
                    </td>
                    <td className="px-5 py-3.5 text-xs text-ink-muted font-mono">{done}/{Object.keys(tasks).length}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ── USERS ── */
const Users=({users})=>{
  const all=[ADMIN,...Object.values(users)];
  const rl={admin:'Admin',gerencia:'Gerencia',empleado:'Empleado'};
  return(
    <div className="fade-in">
      <div className="mb-7 pb-6 border-b border-paper-border">
        <h1 className="garamond text-4xl font-medium text-ink">Usuarios</h1>
        <p className="text-sm text-ink-muted mt-1">{all.length} usuario{all.length!==1?'s':''} registrados</p>
      </div>
      <div className="border border-paper-border rounded-lg overflow-hidden divide-y divide-paper-border">
        {all.map(u=>(
          <div key={u.id} className="bg-white flex items-center gap-4 px-5 py-3.5 hover:bg-paper-warm transition-colors">
            <div className="w-8 h-8 rounded-full bg-paper-soft border border-paper-border flex items-center justify-center text-sm font-medium text-ink-muted flex-shrink-0">
              {u.name[0].toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-ink text-sm">{u.name}</div>
              <div className="text-xs text-ink-muted">{u.company||'Inverfin'}</div>
            </div>
            <span className="text-xs text-ink-muted border border-paper-border px-2.5 py-1 rounded">{rl[u.role]||u.role}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── NOTIF PANEL ── */
const NotifPanel=({reports,onClose})=>{
  const recent=Object.values(reports||{})
    .sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))
    .slice(0,15);
  return(
    <div className="fixed inset-0 z-50 flex items-start justify-end pt-16 pr-4 md:pt-4"
      onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white border border-paper-border rounded-lg shadow-xl w-72 overflow-hidden scale-in">
        <div className="px-4 py-3 border-b border-paper-border flex items-center justify-between">
          <span className="garamond text-base font-medium text-ink">Notificaciones</span>
          <button onMouseDown={onClose} className="text-ink-faint hover:text-ink text-lg leading-none">×</button>
        </div>
        <div className="max-h-80 overflow-y-auto divide-y divide-paper-border">
          {recent.length===0&&<div className="px-4 py-8 text-sm text-ink-muted text-center">Sin notificaciones.</div>}
          {recent.map((r,i)=>(
            <div key={i} className="px-4 py-3 hover:bg-paper-warm transition-colors">
              <p className="text-xs text-ink"><span className="font-medium">{r.userName}</span> envió un reporte</p>
              <p className="text-[10px] text-ink-faint mt-0.5">{fmtD(r.date)}{r.projectName?' · '+r.projectName:''}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
const App=()=>{
  const[fbReady,   setFbReady]   =useState(false);
  const[splash,    setSplash]    =useState(true);
  const[user,      setUser]      =useState(null);
  const[tab,       setTab]       =useState('dashboard');
  const[openProj,  setOpenProj]  =useState(null);
  const[projects,  setProjects]  =useState({});
  const[allTasks,  setAllTasks]  =useState({});
  const[reports,   setReports]   =useState({});
  const[users,     setUsers]     =useState({});
  const[synced,    setSynced]    =useState(false);
  const[notifs,    setNotifs]    =useState(0);
  const[showNotif, setShowNotif] =useState(false);

  /* firebase ready */
  useEffect(()=>{
    const h=()=>{setFbReady(true);setSynced(true);setTimeout(()=>setSplash(false),1200)};
    window.addEventListener('firebase-ready',h);
    setTimeout(()=>setSplash(false),5000); // fallback
    return()=>window.removeEventListener('firebase-ready',h);
  },[]);

  /* live data after login */
  useEffect(()=>{
    if(!fbReady||!user)return;
    const subs=[];
    subs.push(window.DB.onProjects(d=>setProjects(d||{})));
    subs.push(window.DB.onReports(d=>{
      const rd=d||{};
      setReports(rd);
      setNotifs(Object.values(rd).filter(r=>r.userId!==user.id).length);
    }));
    subs.push(window.DB.onUsers(d=>setUsers(d||{})));
    /* tasks — live listener on /tasks so we catch all changes */
    const{getDatabase,ref,onValue}=window.__fbModules||{};
    /* fallback: poll every 10s if live not available */
    const loadTasks=()=>window.DB.snapTasks().then(d=>setAllTasks(d||{}));
    loadTasks();
    const iv=setInterval(loadTasks,10000);
    return()=>{subs.forEach(u=>u());clearInterval(iv)};
  },[fbReady,user]);

  const isAdmin=user?.role==='admin'||user?.role==='gerencia';

  const TABS=user?[
    ...(!isAdmin?[{id:'dashboard',label:'Inicio',icon:'⌂'}]:[]),
    {id:'projects',label:'Proyectos',icon:'▤'},
    ...(!isAdmin?[{id:'team',label:'Equipo',icon:'◎'}]:[]),
    {id:'reports',label:'Reportes',icon:'✎'},
    ...(isAdmin?[{id:'overview',label:'Dashboard',icon:'◈'},{id:'users',label:'Usuarios',icon:'◉'}]:[]),
  ]:[];

  const goTab=t=>{
    setTab(t);
    setOpenProj(null); // always clear detail when switching tabs
  };

  const login=u=>{
    setUser(u);
    setTab(isAdmin?'overview':'dashboard');
  };
  const logout=()=>{setUser(null);setTab('dashboard');setOpenProj(null)};

  if(splash) return <Splash/>;
  if(!user)  return <Auth onLogin={u=>{setUser(u);setTab((u.role==='admin'||u.role==='gerencia')?'overview':'dashboard')}}/>;

  return(
    <div className="min-h-screen bg-white flex flex-col md:flex-row">
      {/* sidebar — desktop */}
      <Sidebar user={user} tab={openProj?'projects':tab} setTab={goTab} tabs={TABS}
        synced={synced} notifs={notifs} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>

      {/* main area */}
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        {/* mobile header */}
        <MobileHeader user={user} tab={openProj?'projects':tab} tabs={TABS} setTab={goTab}
          notifs={notifs} onNotif={()=>setShowNotif(v=>!v)} onLogout={logout}/>

        {/* scrollable content */}
        <main className="flex-1 overflow-y-auto">
          <div className="max-w-5xl mx-auto px-5 sm:px-8 lg:px-12 py-8 pb-28 md:pb-12">

            {/* Projects tab renders its own detail internally */}
            {tab==='projects'&&(
              <Projects user={user} projects={projects} allTasks={allTasks}
                openProj={openProj} setOpenProj={setOpenProj}/>
            )}
            {tab==='dashboard'&&!isAdmin&&(
              <Dashboard user={user} projects={projects} allTasks={allTasks}
                reports={reports} setTab={goTab} setOpenProj={setOpenProj}/>
            )}
            {tab==='team'&&!isAdmin&&(
              <Team user={user} projects={projects} allTasks={allTasks}/>
            )}
            {tab==='reports'&&(
              <Reports user={user} projects={projects} reports={reports}/>
            )}
            {tab==='overview'&&isAdmin&&(
              <Overview user={user} projects={projects} allTasks={allTasks}
                reports={reports} users={users}/>
            )}
            {tab==='users'&&isAdmin&&(
              <Users users={users}/>
            )}
          </div>
        </main>

        {/* footer — desktop only */}
        <footer className="hidden md:flex items-center justify-between px-8 py-4 border-t border-paper-border">
          <div className="flex items-center gap-2.5">
            <img src={LOGO} className="w-5 h-5 rounded opacity-50" alt=""/>
            <span className="garamond text-sm text-ink-muted">InverWork <span className="text-ink-faint">· Inverfin Holding</span></span>
          </div>
          <span className="text-xs text-ink-faint italic">Owned by Jesús Santiago · © 2025</span>
        </footer>
      </div>

      {/* mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 z-20 bg-white border-t border-paper-border flex">
        {TABS.map(t=>(
          <button key={t.id} onMouseDown={()=>goTab(t.id)}
            className={`flex-1 py-3 text-[10px] font-medium uppercase tracking-wide border-t-2 transition-all ${(openProj?'projects':tab)===t.id?'border-ink text-ink':'border-transparent text-ink-faint hover:text-ink-muted'}`}>
            <div className="text-base mb-0.5">{t.icon}</div>
            {t.label}
          </button>
        ))}
      </nav>

      {showNotif&&<NotifPanel reports={reports} onClose={()=>setShowNotif(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
