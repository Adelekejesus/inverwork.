*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
.g{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes mi{from{opacity:0;transform:scale(.97) translateY(4px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.fi{animation:fi .28s cubic-bezier(.16,1,.3,1) both}
.mi{animation:mi .22s cubic-bezier(.16,1,.3,1) both}
.spin{animation:sp .8s linear infinite}
.pulse{animation:pulse 1.6s ease-in-out infinite}
button{font-family:'Plus Jakarta Sans',system-ui,sans-serif}

import{getDatabase,ref,set,get,push,onValue,remove,update}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const app=initializeApp({apiKey:'AIzaSyCVBfb-baz0rIN8s-rPhqSazMCF8u8JcM8',authDomain:'inverwork-inverfin.firebaseapp.com',databaseURL:'https://inverwork-inverfin-default-rtdb.firebaseio.com',projectId:'inverwork-inverfin',storageBucket:'inverwork-inverfin.firebasestorage.app',messagingSenderId:'459905480268',appId:'1:459905480268:web:d65e2a6b8821238ff226e9'});
const db=getDatabase(app);
window.FB={
  setUser:(id,d)=>set(ref(db,'users/'+id),d),

  addLog:(tid,d)=>push(ref(db,'logs/'+tid),d),
  addCost:(pid,d)=>push(ref(db,'costs/'+pid),d),
  delCost:(pid,cid)=>remove(ref(db,'costs/'+pid+'/'+cid)),
  onCosts:(pid,fn)=>onValue(ref(db,'costs/'+pid),s=>fn(s.val()||{})),
  addReport:d=>push(ref(db,'reports'),d),
  onReports:fn=>onValue(ref(db,'reports'),s=>fn(s.val()||{})),
  addComment:(rid,d)=>push(ref(db,'comments/'+rid),d),
  onComments:(rid,fn)=>onValue(ref(db,'comments/'+rid),s=>fn(s.val()||{})),
  addTaskComment:(pid,tid,d)=>push(ref(db,'taskComments/'+pid+'/'+tid),d),
  onTaskComments:(pid,tid,fn)=>onValue(ref(db,'taskComments/'+pid+'/'+tid),s=>fn(s.val()||{})),

  addCollab:(pid,d)=>push(ref(db,'collabs/'+pid),d),
  updCollab:(pid,cid,d)=>update(ref(db,'collabs/'+pid+'/'+cid),d),
  delCollab:(pid,cid)=>remove(ref(db,'collabs/'+pid+'/'+cid)),
  onCollabs:(pid,fn)=>onValue(ref(db,'collabs/'+pid),s=>fn(s.val()||{})),
  onAllCollabs:fn=>onValue(ref(db,'collabs'),s=>fn(s.val()||{})),
  addInvite:d=>push(ref(db,'invites'),d),
  updInvite:(id,d)=>update(ref(db,'invites/'+id),d),
  onInvites:(userId,fn)=>onValue(ref(db,'invites'),s=>{
    const all=s.val()||{};
    fn(Object.fromEntries(Object.entries(all).filter(([,v])=>v.toUserId===userId)));
  }),
};
window.dispatchEvent(new Event('fb'));
</script>

const Btn=({ch,v='p',sm,full,dis,...p})=>{
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'6px',fontFamily:'inherit',fontWeight:700,borderRadius:'8px',cursor:dis?'not-allowed':'pointer',opacity:dis?.4:1,transition:'all .18s cubic-bezier(.16,1,.3,1)',border:'none',fontSize:sm?'12px':'13.5px',padding:sm?'6px 12px':'10px 18px',width:full?'100%':'auto',letterSpacing:'-.01em'};
  const vs={
    p:{...base,background:'var(--ink)',color:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)'},
    g:{...base,background:'var(--surface)',color:'var(--ink3)',border:'1.5px solid var(--border)'},
    a:{...base,background:'var(--grn)',color:'#fff',boxShadow:'0 1px 3px rgba(22,163,74,.3)'},
    r:{...base,background:'var(--surface)',color:'var(--ink4)',border:'1.5px solid var(--border)'},
  };
  const s=vs[v]||vs.p;
  const hover={p:'#1a1a2e',g:'var(--ink)',a:'var(--grn-d)',r:'var(--red)'};
  return <button style={s} disabled={dis}
    onMouseEnter={e=>{if(!dis){if(v==='p'){e.currentTarget.style.background='#2d2d2d';e.currentTarget.style.transform='translateY(-1px)';}if(v==='g'){e.currentTarget.style.color='var(--ink)';e.currentTarget.style.borderColor='var(--border2)';}if(v==='a')e.currentTarget.style.background='#15803d';if(v==='r'){e.currentTarget.style.color='var(--red)';e.currentTarget.style.borderColor='#fca5a5';}}}}
    onMouseLeave={e=>{if(!dis){e.currentTarget.style.background=s.background;e.currentTarget.style.transform='none';if(v==='g'){e.currentTarget.style.color='var(--ink3)';e.currentTarget.style.borderColor='var(--border)';}if(v==='r'){e.currentTarget.style.color='var(--ink4)';e.currentTarget.style.borderColor='var(--border)'}}}}
    {...p}>{p.children||ch}</button>;
};

/* ─ MODAL 2026 ─ */
const Modal=({title,sub,onClose,wide,children})=>{
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',h);
    document.body.style.overflow='hidden';
    return()=>{document.removeEventListener('keydown',h);document.body.style.overflow='';};
  },[]);
  return portal(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}}
      style={{position:'fixed',inset:0,zIndex:9000,background:'rgba(15,14,12,.4)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div className="mi" onClick={e=>e.stopPropagation()}
        style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-xl)',boxShadow:'var(--shadow-lg)',width:'100%',maxWidth:wide?'680px':'460px',maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'22px 26px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div className="g" style={{fontSize:'20px',fontWeight:700,color:'var(--ink)',letterSpacing:'-.02em'}}>{title}</div>
            {sub&&<div style={{fontSize:'12px',color:'var(--ink3)',marginTop:'3px'}}>{sub}</div>}
          </div>
          <button onClick={onClose} style={{width:'30px',height:'30px',borderRadius:'8px',border:'1.5px solid var(--border)',background:'var(--surface2)',cursor:'pointer',fontSize:'16px',color:'var(--ink3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginLeft:'12px',transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='var(--bg2)';e.currentTarget.style.color='var(--ink)'}}
            onMouseLeave={e=>{e.currentTarget.style.background='var(--surface2)';e.currentTarget.style.color='var(--ink3)'}}>×</button>
        </div>
        <div style={{padding:'22px 26px',overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
};

/* ─ AUTH ─ */
const DEPT_CODES={'it':'IT2026','consultoria':'CONS2026'};

const Auth=({onLogin})=>{
  const[mode,setMode]=useState('in');
  const[name,setName]=useState('');
  const[pin,setPin]=useState('');
  const[role,setRole]=useState('empleado');
  const[dept,setDept]=useState('it');
  const[code,setCode]=useState('');
  const[deptCode,setDeptCode]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);

  const login=async()=>{
    if(!name.trim()||!pin){setErr('Completa nombre y PIN');return}
    setBusy(true);setErr('');
    if(name.trim().toLowerCase()==='admin'&&pin==='0000'){onLogin(ADMIN);return}
    const users=await window.FB.getUsers();
    const u=Object.values(users).find(x=>x.name.toLowerCase()===name.trim().toLowerCase()&&x.pin===pin);
    if(!u){setErr('Nombre o PIN incorrecto');setBusy(false);return}
    onLogin(u);
  };

  const register=async()=>{
    if(!name.trim()||pin.length!==4){setErr('Nombre y PIN de 4 dígitos');return}
    if(role==='gerencia'&&code!==GC){setErr('Código de gerencia incorrecto');return}
    if(!DEPT_CODES[dept]||deptCode!==DEPT_CODES[dept]){setErr('Código de departamento incorrecto');return}
    setBusy(true);setErr('');
    const users=await window.FB.getUsers();
    if(Object.values(users).find(x=>x.name.toLowerCase()===name.trim().toLowerCase())){setErr('Ese nombre ya existe');setBusy(false);return}
    const id=uid();
    const nu={id,name:name.trim(),pin,role,department:dept,company:'Inverfin',createdAt:ts()};
    await window.FB.setUser(id,nu);
    onLogin(nu);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',background:'var(--bg)'}}>
      {/* LEFT PANEL — dark brand */}
      <div className="hidden lg:flex" style={{width:'380px',background:'var(--sb)',flexShrink:0,flexDirection:'column',justifyContent:'space-between',padding:'48px',position:'relative',overflow:'hidden'}}>
        {/* decorative grid */}
        <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0)',backgroundSize:'28px 28px',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:'-60px',right:'-60px',width:'280px',height:'280px',borderRadius:'50%',background:'radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%)',pointerEvents:'none'}}/>
        <div style={{position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'56px'}}>
            <img src={LOGO} style={{width:'36px',height:'36px',borderRadius:'10px',opacity:.9}} alt=""/>
            <span className="g" style={{color:'#fff',fontSize:'22px',fontWeight:700,letterSpacing:'-.02em'}}>InverWork</span>
          </div>
          <div className="g" style={{color:'#fff',fontSize:'30px',fontWeight:700,lineHeight:1.25,marginBottom:'14px',letterSpacing:'-.03em'}}>Gestión de proyectos para Inverfin Holding</div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:'14px',lineHeight:1.65}}>Proyectos, tareas, tiempo y reportes — todo en tiempo real.</div>
          <div style={{marginTop:'40px',display:'flex',flexDirection:'column',gap:'12px'}}>
            {[['IT','IT','Infraestructura y desarrollo'],['CO','Consultoría','Clientes, entregables y mandatos']].map(([icon,dept,desc])=>(
              <div key={dept} style={{display:'flex',gap:'12px',alignItems:'center',padding:'12px 16px',borderRadius:'10px',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.07)'}}>
                <span style={{fontSize:'18px'}}></span>
                <div>
                  <div style={{color:'rgba(255,255,255,.85)',fontSize:'13px',fontWeight:700}}>{dept}</div>
                  <div style={{color:'rgba(255,255,255,.3)',fontSize:'11.5px',marginTop:'1px'}}>{desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{color:'rgba(255,255,255,.18)',fontSize:'11px',position:'relative'}}>© 2026 Inverfin Holding<br/><span style={{fontStyle:'italic'}}>Created by Jesús Santiago</span></div>
      </div>

      {/* RIGHT PANEL — form */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'32px',background:'var(--bg)'}}>
        <div className="fi" style={{width:'100%',maxWidth:'380px'}}>
          {/* mobile logo */}
          <div className="lg:hidden" style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'40px'}}>
            <img src={LOGO} style={{width:'34px',height:'34px',borderRadius:'10px'}} alt=""/>
            <div>
              <div className="g" style={{fontSize:'19px',fontWeight:700,color:'var(--ink)',letterSpacing:'-.02em'}}>InverWork</div>
              <div style={{fontSize:'9px',color:'var(--ink4)',letterSpacing:'2px',textTransform:'uppercase'}}>Inverfin Holding</div>
            </div>
          </div>

          <div style={{marginBottom:'28px'}}>
            <div className="g" style={{fontSize:'28px',fontWeight:700,color:'var(--ink)',marginBottom:'6px',letterSpacing:'-.03em'}}>{mode==='in'?'Bienvenido':'Crear cuenta'}</div>
            <div style={{fontSize:'13.5px',color:'var(--ink3)'}}>{mode==='in'?'Accede con tu nombre y PIN.':'Elige un nombre y un PIN de 4 dígitos.'}</div>
          </div>

          <In label="Nombre" placeholder="Tu nombre completo" value={name} onChange={e=>setName(e.target.value)}/>
          <In label="PIN" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='in'?login():register())}/>

          {mode==='reg'&&(
            <>
              <Field label="Rol">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                  {['empleado','gerencia'].map(r=>(
                    <button key={r} onClick={()=>setRole(r)} style={{padding:'11px',border:`1.5px solid ${role===r?'var(--ink)':'var(--border)'}`,borderRadius:'8px',background:role===r?'var(--ink)':'var(--surface)',color:role===r?'#fff':'var(--ink3)',fontSize:'13px',fontWeight:600,cursor:'pointer',fontFamily:'inherit',textTransform:'capitalize',transition:'all .15s'}}>{r}</button>
                  ))}
                </div>
              </Field>
              {role==='gerencia'&&<In label="Código de gerencia" placeholder="Código confidencial" value={code} onChange={e=>setCode(e.target.value)}/>}
              <Field label="Departamento">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                  {[['it','IT'],['consultoria','Consultoría']].map(([v,lbl])=>(
                    <button key={v} onClick={()=>{setDept(v);setDeptCode('')}} style={{padding:'11px',border:`1.5px solid ${dept===v?'var(--blue)':'var(--border)'}`,borderRadius:'8px',background:dept===v?'var(--blue-l)':'var(--surface)',color:dept===v?'var(--blue)':'var(--ink3)',fontSize:'13px',fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>{lbl}</button>
                  ))}
                </div>
              </Field>
              <In label={`Código de ${dept==='it'?'IT':'Consultoría'}`} placeholder="Código del departamento" value={deptCode} onChange={e=>setDeptCode(e.target.value)}/>
            </>
          )}

          {err&&<div style={{color:'var(--red)',fontSize:'12.5px',marginBottom:'14px',padding:'10px 13px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'8px'}}>{err}</div>}

          <Btn full onClick={mode==='in'?login:register} dis={busy} style={{marginBottom:'16px',marginTop:'4px'}}>
            {busy?'Cargando…':mode==='in'?'Entrar →':'Crear cuenta →'}
          </Btn>
          <div style={{textAlign:'center',fontSize:'13px',color:'var(--ink3)'}}>
            {mode==='in'?<>¿Sin cuenta? <span onClick={()=>{setMode('reg');setErr('')}} style={{color:'var(--ink)',fontWeight:600,textDecoration:'underline',cursor:'pointer',textUnderlineOffset:'2px'}}>Regístrate</span></>

          </div>
        </div>
      </div>
    </div>
  );
};

        <button onClick={onLogout} style={{fontSize:'12px',color:'rgba(255,255,255,.4)',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}>Salir</button>
      </div>
    </div>
    <div style={{display:'flex',overflowX:'auto',borderTop:'1px solid rgba(255,255,255,.05)',padding:'0 8px'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>go(t.id)}
          style={{flexShrink:0,display:'flex',alignItems:'center',gap:'6px',padding:'9px 14px',fontSize:'12px',fontWeight:600,border:'none',borderBottom:`2px solid ${tab===t.id?'#3b82f6':'transparent'}`,color:tab===t.id?'#93c5fd':'rgba(255,255,255,.38)',background:'transparent',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'all .15s'}}>
          <span style={{width:'16px',height:'16px',display:'flex',alignItems:'center',justifyContent:'center'}}>{t.icon}</span>{t.label}
        </button>
      ))}
    </div>
  </div>
);

/* ─ DASHBOARD ─ */
const Dashboard=({user,projects,allTasks,reports,go,allCollabs})=>{
  const myOwned=Object.entries(projects).filter(([,p])=>p.ownerId===user.id);
  const myCollab=Object.entries(allCollabs||{}).flatMap(([pid,cols])=>
    Object.values(cols||{}).filter(c=>c.userId===user.id).map(c=>({pid,p:projects[pid],role:c.role}))
  ).filter(({p})=>!!p);
  const today=new Date().toDateString();
  const todayH=Object.values(reports||{})
    .filter(r=>r.userId===user.id&&new Date(r.date).toDateString()===today)
    .reduce((s,r)=>s+(+r.hoursWorked||0),0);
  const myT=myOwned.flatMap(([pid])=>Object.values(allTasks[pid]||{}));
  const pendingT=myT.filter(t=>t.status==='Pendiente').length;
  const doneT=myT.filter(t=>t.status==='Completado').length;

  return(
    <div className="fi">
      {/* greeting */}
      <div style={{marginBottom:'32px'}}>
        <div style={{fontSize:'10.5px',fontWeight:700,color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'2px',marginBottom:'8px'}}>
          {new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
        </div>
        <div className="g" style={{fontSize:'30px',fontWeight:700,color:'var(--ink)',letterSpacing:'-.03em',lineHeight:1.15}}>
          Hola, {user.name}
        </div>
        <div style={{fontSize:'13px',color:'var(--ink4)',marginTop:'5px'}}>
          {user.department==='consultoria'?'Consultoría':'IT'} · Inverfin Holding
        </div>
      </div>

      {/* stat strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px',marginBottom:'28px'}}>
        {[
          {n:myOwned.filter(([,p])=>['Activo','En progreso'].includes(p.status)).length, l:'Proyectos activos',  top:'var(--blue)'},
          {n:myCollab.length,  l:'Colaboraciones',    top:'var(--purple)'},
          {n:pendingT,         l:'Tareas pendientes', top:'var(--amber)'},
          {n:todayH?todayH+'h':'—', l:'Horas hoy',   top:'var(--grn)'},
        ].map((s,i)=>(
          <div key={i} style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'16px 18px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'3px',background:s.top,borderRadius:'var(--radius-lg) var(--radius-lg) 0 0'}}/>
            <div style={{fontSize:'26px',fontWeight:800,color:'var(--ink)',letterSpacing:'-.04em',marginBottom:'3px',marginTop:'2px',fontFamily:"'Syne',sans-serif"}}>{s.n}</div>
            <div style={{fontSize:'11.5px',color:'var(--ink4)',fontWeight:500}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* projects + collabs */}
      <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

        {/* mis proyectos */}
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
            <span style={{fontWeight:700,fontSize:'13px',color:'var(--ink)',letterSpacing:'-.01em'}}>
              Mis proyectos
              <span style={{marginLeft:'6px',fontWeight:500,color:'var(--ink4)'}}>({myOwned.length})</span>
            </span>
            <button onClick={()=>go('projects')} style={{fontSize:'12px',color:'var(--blue)',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,padding:0}}>Ver todos →</button>
          </div>
          {myOwned.length===0
            ?<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'28px',textAlign:'center',fontSize:'13px',color:'var(--ink4)'}}>
              Sin proyectos. <span onClick={()=>go('projects')} style={{color:'var(--blue)',cursor:'pointer',textDecoration:'underline'}}>Crear uno →</span>
             </div>
            :<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',overflow:'hidden'}}>
              {myOwned.slice(0,6).map(([pid,p],i)=>{
                const v=pct(allTasks[pid]||{});
                const col=getColor(pid);
                return(
                  <div key={pid} onClick={()=>go('proj',pid,p)}
                    style={{display:'flex',alignItems:'center',gap:'14px',padding:'12px 16px',borderTop:i>0?'1px solid var(--border)':'none',cursor:'pointer',transition:'background .12s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{width:'3px',height:'28px',borderRadius:'99px',background:col,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'13px',color:'var(--ink)',marginBottom:'5px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                      <div style={{height:'3px',background:'var(--border)',borderRadius:'99px',overflow:'hidden'}}>
                        <div style={{height:'100%',width:v+'%',background:v===100?'var(--grn)':col,borderRadius:'99px',transition:'width .5s'}}/>
                      </div>
                    </div>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--ink3)',minWidth:'26px',textAlign:'right'}}>{v}%</span>
                    <Tag s={p.status}/>
                  </div>
                );
              })}
            </div>
          }
        </div>

        {/* colaboraciones */}
        {myCollab.length>0&&(
          <div>
            <div style={{marginBottom:'10px'}}>
              <span style={{fontWeight:700,fontSize:'13px',color:'var(--ink)',letterSpacing:'-.01em'}}>
                Colaboraciones
                <span style={{marginLeft:'6px',fontWeight:500,color:'var(--ink4)'}}>({myCollab.length})</span>
              </span>
            </div>
            <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',overflow:'hidden'}}>
              {myCollab.slice(0,5).map(({pid,p,role},i)=>{
                const v=pct(allTasks[pid]||{});
                return(
                  <div key={pid} onClick={()=>go('proj',pid,p)}
                    style={{display:'flex',alignItems:'center',gap:'14px',padding:'12px 16px',borderTop:i>0?'1px solid var(--border)':'none',cursor:'pointer',transition:'background .12s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{width:'3px',height:'28px',borderRadius:'99px',background:'var(--purple)',flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'13px',color:'var(--ink)',marginBottom:'4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                      <span style={{fontSize:'10.5px',fontWeight:700,color:'var(--purple)',background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:'99px',padding:'1px 7px'}}>{role}</span>
                    </div>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--ink3)',minWidth:'26px',textAlign:'right'}}>{v}%</span>
                    <Tag s={p.status}/>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ─ PROJECT CARD 2026 ─ */
const ProjectCard=({pid,p,tasks,onClick,onDelete,canDelete})=>{
  const color=getColor(pid);
  const v=pct(tasks);
  const total=Object.keys(tasks).length;
  const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
  const inProg=Object.values(tasks).filter(t=>t.status==='En progreso').length;
  return(
    <div onClick={onClick}
      style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',overflow:'hidden',cursor:'pointer',transition:'all .22s cubic-bezier(.16,1,.3,1)',boxShadow:'var(--shadow)'}}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow='var(--shadow-md)';e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.transform='translateY(-2px)'}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow='var(--shadow)';e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='none'}}>
      {/* color accent bar */}
      <div style={{height:'3px',background:`linear-gradient(90deg,${color},${color}88)`}}/>
      <div style={{padding:'18px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'12px'}}>
          <div style={{flex:1,minWidth:0,marginRight:'10px'}}>
            <div style={{fontWeight:700,color:'var(--ink)',fontSize:'14px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:'2px',letterSpacing:'-.01em'}}>{p.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontSize:'10px',fontWeight:700,color:'var(--ink4)',fontFamily:'monospace',letterSpacing:'.5px'}}>{p.readableId||'#'+pid.slice(-6).toUpperCase()}</span>
              <span style={{fontSize:'11.5px',color:'var(--ink3)',fontWeight:500}}>{p.ownerName}</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
            <Tag s={p.status}/>
            {canDelete&&<button onClick={e=>{e.stopPropagation();if(confirm('¿Eliminar?'))onDelete()}}
              style={{width:'24px',height:'24px',borderRadius:'6px',border:'1.5px solid var(--border)',background:'transparent',color:'var(--border2)',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='var(--red)';e.currentTarget.style.background='#fef2f2'}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--border2)';e.currentTarget.style.background='transparent'}}>×</button>}
          </div>
        </div>

        {/* progress */}
        <div style={{marginBottom:'14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--ink4)',marginBottom:'6px',fontWeight:500}}>
            <span>Progreso</span>
            <span style={{fontWeight:700,color:v===100?'var(--grn)':'var(--ink)',fontSize:'12px'}}>{v}%</span>
          </div>
          <div style={{height:'4px',background:'var(--bg2)',borderRadius:'99px',overflow:'hidden'}}>
            <div style={{height:'100%',width:v+'%',background:v===100?'var(--grn)':color,borderRadius:'99px',transition:'width .6s cubic-bezier(.16,1,.3,1)'}}/>
          </div>
        </div>

        {/* stats */}
        <div style={{display:'flex',gap:'10px',fontSize:'11.5px',color:'var(--ink3)',flexWrap:'wrap'}}>
          <span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--border2)'}}/>
            {total} tareas
          </span>
          {inProg>0&&<span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--blue)'}}/>
            {inProg} activas
          </span>}
          <span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--grn)'}}/>
            {done} hechas
          </span>
        </div>

        {/* Consultoría extra */}
        {p.department==='consultoria'&&p.client&&(
          <div style={{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:'4px'}}>
            <div style={{fontSize:'11.5px',color:'var(--ink2)',display:'flex',gap:'5px',alignItems:'center',fontWeight:600}}>{p.client}</div>
            {p.consultType&&<div style={{fontSize:'11px',color:'var(--ink3)'}}>{p.consultType}</div>}
            {p.fees&&<div style={{fontSize:'11.5px',color:'var(--cons)',fontWeight:700}}>{Number(p.fees).toLocaleString('es-ES')} FCFA</div>}
          </div>
        )}
      </div>
    </div>
  );
};

/* ─ DEPT BADGE 2026 ─ */
const DeptBadge=({dept})=>{
  if(dept==='consultoria') return <span style={{fontSize:'10px',fontWeight:700,color:'var(--cons)',background:'var(--cons-l)',border:'1px solid #ddd6fe',borderRadius:'6px',padding:'2px 9px',letterSpacing:'.01em'}}>Consultoría</span>;
  if(dept==='it')          return <span style={{fontSize:'10px',fontWeight:700,color:'var(--it)',background:'var(--it-l)',border:'1px solid #bae6fd',borderRadius:'6px',padding:'2px 9px',letterSpacing:'.01em'}}>IT</span>;
  return null;
};

const ProjectsList=({user,projects,allTasks,openProject,allCollabs,allUsers})=>{
  const[show,setShow]=useState(false);
  /* base fields */
  const[nm,setNm]=useState('');
  const[desc,setDesc]=useState('');
  const[sd,setSd]=useState('');
  const[ed,setEd]=useState('');
  const[st,setSt]=useState('Activo');
  /* Consultoría fields */
  const[client,setClient]=useState('');
  const[consultType,setConsultType]=useState('Estrategia empresarial');
  const[deliverables,setDeliverables]=useState('');
  const[fees,setFees]=useState('');
  const[reportDate,setReportDate]=useState('');
  const[leadConsultant,setLeadConsultant]=useState('');
  /* collaborators to invite on creation */
  const[collabList,setCollabList]=useState([]); // [{userId, userName, role}]
  const[selUser,setSelUser]=useState('');
  const[selRole,setSelRole]=useState('Colaborador');

  const admin=user.role==='admin'||user.role==='gerencia';
  const userDept=user.department||'it';

  const canSeeProject=(pid,p)=>{
    if(admin)return true;
    if(p.ownerId===user.id)return true;
    const cols=allCollabs?.[pid]||{};
    return Object.values(cols).some(c=>c.userId===user.id);
  };

  const list=Object.entries(projects).filter(([pid,p])=>canSeeProject(pid,p));

  // candidate users to invite (same or other dept, not self, not already added)
  const candidates=Object.values(allUsers||{}).filter(u=>
    u.id!==user.id &&
    u.role==='empleado' &&
    !collabList.find(c=>c.userId===u.id)
  );

  const addCollab=()=>{
    if(!selUser)return;
    const u=candidates.find(x=>x.id===selUser);
    if(!u)return;
    setCollabList(prev=>[...prev,{userId:u.id,userName:u.name,role:selRole,dept:u.department||'it'}]);
    setSelUser('');setSelRole('Colaborador');
  };

  const removeCollab=(uid)=>setCollabList(prev=>prev.filter(c=>c.userId!==uid));

  const resetForm=()=>{
    setNm('');setDesc('');setSd('');setEd('');setSt('Activo');
    setClient('');setConsultType('Estrategia empresarial');setDeliverables('');setFees('');setReportDate('');setLeadConsultant('');
    setCollabList([]);setSelUser('');setSelRole('Colaborador');
  };

  const doCreate=async()=>{
    if(!nm.trim())return;
    // generate readable ID: INV-IT-001 or INV-CONS-001
    const prefix=userDept==='consultoria'?'INV-CONS':'INV-IT';
    const existing=Object.values(projects).filter(p=>(p.readableId||'').startsWith(prefix));
    const nextNum=String(existing.length+1).padStart(3,'0');
    const tsSuffix=Date.now().toString(36).slice(-3).toUpperCase();
    const readableId=`${prefix}-${nextNum}${tsSuffix}`;
    const base={name:nm.trim(),description:desc,startDate:sd,endDate:ed,status:st,ownerId:user.id,ownerName:user.name,department:userDept,createdAt:ts(),progress:0,readableId};
    if(userDept==='consultoria'){
      Object.assign(base,{client,consultType,deliverables,fees,reportDate,leadConsultant:leadConsultant||user.name});
    }
    const ref=await window.FB.addProject(base);
    const pid=ref.key;
    if(pid&&collabList.length>0){
      await Promise.all(collabList.map(c=>
        window.FB.addInvite({projectId:pid,projectName:nm.trim(),fromId:user.id,fromName:user.name,toUserId:c.userId,toUserName:c.userName,collabRole:c.role,status:'pending',createdAt:ts()})
      ));
    }
    setShow(false);resetForm();
  };

  return(
    <div className="fi">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px'}}>
        <div>
          <div style={{fontWeight:700,fontSize:'22px',color:'var(--ink)',letterSpacing:'-.02em'}}>Proyectos</div>
          <div style={{fontSize:'13px',color:'var(--ink4)',marginTop:'2px'}}>{list.length} proyecto{list.length!==1?'s':''}</div>
        </div>
        {!admin&&<Btn onClick={()=>setShow(true)}>+ Nuevo proyecto</Btn>}
      </div>

      {list.length===0
        ?<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'64px',textAlign:'center'}}>
          
          <div style={{fontWeight:600,fontSize:'16px',color:'var(--ink)',marginBottom:'6px'}}>Sin proyectos</div>
          <div style={{fontSize:'13px',color:'var(--ink4)',marginBottom:'20px'}}>Crea tu primer proyecto para empezar.</div>
          {!admin&&<Btn onClick={()=>setShow(true)}>Crear proyecto</Btn>}
        </div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'16px'}}>
          {list.map(([pid,p])=>{
            const pDept=p.department||'it';
            const isCross=pDept!==userDept&&!admin;
            return(
              <div key={pid} style={{position:'relative'}}>
                {isCross&&(
                  <div style={{position:'absolute',top:'12px',left:'12px',zIndex:2,display:'flex',gap:'4px',alignItems:'center'}}>
                    <DeptBadge dept={pDept}/>
                    <span style={{fontSize:'10px',color:'var(--ink3)',background:'var(--bg2)',border:'1px solid #e5e7eb',borderRadius:'99px',padding:'2px 7px'}}>Colaboración</span>
                  </div>
                )}
                {!isCross&&!admin&&<div style={{position:'absolute',top:'12px',left:'12px',zIndex:2}}><DeptBadge dept={pDept}/></div>}
                <ProjectCard pid={pid} p={p} tasks={allTasks[pid]||{}}
                  onClick={()=>openProject(pid,p)}
                  onDelete={()=>window.FB.delProject(pid)}
                  canDelete={p.ownerId===user.id}/>
              </div>
            );
          })}
        </div>
      }

      {show&&(
        <Modal title={userDept==='consultoria'?'Nuevo proyecto de Consultoría':'Nuevo proyecto de IT'} onClose={()=>{setShow(false);resetForm();}} wide>

          {/* ── BASE FIELDS ── */}
          <In label="Nombre del proyecto *" value={nm} onChange={e=>setNm(e.target.value)} placeholder={userDept==='consultoria'?'Ej. Estrategia Expansión Acme Corp':'Ej. Migración infraestructura cloud'} autoFocus/>
          <Ta label="Descripción" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descripción breve (opcional)"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Fecha inicio" type="date" value={sd} onChange={e=>setSd(e.target.value)}/>
            <In label="Fecha fin est." type="date" value={ed} onChange={e=>setEd(e.target.value)}/>
          </div>
          <Se label="Estado" value={st} onChange={e=>setSt(e.target.value)} opts={['Activo','En progreso','Pausado','Finalizado']}/>

          {/* ── CONSULTORÍA SPECIFIC ── */}
          {userDept==='consultoria'&&(
            <div style={{margin:'8px 0 14px',borderTop:'1px solid #f3f4f6',paddingTop:'14px'}}>
              <div style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'12px'}}>Datos de consultoría</div>
              <In label="Cliente / empresa contratante *" value={client} onChange={e=>setClient(e.target.value)} placeholder="Nombre de la empresa cliente"/>
              <Se label="Tipo de consultoría" value={consultType} onChange={e=>setConsultType(e.target.value)} opts={['Estrategia empresarial','Consultoría financiera','Consultoría legal / compliance','Procesos y operaciones','Transformación organizacional','Due diligence','Otro']}/>
              <Ta label="Entregables esperados" value={deliverables} onChange={e=>setDeliverables(e.target.value)} placeholder="Ej. Informe ejecutivo, plan de acción, modelo financiero…"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                <In label="Honorarios (FCFA)" type="number" value={fees} onChange={e=>setFees(e.target.value)} placeholder="0"/>
                <In label="Fecha entrega informe" type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)}/>
              </div>
              <In label="Consultor responsable" value={leadConsultant} onChange={e=>setLeadConsultant(e.target.value)} placeholder={user.name}/>
            </div>
          )}

          {/* ── COLLABORATORS ── */}
          <div style={{borderTop:'1px solid #f3f4f6',paddingTop:'14px',marginTop:'4px'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'12px'}}>Colaboradores (opcional)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:'8px',marginBottom:'10px',alignItems:'flex-end'}}>
              <Field label="Usuario">
                <select value={selUser} onChange={e=>setSelUser(e.target.value)} style={{...iSt,cursor:'pointer',appearance:'none'}}>
                  <option value="">— Seleccionar —</option>
                  {candidates.map(u=>(
                    <option key={u.id} value={u.id}>{u.name} · {u.department==='consultoria'?'Consultoría':'IT'}</option>
                  ))}
                </select>
              </Field>
              <Field label="Rol">
                <select value={selRole} onChange={e=>setSelRole(e.target.value)} style={{...iSt,cursor:'pointer',appearance:'none'}}>
                  {['Colaborador','Desarrollador','Diseñador','QA','Analista','Supervisor','Consultor'].map(r=><option key={r}>{r}</option>)}

  const[cCat,setCCat]=useState('General');
  const[cDest,setCDest]=useState('');

  // Always use live prop — fallback to empty object to avoid crash
  const project=projectProp||{};

  /* edit header state — initialise from prop, update when project loads */
  const[ehName,setEhName]=useState(project.name||'');
  const[ehDesc,setEhDesc]=useState(project.description||'');
  const[ehStart,setEhStart]=useState(project.startDate||'');
  const[ehEnd,setEhEnd]=useState(project.endDate||'');
  const[ehPriority,setEhPriority]=useState(project.priority||'Media');

  // Keep edit-header fields in sync when project updates from Firebase
  useEffect(()=>{
    if(projectProp){
      setEhName(projectProp.name||'');
      setEhDesc(projectProp.description||'');
      setEhStart(projectProp.startDate||'');
      setEhEnd(projectProp.endDate||'');
      setEhPriority(projectProp.priority||'Media');
    }
  },[projectProp?.name,projectProp?.description,projectProp?.startDate,projectProp?.endDate,projectProp?.priority]);

  const collabArr=Object.entries(collabs);

  // If project data hasn't loaded yet, show spinner

    setShowTask(false);setTName('');setTDesc('');setTSt('Pendiente');setTEst('');
  };

  const changeStatus=async(tid,status)=>{
    await window.FB.updTask(pid,tid,{status});
    const updated={...tasks,[tid]:{...tasks[tid],status}};
    await window.FB.updProject(pid,{progress:pct(updated)});
  };

  const removeTask=async tid=>{
    if(!confirm('¿Eliminar tarea?'))return;
    await window.FB.delTask(pid,tid);
    const updated={...tasks};delete updated[tid];
    await window.FB.updProject(pid,{progress:pct(updated)});
  };

  const openEditTask=(tid,t)=>{
    setEditTask({tid,name:t.name,description:t.description||'',status:t.status||'Pendiente',timeEstimated:t.timeEstimated||''});
  };

  const saveEditTask=async()=>{
    if(!editTask.name.trim())return;
    await window.FB.updTask(pid,editTask.tid,{name:editTask.name.trim(),description:editTask.description,status:editTask.status,timeEstimated:editTask.timeEstimated});
    const updated={...tasks,[editTask.tid]:{...tasks[editTask.tid],...editTask}};
    await window.FB.updProject(pid,{progress:pct(updated)});
    setEditTask(null);
  };

  const saveHeader=async()=>{
    if(!ehName.trim())return;
    await window.FB.updProject(pid,{name:ehName.trim(),description:ehDesc,startDate:ehStart,endDate:ehEnd,priority:ehPriority});
    setShowEditHeader(false);
  };

  const sendInvite=async()=>{
    if(!inviteUser)return;
    const toUser=Object.values(allUsers||{}).find(u=>u.id===inviteUser);
    if(!toUser)return;
    const finalRole=inviteRole==='_custom'?inviteRoleCustom.trim()||'Colaborador':inviteRole;
    await window.FB.addInvite({projectId:pid,projectName:project.name,fromId:user.id,fromName:user.name,toUserId:toUser.id,toUserName:toUser.name,collabRole:finalRole,status:'pending',createdAt:ts()});
    setShowInvite(false);setInviteUser('');setInviteRole('Colaborador');setInviteRoleCustom('');
  };

  const kickCollab=async(cid)=>{
    if(!confirm('¿Quitar colaborador del proyecto?'))return;
    await window.FB.delCollab(pid,cid);
  };

  const addCost=async()=>{
    if(!cDesc.trim()||!cAmt)return;
    await window.FB.addCost(pid,{description:cDesc.trim(),amount:cAmt,date:cDate,category:cCat,destination:cDest.trim()||'General',createdAt:ts()});
    setShowCost(false);setCDesc('');setCAmt('');setCDate('');setCCat('General');setCDest('');
  };

  const TSC={
    'Pendiente'  :{bg:'#f3f4f6',color:'var(--ink3)',border:'#e5e7eb'},
    'En progreso':{bg:'#eff6ff',color:'var(--blue)',border:'#bfdbfe'},
    'Completado' :{bg:'var(--grn-l)',color:'var(--grn)',border:'#bbf7d0'},

  return(
    <div className="fi">
      {/* breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'20px'}}>
        <button onClick={onBack}
          style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'var(--ink3)',background:'none',border:'none',cursor:'pointer',padding:0,fontFamily:'inherit',fontWeight:600,fontSize:'13px'}}
          onMouseEnter={e=>e.currentTarget.style.color='#1a1d23'} onMouseLeave={e=>e.currentTarget.style.color='#6b7280'}>
          ← Proyectos
        </button>
        <span style={{color:'var(--border2)'}}>/</span>
        <span style={{fontSize:'13px',color:'var(--ink)',fontWeight:500}}>{project.name}</span>
      </div>

      {/* header card */}
      <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',overflow:'hidden',marginBottom:'20px',boxShadow:'var(--shadow)'}}>
        <div style={{height:'4px',background:`linear-gradient(90deg,${color},${color}66)`}}/>
        <div style={{padding:'20px 24px'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',marginBottom:'12px'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
                <div style={{fontWeight:800,fontSize:'20px',color:'var(--ink)',letterSpacing:'-.02em'}}>{project.name}</div>
                {project.priority&&<PriorityBadge p={project.priority}/>}
                <span style={{fontSize:'10px',fontWeight:700,color:'var(--ink4)',fontFamily:'monospace',letterSpacing:'.5px',background:'var(--bg2)',padding:'1px 7px',borderRadius:'5px',border:'1px solid var(--border)'}}>{project.readableId||'#'+pid.slice(-6).toUpperCase()}</span>
              </div>
              {project.description&&<div style={{fontSize:'13px',color:'var(--ink4)'}}>{project.description}</div>}
            </div>
            <div style={{display:'flex',gap:'6px',alignItems:'center',flexShrink:0}}>
              <Tag s={project.status}/>
              {canEdit&&(
                <select value={project.status} onChange={e=>window.FB.updProject(pid,{status:e.target.value})}
                  style={{...iSt,width:'auto',fontSize:'12px',padding:'5px 10px',cursor:'pointer'}}>
                  {['Activo','En progreso','Pausado','Finalizado','Bloqueado'].map(s=><option key={s}>{s}</option>)}
                </select>
              )}
              {canEditHeader&&(
                <button onClick={()=>setShowEditHeader(true)}
                  title="Editar cabecera"
                  style={{width:'28px',height:'28px',borderRadius:'7px',border:'1.5px solid var(--border)',background:'var(--surface2)',color:'var(--ink3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)';e.currentTarget.style.color='var(--blue)';e.currentTarget.style.background='var(--blue-l)'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--ink3)';e.currentTarget.style.background='var(--surface2)'}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
              )}
            </div>
          </div>
          <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'var(--ink4)',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}}>
            <span>{project.ownerName}</span>
            {project.startDate&&<span>{dFmt(project.startDate)}</span>}
            {project.endDate&&<span>{dFmt(project.endDate)}</span>}
            <span>{taskArr.length} tareas</span>
            {totalCost>0&&<span style={{fontWeight:700,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'6px',padding:'2px 8px',fontSize:'11.5px'}}>{totalCost.toLocaleString('es-ES')} FCFA</span>}
          </div>
          {/* progress */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'6px'}}>
              <span style={{color:'var(--ink3)',fontWeight:500}}>Progreso general</span>
              <span style={{fontWeight:700,color:v===100?'var(--grn)':color}}>{v}%</span>
            </div>
            <div style={{height:'8px',background:'var(--bg2)',borderRadius:'99px',overflow:'hidden'}}>
              <div style={{height:'100%',width:v+'%',background:v===100?'var(--grn)':color,borderRadius:'99px',transition:'width .5s'}}/>
            </div>
          </div>
          {/* mini stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginTop:'16px'}}>
            {[['Pendiente','#9ca3af',taskArr.filter(([,t])=>t.status==='Pendiente').length],
              ['En progreso','var(--blue)',taskArr.filter(([,t])=>t.status==='En progreso').length],
              ['Completado','var(--grn)',taskArr.filter(([,t])=>t.status==='Completado').length]
            ].map(([s,col,n])=>(
              <div key={s} style={{background:'var(--surface2)',borderRadius:'8px',padding:'10px 14px',textAlign:'center'}}>
                <div style={{fontSize:'24px',fontWeight:800,color:col,marginBottom:'2px',letterSpacing:'-.02em'}}>{n}</div>
                <div style={{fontSize:'11px',color:'var(--ink4)'}}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* tabs */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #e8eaed',marginBottom:'16px'}}>
        <div style={{display:'flex'}}>
          {[['tasks','Tareas'],['costs','Costes'],['collabs','Equipo']].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:'9px 16px',fontSize:'13px',fontWeight:600,border:'none',borderBottom:`2px solid ${tab===id?color:'transparent'}`,marginBottom:'-1px',color:tab===id?color:'var(--ink4)',background:'transparent',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>
              {lbl}
              {id==='tasks'?<span style={{marginLeft:'5px',fontSize:'11px',background:tab==='tasks'?color:'#f3f4f6',color:tab==='tasks'?'#fff':'#9ca3af',borderRadius:'99px',padding:'1px 6px'}}>{taskArr.length}</span>:''}
              {id==='costs'&&totalCost>0?<span style={{marginLeft:'5px',fontSize:'11px',color:'var(--ink4)'}}>${Math.round(totalCost)}</span>:''}
              {id==='collabs'?<span style={{marginLeft:'5px',fontSize:'11px',background:tab==='collabs'?color:'#f3f4f6',color:tab==='collabs'?'#fff':'#9ca3af',borderRadius:'99px',padding:'1px 6px'}}>{collabArr.length+1}</span>:''}
            </button>
          ))}
        </div>
        <div style={{paddingBottom:'8px',display:'flex',gap:'6px'}}>
          {tab==='tasks'&&canEdit&&<Btn sm onClick={()=>setShowTask(true)}>+ Tarea</Btn>}
          {tab==='costs'&&canEdit&&<Btn sm onClick={()=>setShowCost(true)}>+ Coste</Btn>}
          {tab==='collabs'&&project.ownerId===user.id&&<Btn sm onClick={()=>setShowInvite(true)}>+ Invitar</Btn>}
        </div>
      </div>

      {/* TASKS */}
      {tab==='tasks'&&(taskArr.length===0
        ?<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'48px',textAlign:'center'}}>
          
          <div style={{fontWeight:600,color:'var(--ink)',marginBottom:'4px'}}>Sin tareas</div>
          <div style={{fontSize:'13px',color:'var(--ink4)'}}>{canEdit?'Añade la primera tarea.':'No hay tareas.'}</div>
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {taskArr.map(([tid,t])=>(
            <TaskCard key={tid} tid={tid} t={t} pid={pid} user={user} canEdit={canEdit}
              onChangeStatus={changeStatus} onEdit={openEditTask} onRemove={removeTask}/>
          ))}
        </div>
      )}

      {/* COSTS */}
      {tab==='costs'&&(
        <>
          {/* running total banner */}
          <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'14px 20px',marginBottom:'12px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'var(--shadow)'}}>
            <div>
              <div style={{fontSize:'10.5px',fontWeight:700,color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'2px'}}>Total acumulado</div>
              <div style={{fontWeight:800,fontSize:'26px',color:totalCost>0?'var(--ink)':'var(--ink4)',letterSpacing:'-.03em'}}>{totalCost>0?totalCost.toLocaleString('es-ES')+' FCFA':'—'}</div>
            </div>
            {Object.keys(costs).length>0&&(
              <div style={{display:'flex',flexDirection:'column',gap:'3px',alignItems:'flex-end'}}>
                {Object.entries(Object.values(costs).reduce((acc,c)=>{acc[c.category||'General']=(acc[c.category||'General']||0)+(+c.amount||0);return acc;},{})).map(([cat,sum])=>(
                  <div key={cat} style={{fontSize:'11px',color:'var(--ink3)'}}>
                    <span style={{color:'var(--ink4)'}}>{cat}:</span> <b style={{color:'var(--ink)'}}>{sum.toLocaleString('es-ES')}</b>
                  </div>
                ))}
              </div>
            )}
          </div>
          {Object.keys(costs).length===0
            ?<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'48px',textAlign:'center'}}>
              
              <div style={{fontWeight:600,color:'var(--ink)',marginBottom:'4px'}}>Sin costes</div>
              <div style={{fontSize:'13px',color:'var(--ink4)'}}>{canEdit?'Registra el primer coste.':'No hay costes registrados.'}</div>
            </div>
            :<div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {Object.entries(costs).map(([cid,co])=>(
                <div key={cid} style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'13px 16px',display:'flex',alignItems:'center',gap:'12px',boxShadow:'var(--shadow)'}}>
                  <div style={{width:'32px',height:'32px',borderRadius:'8px',background:'var(--bg2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:'var(--ink)',fontSize:'13.5px'}}>{co.description}</div>
                    <div style={{display:'flex',gap:'6px',alignItems:'center',marginTop:'3px',flexWrap:'wrap'}}>
                      {co.category&&<span style={{fontSize:'10px',fontWeight:700,color:'var(--ink3)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'5px',padding:'1px 6px'}}>{co.category}</span>}
                      {co.destination&&co.destination!=='General'&&<span style={{fontSize:'10px',fontWeight:700,color:'var(--blue)',background:'var(--blue-l)',border:'1px solid #bfdbfe',borderRadius:'5px',padding:'1px 6px'}}>→ {co.destination}</span>}
                      {co.date&&<span style={{fontSize:'11px',color:'var(--ink4)'}}>{dFmt(co.date)}</span>}
                    </div>
                  </div>
                  <span style={{fontWeight:800,fontSize:'16px',color:'var(--ink)',flexShrink:0}}>{(+co.amount).toLocaleString('es-ES')} FCFA</span>
                  {canEdit&&<button onClick={()=>window.FB.delCost(pid,cid)}
                    style={{width:'26px',height:'26px',borderRadius:'6px',border:'1.5px solid var(--border)',background:'transparent',color:'var(--border2)',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s',flexShrink:0}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#ef4444';e.currentTarget.style.background='#fff5f5'}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--border2)';e.currentTarget.style.background='transparent'}}>×</button>}
                </div>
              ))}
            </div>
          }
        </>
      )}

      {/* COLLABORATORS TAB */}
      {tab==='collabs'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
            <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'linear-gradient(135deg,var(--blue),#7c9bff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,color:'#fff',flexShrink:0}}>{project.ownerName?.[0]?.toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:'13px',color:'var(--ink)'}}>{project.ownerName}</div>
              <div style={{fontSize:'11px',color:'var(--ink4)',marginTop:'1px'}}>Creador del proyecto</div>
            </div>
            <span style={{fontSize:'11px',fontWeight:600,color:'var(--blue)',background:'var(--blue-l)',border:'1px solid #c7d2fd',borderRadius:'99px',padding:'3px 10px'}}>Propietario</span>
          </div>
          {collabArr.map(([cid,c])=>(
            <div key={cid} style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'var(--bg2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,color:'var(--ink3)',flexShrink:0}}>{c.userName?.[0]?.toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'13px',color:'var(--ink)'}}>{c.userName}</div>
                <div style={{fontSize:'11px',color:'var(--ink4)',marginTop:'1px'}}>Unido {dFmt(c.joinedAt)}</div>
              </div>
              <span style={{fontSize:'11px',fontWeight:600,color:'var(--grn)',background:'var(--grn-l)',border:'1px solid #bbf7d0',borderRadius:'99px',padding:'3px 10px'}}>{c.role||'Colaborador'}</span>
              {(isOwner||isAdmin)&&(
                <button onClick={()=>kickCollab(cid)}
                  style={{width:'26px',height:'26px',borderRadius:'6px',border:'1.5px solid var(--border)',background:'transparent',color:'var(--border2)',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s',flexShrink:0}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#ef4444';e.currentTarget.style.background='#fff5f5'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--border2)';e.currentTarget.style.background='transparent'}}>×</button>
              )}
            </div>
          ))}
          {collabArr.length===0&&(
            <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'36px',textAlign:'center'}}>
              <div style={{color:'var(--ink4)',fontSize:'13px'}}>{isOwner?'Sin colaboradores. Pulsa "+ Invitar" para añadir.':'No hay colaboradores en este proyecto.'}</div>
            </div>
          )}
        </div>
      )}

      {/* EDIT HEADER MODAL */}
      {showEditHeader&&(
        <Modal title="Editar cabecera del proyecto" onClose={()=>setShowEditHeader(false)}>
          <In label="Nombre del proyecto *" value={ehName} onChange={e=>setEhName(e.target.value)} autoFocus/>
          <Ta label="Descripción" value={ehDesc} onChange={e=>setEhDesc(e.target.value)} placeholder="Descripción opcional"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Fecha inicio" type="date" value={ehStart} onChange={e=>setEhStart(e.target.value)}/>
            <In label="Fecha fin est." type="date" value={ehEnd} onChange={e=>setEhEnd(e.target.value)}/>
          </div>
          <Field label="Prioridad">
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px'}}>
              {Object.entries(PRIORITY).map(([p,c])=>(
                <button key={p} onClick={()=>setEhPriority(p)}
                  style={{padding:'8px 4px',borderRadius:'7px',border:`1.5px solid ${ehPriority===p?c.color:c.border}`,background:ehPriority===p?c.bg:'var(--surface)',color:ehPriority===p?c.color:'var(--ink4)',fontSize:'12px',fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .13s',textAlign:'center'}}>
                  {p}
                </button>
              ))}
            </div>
          </Field>
          <div style={{display:'flex',gap:'10px',paddingTop:'4px'}}>
            <Btn v="g" full onClick={()=>setShowEditHeader(false)}>Cancelar</Btn>
            <Btn full onClick={saveHeader} dis={!ehName.trim()}>Guardar</Btn>
          </div>
        </Modal>
      )}

      {/* EDIT TASK MODAL */}
      {editTask&&(
        <Modal title="Editar tarea" onClose={()=>setEditTask(null)}>
          <In label="Nombre *" value={editTask.name} onChange={e=>setEditTask(p=>({...p,name:e.target.value}))} placeholder="Nombre de la tarea" autoFocus/>
          <Ta label="Descripción" value={editTask.description} onChange={e=>setEditTask(p=>({...p,description:e.target.value}))} placeholder="Descripción opcional"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Tiempo estimado (h)" type="number" value={editTask.timeEstimated} onChange={e=>setEditTask(p=>({...p,timeEstimated:e.target.value}))} placeholder="0"/>
            <Se label="Estado" value={editTask.status} onChange={e=>setEditTask(p=>({...p,status:e.target.value}))} opts={['Pendiente','En progreso','Completado']}/>
          </div>
          <Field label="Asignado a">
            <select value={editTask.assignedTo||''} onChange={e=>{const u=[{id:user.id,name:user.name},...collabArr.map(([,c])=>({id:c.userId,name:c.userName}))].find(x=>x.id===e.target.value);setEditTask(p=>({...p,assignedTo:e.target.value,assignedName:u?.name||''}))}} style={{...iSt,cursor:'pointer'}}>
              <option value={user.id}>{user.name} (tú)</option>
              {collabArr.map(([,c])=><option key={c.userId} value={c.userId}>{c.userName} · {c.role}</option>)}
            </select>
          </Field>
          <div style={{display:'flex',gap:'10px',paddingTop:'6px'}}>
            <Btn v="g" full onClick={()=>setEditTask(null)}>Cancelar</Btn>
            <Btn full onClick={saveEditTask} dis={!editTask.name.trim()}>Guardar cambios</Btn>
          </div>
        </Modal>
      )}

      {/* INVITE MODAL */}
      {showInvite&&(
        <Modal title="Invitar colaborador" sub="Recibirá notificación para aceptar o rechazar." onClose={()=>setShowInvite(false)}>
          <Field label="Usuario">
            <select value={inviteUser} onChange={e=>setInviteUser(e.target.value)} style={{...iSt,cursor:'pointer'}}>
              <option value="">— Seleccionar empleado —</option>
              {Object.values(allUsers||{}).filter(u=>u.id!==user.id&&u.role==='empleado'&&!collabArr.some(([,c])=>c.userId===u.id)).map(u=>(
                <option key={u.id} value={u.id}>{u.name} · {u.department==='consultoria'?'Consultoría':'IT'}</option>
              ))}
            </select>
          </Field>
          <Field label="Rol en el proyecto">
            <select value={inviteRole} onChange={e=>setInviteRole(e.target.value)} style={{...iSt,cursor:'pointer'}}>
              {['Colaborador','Desarrollador','Diseñador','QA','Analista','Supervisor','Consultor','Otro (escribir)'].map(r=>(
                <option key={r} value={r==='Otro (escribir)'?'_custom':r}>{r}</option>
              ))}
            </select>
          </Field>
          {inviteRole==='_custom'&&(
            <In label="Escribe el rol *" value={inviteRoleCustom} onChange={e=>setInviteRoleCustom(e.target.value)} placeholder="Ej. Arquitecto de soluciones"/>
          )}
          <div style={{display:'flex',gap:'10px',paddingTop:'4px'}}>
            <Btn v="g" full onClick={()=>setShowInvite(false)}>Cancelar</Btn>
            <Btn full onClick={()=>sendInvite()} dis={!inviteUser||(inviteRole==='_custom'&&!inviteRoleCustom.trim())}>Enviar invitación</Btn>
          </div>
        </Modal>
      )}

      {/* TASK MODAL */}

          <Ta label="Descripción" value={tDesc} onChange={e=>setTDesc(e.target.value)} placeholder="Descripción opcional"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Tiempo estimado (h)" type="number" value={tEst} onChange={e=>setTEst(e.target.value)} placeholder="0"/>

        </Modal>
      )}

      {/* COST MODAL */}
      {showCost&&(
        <Modal title="Añadir coste" onClose={()=>setShowCost(false)}>
          <In label="Concepto *" value={cDesc} onChange={e=>setCDesc(e.target.value)} placeholder="Ej. Licencia software, viaje, consultor…" autoFocus/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Importe (FCFA) *" type="number" value={cAmt} onChange={e=>setCAmt(e.target.value)} placeholder="0"/>

            <Se label="Categoría" value={cCat} onChange={e=>setCCat(e.target.value)} opts={COST_CATS}/>

          <div style={{display:'flex',gap:'10px',paddingTop:'4px'}}>
            <Btn v="g" full onClick={()=>setShowCost(false)}>Cancelar</Btn>
            <Btn full onClick={addCost} dis={!cDesc.trim()||!cAmt}>Añadir coste</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ─ TEAM ─ */

    if(p.ownerId===user.id)return false;
    const sameDept=(p.department||'it')===userDept;

    return sameDept||isCollab;
  });
  return(
    <div className="fi">
      <div style={{marginBottom:'24px'}}>
        <div className="g" style={{fontSize:'34px',fontWeight:700,color:'var(--ink)',letterSpacing:'-.03em'}}>Equipo</div>
        <div style={{fontSize:'13px',color:'var(--ink3)',marginTop:'4px'}}>Proyectos de tu departamento y donde colaboras.</div>

      {teamProjects.length===0
        ?<div style={{border:'1.5px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'48px',textAlign:'center',fontSize:'13px',color:'var(--ink3)'}}>Ningún compañero tiene proyectos activos aún.</div>
        :<div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
          {teamProjects.map(([pid,p],i)=>{
            const v=pct(allTasks[pid]||{});

              <div key={pid} style={{display:'flex',alignItems:'center',gap:'14px',padding:'13px 18px',borderTop:i>0?'1px solid var(--border)':'none'}}>

/* ─ OVERVIEW ─ */
const Overview=({projects,allTasks,reports,users,onExport})=>{
  const cD=useRef(null),cB=useRef(null),iD=useRef(null),iB=useRef(null);
  const pa=Object.entries(projects);
  const avg=pa.length?Math.round(pa.reduce((s,[pid])=>s+pct(allTasks[pid]||{}),0)/pa.length):0;
  const today=new Date().toDateString();
  const totalTasks=pa.reduce((s,[pid])=>s+Object.keys(allTasks[pid]||{}).length,0);
  const doneTasks=pa.reduce((s,[pid])=>s+Object.values(allTasks[pid]||{}).filter(t=>t.status==='Completado').length,0);

  useEffect(()=>{
    if(!cD.current)return;
    if(iD.current){iD.current.destroy();iD.current=null;}
    const sts=['Activo','En progreso','Pausado','Finalizado','Bloqueado'];
    const counts=sts.map(s=>pa.filter(([,p])=>p.status===s).length);
    iD.current=new Chart(cD.current,{
      type:'doughnut',
      data:{labels:sts,datasets:[{data:counts,backgroundColor:['#2563eb','#0891b2','#d97706','#16a34a','#dc2626'],borderWidth:0,hoverBorderWidth:3,hoverBorderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Plus Jakarta Sans'},padding:12,boxWidth:10,color:'#7a7870'}}}}
    });

          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--grn)';e.currentTarget.style.color='var(--grn)';e.currentTarget.style.background='var(--grn-l)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--ink)';e.currentTarget.style.background='var(--surface)'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar Excel
        </button>
      </div>

      {/* KPI strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'24px'}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'16px 18px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'3px',background:k.col,borderRadius:'var(--radius-lg) var(--radius-lg) 0 0'}}/>
            <div style={{fontSize:'26px',fontWeight:800,color:'var(--ink)',letterSpacing:'-.04em',marginBottom:'3px',marginTop:'2px',fontFamily:"'Syne',sans-serif"}}>{k.n}</div>
            <div style={{fontSize:'11.5px',color:'var(--ink4)',fontWeight:500}}>{k.l}</div>

      {/* charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:'14px',marginBottom:'24px'}}>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'18px'}}>
          <div style={{fontWeight:700,fontSize:'13px',color:'var(--ink)',marginBottom:'2px'}}>Por estado</div>
          <div style={{fontSize:'11.5px',color:'var(--ink4)',marginBottom:'14px'}}>Distribución de proyectos</div>
          <div style={{height:'180px'}}><canvas ref={cD}/></div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1.5px solid var(--border)',padding:'18px'}}>
          <div style={{fontWeight:700,fontSize:'13px',color:'var(--ink)',marginBottom:'2px'}}>Avance por proyecto</div>

};

/* ─ USER MIND MAP — admin clicks profile, sees full tree ─ */
const UserMindMap=({u,projects,allTasks,allCollabs,onClose})=>{
  const cvRef=useRef(null);
  const owned=Object.entries(projects||{}).filter(([,p])=>p.ownerId===u.id);
  const asCollab=Object.entries(allCollabs||{}).flatMap(([pid,cols])=>
    Object.values(cols||{}).filter(c=>c.userId===u.id).map(c=>({pid,role:c.role,p:(projects||{})[pid]}))
  ).filter(({p})=>!!p);
  const allProjects=[
    ...owned.map(([pid,p])=>({pid,p,relation:'Propietario'})),
    ...asCollab.map(({pid,p,role})=>({pid,p,relation:role||'Colaborador'})),
  ];

  const COLORS={
    root:'#1e293b', proj:'#2563eb', task:'#16a34a', cost:'#d97706',
    done:'#15803d', inprog:'#1d4ed8', pend:'#b0aea8', collab:'#7c3aed',
  };

  useEffect(()=>{
    // Small delay so modal is fully rendered and canvas has dimensions
    const timer=setTimeout(()=>{
      const cv=cvRef.current;if(!cv)return;
      const W=cv.parentElement?.offsetWidth||700;
      const H=500;
      cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';
      const ctx=cv.getContext('2d');ctx.scale(2,2);
    // roundRect polyfill for older browsers
    if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this;};}
    ctx.clearRect(0,0,W,H);

    const cx=W/2,cy=H/2;
    const PRAD=allProjects.length;
    const pRadius=Math.min(180,Math.max(120,PRAD*38));

    // draw line helper
    const line=(x1,y1,x2,y2,col,w=1,dash=[])=>{
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=col;ctx.lineWidth=w;ctx.setLineDash(dash);ctx.stroke();ctx.setLineDash([]);
    };
    // draw node
    const node=(x,y,r,fill,stroke,label,sub,labelSize=11)=>{
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=fill;ctx.fill();
      if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
      if(label){
        ctx.font=`700 ${labelSize}px 'Plus Jakarta Sans',sans-serif`;
        ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(label.length>10?label.slice(0,9)+'…':label,x,y-(sub?3:0));
      }
      if(sub){
        ctx.font=`400 9px 'Plus Jakarta Sans',sans-serif`;
        ctx.fillStyle='rgba(255,255,255,.65)';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(sub,x,y+8);
      }
    };
    // pill label
    const pill=(x,y,text,bg,textCol,maxW=110)=>{
      const txt=text.length>16?text.slice(0,15)+'…':text;
      ctx.font=`600 10px 'Plus Jakarta Sans',sans-serif`;
      const tw=Math.min(ctx.measureText(txt).width+16,maxW);
      const th=20;
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.roundRect(x-tw/2,y-th/2,tw,th,5);ctx.fill();
      ctx.fillStyle=textCol;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(txt,x,y);
    };

    // root node
    node(cx,cy,32,COLORS.root,'rgba(37,99,235,.4)',u.name[0].toUpperCase(),'',14);
    ctx.font=`700 11px 'Plus Jakarta Sans',sans-serif`;
    ctx.fillStyle=COLORS.root;ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(u.name,cx,cy+36);

    // projects around root
    allProjects.forEach(({pid,p,relation},pi)=>{
      const angle=(2*Math.PI/allProjects.length)*pi - Math.PI/2;
      const px=cx+pRadius*Math.cos(angle);
      const py=cy+pRadius*Math.sin(angle);
      const isOwner=relation==='Propietario';
      const pcol=isOwner?COLORS.proj:COLORS.collab;

      line(cx,cy,px,py,pcol+'66',1.5);
      node(px,py,22,pcol,'rgba(255,255,255,.15)',p.name[0].toUpperCase(),null,12);

      // project label pill
      pill(px,py+30,p.name,pcol+'22',pcol);

      // relation label
      ctx.font=`600 9px 'Plus Jakarta Sans',sans-serif`;
      ctx.fillStyle=pcol;ctx.textAlign='center';ctx.textBaseline='middle';
      const midX=(cx+px)/2,midY=(cy+py)/2;
      ctx.fillText(relation,midX,midY-6);

      // tasks around each project
      const projTasks=Object.entries(allTasks[pid]||{}).filter(([,t])=>t.assignedTo===u.id||isOwner).slice(0,5);
      const projCosts=Object.values(allCollabs?.[pid]||{}); // just a count placeholder
      const allBranches=[
        ...projTasks.map(([tid,t])=>({type:'task',label:t.name,status:t.status,tid})),
        ...(!isOwner?[]:[{type:'cost_summary',label:`${Object.keys(allCollabs?.[pid]||{}).length} colaboradores`}]),
      ];

      allBranches.forEach(({type,label,status},bi)=>{
        const spread=Math.PI*0.55;
        const bAngle=angle-spread/2+(spread/(Math.max(allBranches.length-1,1)))*bi;
        const bR=62+18*Math.min(label.length/8,2);
        const bx=px+bR*Math.cos(bAngle);
        const by=py+bR*Math.sin(bAngle);

        if(type==='task'){
          const tcol=status==='Completado'?COLORS.done:status==='En progreso'?COLORS.inprog:COLORS.pend;
          line(px,py,bx,by,tcol+'88',1,[4,3]);
          ctx.beginPath();ctx.arc(bx,by,7,0,Math.PI*2);
          ctx.fillStyle=tcol;ctx.fill();
          // task label
          const lx=bx+(bx-px)/Math.hypot(bx-px,by-py)*16;
          const ly=by+(by-py)/Math.hypot(bx-px,by-py)*16;
          pill(lx,ly,label,tcol+'18',tcol,90);
        }
      });

      // hours bubble
      const hrs=Object.values(allTasks[pid]||{}).reduce((s,t)=>s+(+t.timeSpent||0)/60,0);
      const totalPCost=Object.values(allCollabs?.[pid]||{}).length; // placeholder
      if(hrs>0){
        const hx=px+Math.cos(angle+0.5)*42,hy=py+Math.sin(angle+0.5)*42;
        ctx.font=`700 9px monospace`;
        ctx.fillStyle='#d97706';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(Math.round(hrs)+'h',hx,hy);
      }
    });

    // legend
    const leg=[['Proyecto propio',COLORS.proj],['Colaboración',COLORS.collab],['Completado',COLORS.done],['En progreso',COLORS.inprog],['Pendiente',COLORS.pend]];
    leg.forEach(([lbl,col],i)=>{
      const lx=16,ly=H-14-(leg.length-1-i)*17;
      ctx.beginPath();ctx.arc(lx+5,ly,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      ctx.font=`500 9px 'Plus Jakarta Sans',sans-serif`;
      ctx.fillStyle='#64748b';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(lbl,lx+12,ly);
    });
    },80); // end setTimeout
    return()=>clearTimeout(timer);
  },[u,projects,allTasks,allCollabs]);

  return portal(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}}
      style={{position:'fixed',inset:0,zIndex:9800,background:'rgba(15,23,42,.55)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div className="mi" onClick={e=>e.stopPropagation()}
        style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-xl)',boxShadow:'var(--shadow-lg)',width:'100%',maxWidth:'820px',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {/* header */}
        <div style={{padding:'18px 22px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'14px'}}>
          <div style={{width:'40px',height:'40px',borderRadius:'12px',background:'linear-gradient(135deg,#1d4ed8,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',fontWeight:700,color:'#fff',flexShrink:0}}>{u.name[0].toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'16px',color:'var(--ink)',letterSpacing:'-.02em'}}>{u.name}</div>
            <div style={{fontSize:'12px',color:'var(--ink4)',marginTop:'2px'}}>{allProjects.length} proyecto{allProjects.length!==1?'s':''} · {owned.length} propio{owned.length!==1?'s':''} · {asCollab.length} colaboración{asCollab.length!==1?'es':''}</div>
          </div>
          <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'var(--ink3)',flexShrink:0}}>
            {[
              ['Tareas',Object.values(allTasks||{}).flatMap(t=>Object.values(t||{})).filter(t=>t.assignedTo===u.id).length,'var(--grn)'],
              ['Costes',allProjects.reduce((s,{pid})=>s+Object.values(allCollabs?.[pid]||{}).length,0),'var(--amber)'],
            ].map(([l,n,c])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:'20px',fontWeight:800,color:c,letterSpacing:'-.03em'}}>{n}</div>
                <div style={{fontSize:'10px',color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'1px'}}>{l}</div>
              </div>
            ))}
          </div>
          <button onClick={onClose} style={{width:'30px',height:'30px',borderRadius:'8px',border:'1.5px solid var(--border)',background:'var(--bg2)',cursor:'pointer',fontSize:'16px',color:'var(--ink3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
            onMouseEnter={e=>{e.currentTarget.style.background='#fee2e2';e.currentTarget.style.color='#dc2626'}}
            onMouseLeave={e=>{e.currentTarget.style.background='var(--bg2)';e.currentTarget.style.color='var(--ink3)'}}>×</button>
        </div>
        {/* canvas */}
        <div style={{position:'relative',background:'var(--bg)',width:'100%',height:'500px',borderRadius:'0 0 var(--radius-xl) var(--radius-xl)'}}>
          {allProjects.length===0
            ?<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'8px'}}>
                <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink4)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div style={{fontSize:'13px',color:'var(--ink4)',fontWeight:500}}>Sin proyectos ni colaboraciones</div>
             </div>
            :<canvas ref={cvRef} style={{width:'100%',height:'500px',display:'block'}}/>
          }
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
