<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,get,push,onValue,remove,update}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const app=initializeApp({apiKey:'AIzaSyCVBfb-baz0rIN8s-rPhqSazMCF8u8JcM8',authDomain:'inverwork-inverfin.firebaseapp.com',databaseURL:'https://inverwork-inverfin-default-rtdb.firebaseio.com',projectId:'inverwork-inverfin',storageBucket:'inverwork-inverfin.firebasestorage.app',messagingSenderId:'459905480268',appId:'1:459905480268:web:d65e2a6b8821238ff226e9'});
const db=getDatabase(app);
window.FB={
  setUser:(id,d)=>set(ref(db,'users/'+id),d),
  getUsers:()=>get(ref(db,'users')).then(s=>s.val()||{}),
  onUsers:fn=>onValue(ref(db,'users'),s=>fn(s.val()||{})),
  addProject:d=>push(ref(db,'projects'),d),
  updProject:(id,d)=>update(ref(db,'projects/'+id),d),
  delProject:id=>remove(ref(db,'projects/'+id)),
  onProjects:fn=>onValue(ref(db,'projects'),s=>fn(s.val()||{})),
  addTask:(pid,d)=>push(ref(db,'tasks/'+pid),d),
  updTask:(pid,tid,d)=>update(ref(db,'tasks/'+pid+'/'+tid),d),
  delTask:(pid,tid)=>remove(ref(db,'tasks/'+pid+'/'+tid)),
  onTasks:(pid,fn)=>onValue(ref(db,'tasks/'+pid),s=>fn(s.val()||{})),
  onAllTasks:fn=>onValue(ref(db,'tasks'),s=>fn(s.val()||{})),
  addLog:(tid,d)=>push(ref(db,'logs/'+tid),d),
  addCost:(pid,d)=>push(ref(db,'costs/'+pid),d),
  delCost:(pid,cid)=>remove(ref(db,'costs/'+pid+'/'+cid)),
  onCosts:(pid,fn)=>onValue(ref(db,'costs/'+pid),s=>fn(s.val()||{})),
  addReport:d=>push(ref(db,'reports'),d),
  onReports:fn=>onValue(ref(db,'reports'),s=>fn(s.val()||{})),
  addComment:(rid,d)=>push(ref(db,'comments/'+rid),d),
  onComments:(rid,fn)=>onValue(ref(db,'comments/'+rid),s=>fn(s.val()||{})),
  /* ── Colaboradores e invitaciones ── */
  addCollab:(pid,d)=>push(ref(db,'collabs/'+pid),d),
  updCollab:(pid,cid,d)=>update(ref(db,'collabs/'+pid+'/'+cid),d),
  delCollab:(pid,cid)=>remove(ref(db,'collabs/'+pid+'/'+cid)),
  onCollabs:(pid,fn)=>onValue(ref(db,'collabs/'+pid),s=>fn(s.val()||{})),
  onAllCollabs:fn=>onValue(ref(db,'collabs'),s=>fn(s.val()||{})),
  addInvite:d=>push(ref(db,'invites'),d),
  updInvite:(id,d)=>update(ref(db,'invites/'+id),d),
  onInvites:(userId,fn)=>onValue(ref(db,'invites'),s=>{
    const all=s.val()||{};
    fn(Object.fromEntries(Object.entries(all).filter(([,v])=>v.toUserId===userId)));
  }),
};
window.dispatchEvent(new Event('fb'));
</script>

const Bar=({v})=><div style={{height:'2px',background:'#e4e4e0',borderRadius:'99px',overflow:'hidden'}}>

/* ─ FORM COMPONENTS ─ */
const iSt={width:'100%',padding:'9px 12px',border:'1px solid #e8eaed',borderRadius:'6px',fontSize:'13px',color:'#1a1d23',background:'#fff',outline:'none',fontFamily:'inherit',transition:'all .15s',boxShadow:'0 1px 2px rgba(0,0,0,.04)'};
const iHov=e=>{e.target.style.borderColor='#4f73f5';e.target.style.boxShadow='0 0 0 3px rgba(79,115,245,.12)'};
const iBlr=e=>{e.target.style.borderColor='#e8eaed';e.target.style.boxShadow='0 1px 2px rgba(0,0,0,.04)'};

const Field=({label,children})=><div style={{marginBottom:'16px'}}>
  {label&&<div style={{fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'6px'}}>{label}</div>}
  {children}
</div>;

const In=({label,...p})=><Field label={label}>
  <input style={iSt} onFocus={iHov} onBlur={iBlr} {...p}/>
</Field>;

const Ta=({label,...p})=><Field label={label}>
  <textarea style={{...iSt,resize:'none'}} rows={3} onFocus={iHov} onBlur={iBlr} {...p}/>
</Field>;

const Se=({label,opts,...p})=><Field label={label}>
  <select style={{...iSt,cursor:'pointer',appearance:'none'}} onFocus={iHov} onBlur={iBlr} {...p}>
    {opts.map(o=><option key={o}>{o}</option>)}
  </select>
</Field>;

const Btn=({ch,v='p',sm,full,dis,...p})=>{
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'6px',fontFamily:'inherit',fontWeight:600,borderRadius:'6px',cursor:dis?'not-allowed':'pointer',opacity:dis?.45:1,transition:'all .15s',border:'none',fontSize:sm?'12px':'13px',padding:sm?'5px 12px':'9px 16px',width:full?'100%':'auto',letterSpacing:'.01em'};
  const vs={
    p:{...base,background:'#4f73f5',color:'#fff',boxShadow:'0 1px 3px rgba(79,115,245,.35)'},
    g:{...base,background:'#fff',color:'#6b7280',border:'1px solid #e8eaed',boxShadow:'0 1px 2px rgba(0,0,0,.04)'},
    a:{...base,background:'#22c55e',color:'#fff',boxShadow:'0 1px 3px rgba(34,197,94,.35)'},
    r:{...base,background:'#fff',color:'#9ca3af',border:'1px solid #e8eaed'},
  };
  const s=vs[v]||vs.p;
  const hover={p:'#3558e0',g:'#1a1d23',a:'#16a34a',r:'#ef4444'};
  return <button style={s} disabled={dis}
    onMouseEnter={e=>{if(!dis){e.currentTarget.style.background=hover[v];if(v==='g'){e.currentTarget.style.color='#1a1d23';e.currentTarget.style.borderColor='#d1d5db';}if(v==='r'){e.currentTarget.style.color='#ef4444';e.currentTarget.style.borderColor='#fca5a5';}}}}
    onMouseLeave={e=>{if(!dis){e.currentTarget.style.background=s.background;if(v==='g'){e.currentTarget.style.color='#6b7280';e.currentTarget.style.borderColor='#e8eaed';}if(v==='r'){e.currentTarget.style.color='#9ca3af';e.currentTarget.style.borderColor='#e8eaed';}}}}
    {...p}>{p.children||ch}</button>;
};

/* ─ MODAL via portal ─ */
const Modal=({title,sub,onClose,wide,children})=>{
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',h);
    document.body.style.overflow='hidden';
    return()=>{document.removeEventListener('keydown',h);document.body.style.overflow='';};
  },[]);
  return portal(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}}
      style={{position:'fixed',inset:0,zIndex:9000,background:'rgba(0,0,0,.28)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div className="mi" onClick={e=>e.stopPropagation()}
        style={{background:'#fff',border:'1px solid #e4e4e0',borderRadius:'12px',boxShadow:'0 20px 60px rgba(0,0,0,.15)',width:'100%',maxWidth:wide?'680px':'440px',maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid #e4e4e0',display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div className="g" style={{fontSize:'20px',fontWeight:500,color:'#111'}}>{title}</div>
            {sub&&<div style={{fontSize:'12px',color:'#888',marginTop:'2px'}}>{sub}</div>}
          </div>
          <button onClick={onClose} style={{width:'28px',height:'28px',borderRadius:'50%',border:'1px solid #e4e4e0',background:'#f4f4f2',cursor:'pointer',fontSize:'16px',color:'#888',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginLeft:'12px',fontFamily:'inherit'}}>×</button>
        </div>
        <div style={{padding:'20px 24px',overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
};

/* ─ AUTH ─ */
const DEPT_CODES={'it':'IT2026','consultoria':'CONS2026'};

const Auth=({onLogin})=>{
  const[mode,setMode]=useState('in');
  const[name,setName]=useState('');
  const[pin,setPin]=useState('');
  const[role,setRole]=useState('empleado');
  const[dept,setDept]=useState('it');
  const[code,setCode]=useState('');
  const[deptCode,setDeptCode]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);

  const login=async()=>{
    if(!name.trim()||!pin){setErr('Completa nombre y PIN');return}
    setBusy(true);setErr('');
    if(name.trim().toLowerCase()==='admin'&&pin==='0000'){onLogin(ADMIN);return}
    const users=await window.FB.getUsers();
    const u=Object.values(users).find(x=>x.name.toLowerCase()===name.trim().toLowerCase()&&x.pin===pin);
    if(!u){setErr('Nombre o PIN incorrecto');setBusy(false);return}
    onLogin(u);
  };

  const register=async()=>{
    if(!name.trim()||pin.length!==4){setErr('Nombre y PIN de 4 dígitos');return}
    if(role==='gerencia'&&code!==GC){setErr('Código de gerencia incorrecto');return}
    if(!DEPT_CODES[dept]||deptCode!==DEPT_CODES[dept]){setErr('Código de departamento incorrecto');return}
    setBusy(true);setErr('');
    const users=await window.FB.getUsers();
    if(Object.values(users).find(x=>x.name.toLowerCase()===name.trim().toLowerCase())){setErr('Ese nombre ya existe');setBusy(false);return}
    const id=uid();
    const nu={id,name:name.trim(),pin,role,department:dept,company:'Inverfin',createdAt:ts()};
    await window.FB.setUser(id,nu);
    onLogin(nu);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex'}}>
      {/* panel oscuro */}
      <div style={{width:'340px',background:'#111',flexShrink:0,display:'flex',flexDirection:'column',justifyContent:'space-between',padding:'48px',display:'none'}}>
        <div className="hidden lg:flex flex-col"/>
      </div>
      <div className="hidden lg:flex" style={{width:'340px',background:'#111',flexShrink:0,flexDirection:'column',justifyContent:'space-between',padding:'48px'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'48px'}}>
            <img src={LOGO} style={{width:'32px',height:'32px',borderRadius:'8px',opacity:.9}} alt=""/>
            <span className="g" style={{color:'#fff',fontSize:'22px',fontWeight:500}}>InverWork</span>
          </div>
          <div className="g" style={{color:'#fff',fontSize:'28px',fontWeight:500,lineHeight:1.3,marginBottom:'12px'}}>Gestión de proyectos para Inverfin Holding</div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:'13px',lineHeight:1.6}}>Proyectos, tareas, tiempo y reportes — todo en tiempo real.</div>
        </div>
        <div style={{color:'rgba(255,255,255,.2)',fontSize:'11px'}}>© 2026 Inverfin Holding<br/><span style={{fontStyle:'italic'}}>Created by Jesús Santiago</span></div>
      </div>

      {/* panel blanco */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'32px',background:'#fafaf8'}}>
        <div className="fi" style={{width:'100%',maxWidth:'360px'}}>
          {/* mobile logo */}
          <div className="lg:hidden" style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'36px'}}>
            <img src={LOGO} style={{width:'32px',height:'32px',borderRadius:'8px'}} alt=""/>
            <div>
              <div className="g" style={{fontSize:'18px',fontWeight:500,color:'#111'}}>InverWork</div>
              <div style={{fontSize:'9px',color:'#bbb',letterSpacing:'2px',textTransform:'uppercase'}}>Inverfin Holding</div>
            </div>
          </div>

          <div className="g" style={{fontSize:'30px',fontWeight:500,color:'#111',marginBottom:'4px'}}>{mode==='in'?'Iniciar sesión':'Crear cuenta'}</div>
          <div style={{fontSize:'13px',color:'#888',marginBottom:'28px'}}>{mode==='in'?'Accede con tu nombre y PIN.':'Elige un nombre y un PIN de 4 dígitos.'}</div>

          <In label="Nombre" placeholder="Tu nombre completo" value={name} onChange={e=>setName(e.target.value)}/>
          <In label="PIN" type="password" maxLength={4} inputMode="numeric" placeholder="••••" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='in'?login():register())}/>

          {mode==='reg'&&(
            <>
              <Field label="Rol">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                  {['empleado','gerencia'].map(r=>(
                    <button key={r} onClick={()=>setRole(r)} style={{padding:'12px',border:`1px solid ${role===r?'#111':'#e4e4e0'}`,borderRadius:'8px',background:role===r?'#111':'#fff',color:role===r?'#fff':'#888',fontSize:'13px',fontWeight:500,cursor:'pointer',fontFamily:'inherit',textTransform:'capitalize',transition:'all .15s'}}>{r}</button>
                  ))}
                </div>
              </Field>
              {role==='gerencia'&&<In label="Código de gerencia" placeholder="Código confidencial" value={code} onChange={e=>setCode(e.target.value)}/>}
              <Field label="Departamento">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                  {[['it','💻 IT'],['consultoria','📊 Consultoría']].map(([v,lbl])=>(
                    <button key={v} onClick={()=>{setDept(v);setDeptCode('')}} style={{padding:'12px',border:`1px solid ${dept===v?'#4f73f5':'#e4e4e0'}`,borderRadius:'8px',background:dept===v?'#eef1fe':'#fff',color:dept===v?'#4f73f5':'#888',fontSize:'13px',fontWeight:500,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>{lbl}</button>
                  ))}
                </div>
              </Field>
              <In label={`Código de ${dept==='it'?'IT':'Consultoría'}`} placeholder="Código del departamento" value={deptCode} onChange={e=>setDeptCode(e.target.value)}/>
            </>
          )}

          {err&&<div style={{color:'#e74c3c',fontSize:'12px',marginBottom:'12px'}}>⚠ {err}</div>}

          <Btn full onClick={mode==='in'?login:register} dis={busy} style={{marginBottom:'16px'}}>
            {busy?'Cargando…':mode==='in'?'Entrar →':'Crear cuenta →'}
          </Btn>
          <div style={{textAlign:'center',fontSize:'13px',color:'#888'}}>
            {mode==='in'?<>¿Sin cuenta? <span onClick={()=>{setMode('reg');setErr('')}} style={{color:'#111',textDecoration:'underline',cursor:'pointer'}}>Regístrate</span></>
                        :<>¿Ya tienes cuenta? <span onClick={()=>{setMode('in');setErr('')}} style={{color:'#111',textDecoration:'underline',cursor:'pointer'}}>Entrar</span></>}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─ DASHBOARD ─ */
const Dashboard=({user,projects,allTasks,reports,go})=>{
  const admin=user.role==='admin'||user.role==='gerencia';
  const myP=admin?Object.entries(projects):Object.entries(projects).filter(([,p])=>p.ownerId===user.id);
  const today=new Date().toDateString();
  const todayH=Object.values(reports||{}).filter(r=>r.userId===user.id&&new Date(r.date).toDateString()===today).reduce((s,r)=>s+(+r.hoursWorked||0),0);
  const myT=myP.flatMap(([pid])=>Object.values(allTasks[pid]||{}));
  const stats=[
    {n:myP.filter(([,p])=>['Activo','En progreso'].includes(p.status)).length, l:'Proyectos activos'},
    {n:myT.filter(t=>t.status==='Pendiente').length,                            l:'Tareas pendientes'},
    {n:myT.filter(t=>t.status==='Completado').length,                           l:'Completadas'},
    {n:todayH+'h',                                                               l:'Horas hoy'},
  ];
  return(
    <div className="fi">
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'2px',marginBottom:'6px'}}>{new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        <div className="g" style={{fontSize:'36px',fontWeight:500,color:'#111'}}>Bienvenido, {user.name}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px',marginBottom:'24px'}}>
        {stats.map((s,i)=>(
          <div key={i} style={{background:'#fff',padding:'18px 22px',borderRadius:'10px',border:'1px solid #e8eaed',boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
            <div className="g" style={{fontSize:'34px',fontWeight:500,color:'#111',marginBottom:'3px'}}>{s.n}</div>
            <div style={{fontSize:'12px',color:'#888'}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
        <div className="g" style={{fontSize:'20px',fontWeight:500}}>Proyectos recientes</div>
        <button onClick={()=>go('projects')} style={{fontSize:'12px',color:'#888',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',fontFamily:'inherit'}}>Ver todos →</button>
      </div>
      {myP.length===0
        ?<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'48px',textAlign:'center',color:'#9ca3af',fontSize:'13px'}}>Sin proyectos aún. <span onClick={()=>go('projects')} style={{textDecoration:'underline',cursor:'pointer'}}>Crear uno →</span></div>
        :<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          {myP.slice(0,6).map(([pid,p],i)=>{
            const v=pct(allTasks[pid]||{});
            return(
              <div key={pid} onClick={()=>go('proj',pid,p)}
                style={{display:'flex',alignItems:'center',gap:'16px',padding:'13px 18px',borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff',cursor:'pointer',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fafaf8'}
                onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,color:'#111',marginBottom:'5px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                  <Bar v={v}/>
                </div>
                <span style={{fontSize:'11px',color:'#888',fontFamily:'monospace',width:'30px',textAlign:'right'}}>{v}%</span>
                <Tag s={p.status}/>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
};

/* ─ PROJECTS LIST — TrackingTime style ─ */
const ProjectCard=({pid,p,tasks,onClick,onDelete,canDelete})=>{
  const color=getColor(pid);
  const v=pct(tasks);
  const total=Object.keys(tasks).length;
  const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
  const inProg=Object.values(tasks).filter(t=>t.status==='En progreso').length;
  return(
    <div onClick={onClick}
      style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',overflow:'hidden',cursor:'pointer',transition:'all .18s',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,.1)';e.currentTarget.style.transform='translateY(-1px)'}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.06)';e.currentTarget.style.transform='none'}}>
      {/* color bar */}
      <div style={{height:'4px',background:color}}/>
      <div style={{padding:'16px'}}>
        {/* header */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'10px'}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,color:'#1a1d23',fontSize:'14px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:'3px'}}>{p.name}</div>
            <div style={{fontSize:'12px',color:'#9ca3af'}}>{p.ownerName}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'6px',marginLeft:'8px',flexShrink:0}}>
            <Tag s={p.status}/>
            {canDelete&&<button onClick={e=>{e.stopPropagation();if(confirm('¿Eliminar?'))onDelete()}}
              style={{width:'22px',height:'22px',borderRadius:'50%',border:'none',background:'transparent',color:'#d1d5db',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,fontFamily:'inherit'}}
              onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
              onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>×</button>}
          </div>
        </div>
        {/* progress */}
        <div style={{marginBottom:'12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#9ca3af',marginBottom:'5px'}}>
            <span>Progreso</span>
            <span style={{fontWeight:600,color:v===100?'#22c55e':'#1a1d23'}}>{v}%</span>
          </div>
          <div style={{height:'5px',background:'#f3f4f6',borderRadius:'99px',overflow:'hidden'}}>
            <div style={{height:'100%',width:v+'%',background:v===100?'#22c55e':color,borderRadius:'99px',transition:'width .5s'}}/>
          </div>
        </div>
        {/* stats row */}
        <div style={{display:'flex',gap:'12px',fontSize:'12px',color:'#6b7280'}}>
          <span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#9ca3af'}}/>
            {total} tareas
          </span>
          {inProg>0&&<span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#4f73f5'}}/>
            {inProg} en progreso
          </span>}
          <span style={{display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#22c55e'}}/>
            {done} completadas
          </span>
        </div>
        {/* dept-specific extra info */}
        {p.department==='consultoria'&&p.client&&(
          <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #f3f4f6',display:'flex',flexDirection:'column',gap:'4px'}}>
            <div style={{fontSize:'11px',color:'#6b7280',display:'flex',gap:'5px',alignItems:'center'}}><span>🏢</span><span style={{fontWeight:600,color:'#1a1d23'}}>{p.client}</span></div>
            {p.consultType&&<div style={{fontSize:'11px',color:'#9ca3af'}}>{p.consultType}</div>}
            {p.fees&&<div style={{fontSize:'11px',color:'#7c3aed',fontWeight:600}}>{Number(p.fees).toLocaleString('es-ES')} FCFA</div>}
          </div>
        )}
      </div>
    </div>
  );
};

/* ─ DEPT badge helper ─ */
const DeptBadge=({dept})=>{
  if(dept==='consultoria') return <span style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:'99px',padding:'2px 8px'}}>📊 Consultoría</span>;
  if(dept==='it')          return <span style={{fontSize:'10px',fontWeight:700,color:'#0369a1',background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'99px',padding:'2px 8px'}}>💻 IT</span>;
  return null;
};

const ProjectsList=({user,projects,allTasks,openProject,allCollabs,allUsers})=>{
  const[show,setShow]=useState(false);
  /* base fields */
  const[nm,setNm]=useState('');
  const[desc,setDesc]=useState('');
  const[sd,setSd]=useState('');
  const[ed,setEd]=useState('');
  const[st,setSt]=useState('Activo');
  /* Consultoría fields */
  const[client,setClient]=useState('');
  const[consultType,setConsultType]=useState('Estrategia empresarial');
  const[deliverables,setDeliverables]=useState('');
  const[fees,setFees]=useState('');
  const[reportDate,setReportDate]=useState('');
  const[leadConsultant,setLeadConsultant]=useState('');
  /* collaborators to invite on creation */
  const[collabList,setCollabList]=useState([]); // [{userId, userName, role}]
  const[selUser,setSelUser]=useState('');
  const[selRole,setSelRole]=useState('Colaborador');

  const admin=user.role==='admin'||user.role==='gerencia';
  const userDept=user.department||'it';

  const canSeeProject=(pid,p)=>{
    if(admin)return true;
    if((p.department||'it')===userDept)return true;
    const cols=allCollabs?.[pid]||{};
    return Object.values(cols).some(c=>c.userId===user.id);
  };

  const list=Object.entries(projects).filter(([pid,p])=>canSeeProject(pid,p));

  // candidate users to invite (same or other dept, not self, not already added)
  const candidates=Object.values(allUsers||{}).filter(u=>
    u.id!==user.id &&
    u.role==='empleado' &&
    !collabList.find(c=>c.userId===u.id)
  );

  const addCollab=()=>{
    if(!selUser)return;
    const u=candidates.find(x=>x.id===selUser);
    if(!u)return;
    setCollabList(prev=>[...prev,{userId:u.id,userName:u.name,role:selRole,dept:u.department||'it'}]);
    setSelUser('');setSelRole('Colaborador');
  };

  const removeCollab=(uid)=>setCollabList(prev=>prev.filter(c=>c.userId!==uid));

  const resetForm=()=>{
    setNm('');setDesc('');setSd('');setEd('');setSt('Activo');
    setClient('');setConsultType('Estrategia empresarial');setDeliverables('');setFees('');setReportDate('');setLeadConsultant('');
    setCollabList([]);setSelUser('');setSelRole('Colaborador');
  };

  const doCreate=async()=>{
    if(!nm.trim())return;
    const base={name:nm.trim(),description:desc,startDate:sd,endDate:ed,status:st,ownerId:user.id,ownerName:user.name,department:userDept,createdAt:ts(),progress:0};
    if(userDept==='consultoria'){
      Object.assign(base,{client,consultType,deliverables,fees,reportDate,leadConsultant:leadConsultant||user.name});
    }
    const ref=await window.FB.addProject(base);
    const pid=ref.key;
    // send invites to selected collaborators
    if(pid&&collabList.length>0){
      await Promise.all(collabList.map(c=>
        window.FB.addInvite({projectId:pid,projectName:nm.trim(),fromId:user.id,fromName:user.name,toUserId:c.userId,toUserName:c.userName,collabRole:c.role,status:'pending',createdAt:ts()})
      ));
    }
    setShow(false);resetForm();
  };

  return(
    <div className="fi">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px'}}>
        <div>
          <div style={{fontWeight:700,fontSize:'22px',color:'#1a1d23',letterSpacing:'-.02em'}}>Proyectos</div>
          <div style={{fontSize:'13px',color:'#9ca3af',marginTop:'2px'}}>{list.length} proyecto{list.length!==1?'s':''}</div>
        </div>
        {!admin&&<Btn onClick={()=>setShow(true)}>+ Nuevo proyecto</Btn>}
      </div>

      {list.length===0
        ?<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'64px',textAlign:'center'}}>
          <div style={{fontSize:'40px',marginBottom:'12px'}}>📁</div>
          <div style={{fontWeight:600,fontSize:'16px',color:'#1a1d23',marginBottom:'6px'}}>Sin proyectos</div>
          <div style={{fontSize:'13px',color:'#9ca3af',marginBottom:'20px'}}>Crea tu primer proyecto para empezar.</div>
          {!admin&&<Btn onClick={()=>setShow(true)}>Crear proyecto</Btn>}
        </div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'16px'}}>
          {list.map(([pid,p])=>{
            const pDept=p.department||'it';
            const isCross=pDept!==userDept&&!admin;
            return(
              <div key={pid} style={{position:'relative'}}>
                {isCross&&(
                  <div style={{position:'absolute',top:'12px',left:'12px',zIndex:2,display:'flex',gap:'4px',alignItems:'center'}}>
                    <DeptBadge dept={pDept}/>
                    <span style={{fontSize:'10px',color:'#6b7280',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'99px',padding:'2px 7px'}}>🔗 Colaboración</span>
                  </div>
                )}
                {!isCross&&!admin&&<div style={{position:'absolute',top:'12px',left:'12px',zIndex:2}}><DeptBadge dept={pDept}/></div>}
                <ProjectCard pid={pid} p={p} tasks={allTasks[pid]||{}}
                  onClick={()=>openProject(pid,p)}
                  onDelete={()=>window.FB.delProject(pid)}
                  canDelete={p.ownerId===user.id}/>
              </div>
            );
          })}
        </div>
      }

      {show&&(
        <Modal title={userDept==='consultoria'?'Nuevo proyecto de Consultoría':'Nuevo proyecto de IT'} onClose={()=>{setShow(false);resetForm();}} wide>

          {/* ── BASE FIELDS ── */}
          <In label="Nombre del proyecto *" value={nm} onChange={e=>setNm(e.target.value)} placeholder={userDept==='consultoria'?'Ej. Estrategia Expansión Acme Corp':'Ej. Migración infraestructura cloud'} autoFocus/>
          <Ta label="Descripción" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descripción breve (opcional)"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Fecha inicio" type="date" value={sd} onChange={e=>setSd(e.target.value)}/>
            <In label="Fecha fin est." type="date" value={ed} onChange={e=>setEd(e.target.value)}/>
          </div>
          <Se label="Estado" value={st} onChange={e=>setSt(e.target.value)} opts={['Activo','En progreso','Pausado','Finalizado']}/>

          {/* ── CONSULTORÍA SPECIFIC ── */}
          {userDept==='consultoria'&&(
            <div style={{margin:'8px 0 14px',borderTop:'1px solid #f3f4f6',paddingTop:'14px'}}>
              <div style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'12px'}}>📊 Datos de consultoría</div>
              <In label="Cliente / empresa contratante *" value={client} onChange={e=>setClient(e.target.value)} placeholder="Nombre de la empresa cliente"/>
              <Se label="Tipo de consultoría" value={consultType} onChange={e=>setConsultType(e.target.value)} opts={['Estrategia empresarial','Consultoría financiera','Consultoría legal / compliance','Procesos y operaciones','Transformación organizacional','Due diligence','Otro']}/>
              <Ta label="Entregables esperados" value={deliverables} onChange={e=>setDeliverables(e.target.value)} placeholder="Ej. Informe ejecutivo, plan de acción, modelo financiero…"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                <In label="Honorarios (FCFA)" type="number" value={fees} onChange={e=>setFees(e.target.value)} placeholder="0"/>
                <In label="Fecha entrega informe" type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)}/>
              </div>
              <In label="Consultor responsable" value={leadConsultant} onChange={e=>setLeadConsultant(e.target.value)} placeholder={user.name}/>
            </div>
          )}

          {/* ── COLLABORATORS ── */}
          <div style={{borderTop:'1px solid #f3f4f6',paddingTop:'14px',marginTop:'4px'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'#4f73f5',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'12px'}}>👥 Colaboradores (opcional)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:'8px',marginBottom:'10px',alignItems:'flex-end'}}>
              <Field label="Usuario">
                <select value={selUser} onChange={e=>setSelUser(e.target.value)} style={{...iSt,cursor:'pointer',appearance:'none'}}>
                  <option value="">— Seleccionar —</option>
                  {candidates.map(u=>(
                    <option key={u.id} value={u.id}>{u.name} · {u.department==='consultoria'?'Consultoría':'IT'}</option>
                  ))}
                </select>
              </Field>
              <Field label="Rol">
                <select value={selRole} onChange={e=>setSelRole(e.target.value)} style={{...iSt,cursor:'pointer',appearance:'none'}}>
                  {['Colaborador','Desarrollador','Diseñador','QA','Analista','Supervisor','Consultor'].map(r=><option key={r}>{r}</option>)}
                </select>
              </Field>
              <div style={{paddingBottom:'0px'}}>
                <Btn onClick={addCollab} dis={!selUser} sm>+ Añadir</Btn>
              </div>
            </div>
            {collabList.length>0&&(
              <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'8px'}}>
                {collabList.map(c=>(
                  <div key={c.userId} style={{display:'flex',alignItems:'center',gap:'10px',background:'#f7f8fa',border:'1px solid #e8eaed',borderRadius:'8px',padding:'8px 12px'}}>
                    <div style={{width:'26px',height:'26px',borderRadius:'50%',background:'#4f73f5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,color:'#fff',flexShrink:0}}>{c.userName[0].toUpperCase()}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:600,color:'#1a1d23'}}>{c.userName}</div>
                      <div style={{fontSize:'11px',color:'#9ca3af'}}>{c.dept==='consultoria'?'📊 Consultoría':'💻 IT'}</div>
                    </div>
                    <span style={{fontSize:'11px',fontWeight:600,color:'#16a34a',background:'#dcfce7',border:'1px solid #bbf7d0',borderRadius:'99px',padding:'2px 8px'}}>{c.role}</span>
                    <button onClick={()=>removeCollab(c.userId)}
                      style={{width:'22px',height:'22px',borderRadius:'50%',border:'none',background:'transparent',color:'#d1d5db',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
                      onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
                      onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>×</button>
                  </div>
                ))}
              </div>
            )}
            {collabList.length===0&&(
              <div style={{fontSize:'12px',color:'#9ca3af',fontStyle:'italic',marginBottom:'8px'}}>Sin colaboradores añadidos. Recibirán una invitación al crear el proyecto.</div>
            )}
          </div>

          <div style={{display:'flex',gap:'10px',paddingTop:'6px'}}>
            <Btn v="g" full onClick={()=>{setShow(false);resetForm();}}>Cancelar</Btn>
            <Btn full onClick={doCreate} dis={!nm.trim()||(userDept==='consultoria'&&!client.trim())}>
              {collabList.length>0?`Crear e invitar a ${collabList.length}`:'Crear proyecto'}
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ─ INVITE BANNER — floating, per user ─ */
const InviteBanner=({user,projects})=>{
  const[invites,setInvites]=useState({});
  useEffect(()=>{
    if(!user?.id)return;
    return window.FB.onInvites(user.id,d=>setInvites(d||{}));
  },[user?.id]);
  const pending=Object.entries(invites).filter(([,v])=>v.status==='pending');
  if(!pending.length)return null;
  const[iid,inv]=pending[0];
  const respond=async(accept)=>{
    await window.FB.updInvite(iid,{status:accept?'accepted':'declined'});
    if(accept){
      await window.FB.addCollab(inv.projectId,{userId:user.id,userName:user.name,role:inv.collabRole||'Colaborador',joinedAt:ts()});
    }
  };
  return portal(
    <div style={{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',zIndex:9400,width:'360px',pointerEvents:'none'}}>
      <div className="mi" style={{pointerEvents:'all',background:'#0d1117',border:'1px solid rgba(255,255,255,.12)',borderRadius:'14px',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
        <div style={{background:'linear-gradient(135deg,#1e3a8a,#4f73f5)',padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{width:'28px',height:'28px',borderRadius:'8px',background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:'#fff',fontSize:'12px',fontWeight:700,lineHeight:1}}>Invitación a proyecto</div>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:'10px',marginTop:'2px'}}>de {inv.fromName}</div>
          </div>
          {pending.length>1&&<span style={{background:'rgba(255,255,255,.15)',color:'#fff',fontSize:'10px',fontWeight:700,padding:'2px 7px',borderRadius:'99px'}}>{pending.length}</span>}
        </div>
        <div style={{padding:'14px 16px'}}>
          <div style={{color:'rgba(255,255,255,.8)',fontSize:'13px',fontWeight:600,marginBottom:'3px'}}>{inv.projectName}</div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:'11.5px',marginBottom:'14px'}}>Rol asignado: <span style={{color:'#60a5fa',fontWeight:600}}>{inv.collabRole||'Colaborador'}</span></div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>respond(false)}
              style={{flex:1,padding:'8px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'7px',color:'rgba(255,255,255,.5)',fontSize:'12.5px',fontWeight:600,cursor:'pointer',transition:'all .13s'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(239,68,68,.15)';e.currentTarget.style.color='#f87171';e.currentTarget.style.borderColor='rgba(239,68,68,.3)'}}
              onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.07)';e.currentTarget.style.color='rgba(255,255,255,.5)';e.currentTarget.style.borderColor='rgba(255,255,255,.1)'}}>
              Rechazar
            </button>
            <button onClick={()=>respond(true)}
              style={{flex:1,padding:'8px',background:'#4f73f5',border:'none',borderRadius:'7px',color:'#fff',fontSize:'12.5px',fontWeight:600,cursor:'pointer',transition:'background .13s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#3558e0'}
              onMouseLeave={e=>e.currentTarget.style.background='#4f73f5'}>
              Aceptar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─ PROJECT DETAIL — TrackingTime style, no auto-timer ─ */
const ProjectDetail=({user,pid,project,onBack,allUsers})=>{
  const[tasks,setTasks]=useState({});
  const[costs,setCosts]=useState({});
  const[collabs,setCollabs]=useState({});
  const[tab,setTab]=useState('tasks');
  const[showTask,setShowTask]=useState(false);
  const[showCost,setShowCost]=useState(false);
  const[showInvite,setShowInvite]=useState(false);
  const[inviteUser,setInviteUser]=useState('');
  const[inviteRole,setInviteRole]=useState('Colaborador');
  const[editTask,setEditTask]=useState(null); // {tid, ...fields}
  const[tName,setTName]=useState('');
  const[tDesc,setTDesc]=useState('');
  const[tSt,setTSt]=useState('Pendiente');
  const[tEst,setTEst]=useState('');
  const[cDesc,setCDesc]=useState('');
  const[cAmt,setCAmt]=useState('');
  const[cDate,setCDate]=useState('');
  const collabArr=Object.entries(collabs);
  const isCollab=collabArr.some(([,c])=>c.userId===user.id);
  const canEdit=project.ownerId===user.id||isCollab;
  const color=getColor(pid);

  useEffect(()=>{
    const u1=window.FB.onTasks(pid,d=>setTasks(d||{}));
    const u2=window.FB.onCosts(pid,d=>setCosts(d||{}));
    const u3=window.FB.onCollabs(pid,d=>setCollabs(d||{}));
    return()=>{u1();u2();u3()};
  },[pid]);

  const v=pct(tasks);
  const taskArr=Object.entries(tasks);
  const totalCost=Object.values(costs).reduce((s,c)=>s+(+c.amount||0),0);

  const addTask=async()=>{
    if(!tName.trim())return;
    await window.FB.addTask(pid,{name:tName.trim(),description:tDesc,status:tSt,timeEstimated:tEst,assignedTo:user.id,assignedName:user.name,timeSpent:0,createdAt:ts()});
    setShowTask(false);setTName('');setTDesc('');setTSt('Pendiente');setTEst('');
  };

  const changeStatus=async(tid,status)=>{
    await window.FB.updTask(pid,tid,{status});
    const updated={...tasks,[tid]:{...tasks[tid],status}};
    await window.FB.updProject(pid,{progress:pct(updated)});
  };

  const removeTask=async tid=>{
    if(!confirm('¿Eliminar tarea?'))return;
    await window.FB.delTask(pid,tid);
    const updated={...tasks};delete updated[tid];
    await window.FB.updProject(pid,{progress:pct(updated)});
  };

  const openEditTask=(tid,t)=>{
    setEditTask({tid,name:t.name,description:t.description||'',status:t.status||'Pendiente',timeEstimated:t.timeEstimated||''});
  };

  const saveEditTask=async()=>{
    if(!editTask.name.trim())return;
    await window.FB.updTask(pid,editTask.tid,{name:editTask.name.trim(),description:editTask.description,status:editTask.status,timeEstimated:editTask.timeEstimated});
    const updated={...tasks,[editTask.tid]:{...tasks[editTask.tid],...editTask}};
    await window.FB.updProject(pid,{progress:pct(updated)});
    setEditTask(null);
  };

  const sendInvite=async(allUsers)=>{
    if(!inviteUser)return;
    const toUser=Object.values(allUsers).find(u=>u.id===inviteUser);
    if(!toUser)return;
    await window.FB.addInvite({projectId:pid,projectName:project.name,fromId:user.id,fromName:user.name,toUserId:toUser.id,toUserName:toUser.name,collabRole:inviteRole,status:'pending',createdAt:ts()});
    setShowInvite(false);setInviteUser('');setInviteRole('Colaborador');
  };

  const kickCollab=async(cid)=>{
    if(!confirm('¿Quitar colaborador del proyecto?'))return;
    await window.FB.delCollab(pid,cid);
  };

  const assignTaskToCollab=(tid,uid,uname)=>{
    window.FB.updTask(pid,tid,{assignedTo:uid,assignedName:uname});
  };

  const addCost=async()=>{
    if(!cDesc.trim()||!cAmt)return;
    await window.FB.addCost(pid,{description:cDesc.trim(),amount:cAmt,date:cDate,createdAt:ts()});
    setShowCost(false);setCDesc('');setCAmt('');setCDate('');
  };

  /* task status colors — TrackingTime style */
  const TSC={
    'Pendiente'  :{bg:'#f3f4f6',color:'#6b7280',border:'#e5e7eb'},
    'En progreso':{bg:'#eef1fe',color:'#4f73f5',border:'#c7d2fd'},
    'Completado' :{bg:'#dcfce7',color:'#16a34a',border:'#bbf7d0'},
  };

  return(
    <div className="fi">
      {/* breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'20px'}}>
        <button onClick={onBack}
          style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'#6b7280',background:'none',border:'none',cursor:'pointer',padding:0,fontFamily:'inherit',fontWeight:500}}
          onMouseEnter={e=>e.currentTarget.style.color='#1a1d23'} onMouseLeave={e=>e.currentTarget.style.color='#6b7280'}>
          ← Proyectos
        </button>
        <span style={{color:'#d1d5db'}}>/</span>
        <span style={{fontSize:'13px',color:'#1a1d23',fontWeight:500}}>{project.name}</span>
      </div>

      {/* header card */}
      <div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',overflow:'hidden',marginBottom:'20px',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
        <div style={{height:'5px',background:color}}/>
        <div style={{padding:'20px 24px'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',marginBottom:'12px'}}>
            <div>
              <div style={{fontWeight:700,fontSize:'20px',color:'#1a1d23',marginBottom:'4px'}}>{project.name}</div>
              {project.description&&<div style={{fontSize:'13px',color:'#9ca3af'}}>{project.description}</div>}
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center',flexShrink:0}}>
              <Tag s={project.status}/>
              {canEdit&&(
                <select value={project.status} onChange={e=>window.FB.updProject(pid,{status:e.target.value})}
                  style={{...iSt,width:'auto',fontSize:'12px',padding:'5px 10px',cursor:'pointer'}}>
                  {['Activo','En progreso','Pausado','Finalizado','Bloqueado'].map(s=><option key={s}>{s}</option>)}
                </select>
              )}
            </div>
          </div>
          <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'#9ca3af',marginBottom:'16px',flexWrap:'wrap'}}>
            <span>👤 {project.ownerName}</span>
            {project.startDate&&<span>📅 {dFmt(project.startDate)}</span>}
            {project.endDate&&<span>🏁 {dFmt(project.endDate)}</span>}
            <span>📋 {taskArr.length} tareas</span>
          </div>
          {/* progress bar */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'6px'}}>
              <span style={{color:'#6b7280',fontWeight:500}}>Progreso general</span>
              <span style={{fontWeight:700,color:v===100?'#22c55e':color}}>{v}%</span>
            </div>
            <div style={{height:'8px',background:'#f3f4f6',borderRadius:'99px',overflow:'hidden'}}>
              <div style={{height:'100%',width:v+'%',background:v===100?'#22c55e':color,borderRadius:'99px',transition:'width .5s'}}/>
            </div>
          </div>
          {/* mini stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginTop:'16px'}}>
            {[['Pendiente','#9ca3af',taskArr.filter(([,t])=>t.status==='Pendiente').length],
              ['En progreso','#4f73f5',taskArr.filter(([,t])=>t.status==='En progreso').length],
              ['Completado','#22c55e',taskArr.filter(([,t])=>t.status==='Completado').length]
            ].map(([s,col,n])=>(
              <div key={s} style={{background:'#f7f8fa',borderRadius:'8px',padding:'10px 14px',textAlign:'center'}}>
                <div style={{fontSize:'22px',fontWeight:700,color:col,marginBottom:'2px'}}>{n}</div>
                <div style={{fontSize:'11px',color:'#9ca3af'}}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* tabs */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #e8eaed',marginBottom:'16px'}}>
        <div style={{display:'flex'}}>
          {[['tasks','Tareas'],['costs','Costes'],['collabs','Equipo']].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:'9px 16px',fontSize:'13px',fontWeight:600,border:'none',borderBottom:`2px solid ${tab===id?color:'transparent'}`,marginBottom:'-1px',color:tab===id?color:'#9ca3af',background:'transparent',cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>
              {lbl}
              {id==='tasks'?<span style={{marginLeft:'5px',fontSize:'11px',background:tab==='tasks'?color:'#f3f4f6',color:tab==='tasks'?'#fff':'#9ca3af',borderRadius:'99px',padding:'1px 6px'}}>{taskArr.length}</span>:''}
              {id==='costs'&&totalCost>0?<span style={{marginLeft:'5px',fontSize:'11px',color:'#9ca3af'}}>${Math.round(totalCost)}</span>:''}
              {id==='collabs'?<span style={{marginLeft:'5px',fontSize:'11px',background:tab==='collabs'?color:'#f3f4f6',color:tab==='collabs'?'#fff':'#9ca3af',borderRadius:'99px',padding:'1px 6px'}}>{collabArr.length+1}</span>:''}
            </button>
          ))}
        </div>
        <div style={{paddingBottom:'8px',display:'flex',gap:'6px'}}>
          {tab==='tasks'&&canEdit&&<Btn sm onClick={()=>setShowTask(true)}>+ Tarea</Btn>}
          {tab==='costs'&&canEdit&&<Btn sm onClick={()=>setShowCost(true)}>+ Coste</Btn>}
          {tab==='collabs'&&project.ownerId===user.id&&<Btn sm onClick={()=>setShowInvite(true)}>+ Invitar</Btn>}
        </div>
      </div>

      {/* TASKS */}
      {tab==='tasks'&&(taskArr.length===0
        ?<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'48px',textAlign:'center'}}>
          <div style={{fontSize:'32px',marginBottom:'10px'}}>✅</div>
          <div style={{fontWeight:600,color:'#1a1d23',marginBottom:'4px'}}>Sin tareas</div>
          <div style={{fontSize:'13px',color:'#9ca3af'}}>{canEdit?'Añade la primera tarea.':'No hay tareas.'}</div>
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {taskArr.map(([tid,t])=>{
            const sc=TSC[t.status]||TSC['Pendiente'];
            return(
              <div key={tid}
                style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'14px 16px',boxShadow:'0 1px 2px rgba(0,0,0,.04)',transition:'box-shadow .15s'}}
                onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,.08)'}
                onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 2px rgba(0,0,0,.04)'}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'10px',marginBottom:'8px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:'#1a1d23',fontSize:'14px',marginBottom:'3px'}}>{t.name}</div>
                    {t.description&&<div style={{fontSize:'12px',color:'#9ca3af',lineHeight:1.5}}>{t.description}</div>}
                  </div>
                  {/* status badge */}
                  <span style={{flexShrink:0,padding:'3px 10px',borderRadius:'99px',fontSize:'11px',fontWeight:600,background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>{t.status}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
                  <div style={{display:'flex',gap:'14px',fontSize:'12px',color:'#9ca3af'}}>
                    {t.timeEstimated&&<span>⏱ Est. <b style={{color:'#6b7280'}}>{t.timeEstimated}h</b></span>}
                    {t.assignedName&&<span>👤 {t.assignedName}</span>}
                  </div>
                  {canEdit&&(
                    <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                      {/* status quick-change */}
                      {['Pendiente','En progreso','Completado'].map(s=>{
                        const sc2=TSC[s];
                        const active=t.status===s;
                        return(
                          <button key={s} onClick={()=>changeStatus(tid,s)}
                            style={{padding:'3px 8px',borderRadius:'99px',border:`1px solid ${active?sc2.border:'#e8eaed'}`,background:active?sc2.bg:'transparent',color:active?sc2.color:'#9ca3af',fontSize:'11px',fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>
                            {s==='Pendiente'?'Pendiente':s==='En progreso'?'En progreso':'✓ Listo'}
                          </button>
                        );
                      })}
                      <button onClick={()=>openEditTask(tid,t)}
                        title="Editar tarea"
                        style={{width:'26px',height:'26px',borderRadius:'6px',border:'1px solid #e8eaed',background:'transparent',color:'#9ca3af',fontSize:'13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',marginLeft:'4px',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor='#a5b4fc';e.currentTarget.style.color='#4f73f5';e.currentTarget.style.background='#eef1fe'}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.color='#9ca3af';e.currentTarget.style.background='transparent'}}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button onClick={()=>removeTask(tid)}
                        style={{width:'26px',height:'26px',borderRadius:'6px',border:'1px solid #e8eaed',background:'transparent',color:'#d1d5db',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,fontFamily:'inherit',marginLeft:'2px',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#ef4444';e.currentTarget.style.background='#fff5f5'}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.color='#d1d5db';e.currentTarget.style.background='transparent'}}>×</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* COSTS */}
      {tab==='costs'&&(
        <>
          {Object.keys(costs).length>0&&(
            <div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'16px 20px',marginBottom:'12px',display:'flex',alignItems:'center',gap:'10px'}}>
              <span style={{fontSize:'13px',color:'#9ca3af',fontWeight:500}}>Total costes</span>
              <span style={{fontWeight:700,fontSize:'24px',color:'#1a1d23'}}>${totalCost.toFixed(2)}</span>
            </div>
          )}
          {Object.keys(costs).length===0
            ?<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'48px',textAlign:'center'}}>
              <div style={{fontSize:'32px',marginBottom:'10px'}}>💰</div>
              <div style={{fontWeight:600,color:'#1a1d23',marginBottom:'4px'}}>Sin costes</div>
              <div style={{fontSize:'13px',color:'#9ca3af'}}>{canEdit?'Registra costes externos.':'No hay costes.'}</div>
            </div>
            :<div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {Object.entries(costs).map(([cid,co])=>(
                <div key={cid} style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontWeight:600,color:'#1a1d23',fontSize:'14px'}}>{co.description}</div>
                    <div style={{fontSize:'12px',color:'#9ca3af',marginTop:'2px'}}>{dFmt(co.date)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                    <span style={{fontWeight:700,fontSize:'18px',color:'#1a1d23'}}>${(+co.amount).toFixed(2)}</span>
                    {canEdit&&<button onClick={()=>window.FB.delCost(pid,cid)}
                      style={{width:'24px',height:'24px',borderRadius:'50%',border:'1px solid #e8eaed',background:'transparent',color:'#d1d5db',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,fontFamily:'inherit'}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#ef4444'}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.color='#d1d5db'}}>×</button>}
                  </div>
                </div>
              ))}
            </div>
          }
        </>
      )}

      {/* COLLABORATORS TAB */}
      {tab==='collabs'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {/* owner row */}
          <div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
            <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'linear-gradient(135deg,#4f73f5,#7c9bff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,color:'#fff',flexShrink:0}}>{project.ownerName?.[0]?.toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:'13px',color:'#1a1d23'}}>{project.ownerName}</div>
              <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'1px'}}>Creador del proyecto</div>
            </div>
            <span style={{fontSize:'11px',fontWeight:600,color:'#4f73f5',background:'#eef1fe',border:'1px solid #c7d2fd',borderRadius:'99px',padding:'3px 10px'}}>Propietario</span>
          </div>
          {/* collab rows */}
          {collabArr.map(([cid,c])=>(
            <div key={cid} style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'#f3f4f6',border:'1px solid #e5e7eb',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,color:'#6b7280',flexShrink:0}}>{c.userName?.[0]?.toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'13px',color:'#1a1d23'}}>{c.userName}</div>
                <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'1px'}}>Unido {dFmt(c.joinedAt)}</div>
              </div>
              <span style={{fontSize:'11px',fontWeight:600,color:'#16a34a',background:'#dcfce7',border:'1px solid #bbf7d0',borderRadius:'99px',padding:'3px 10px'}}>{c.role||'Colaborador'}</span>
              {project.ownerId===user.id&&(
                <button onClick={()=>kickCollab(cid)}
                  style={{width:'26px',height:'26px',borderRadius:'6px',border:'1px solid #e8eaed',background:'transparent',color:'#d1d5db',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s',flexShrink:0}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#ef4444';e.currentTarget.style.background='#fff5f5'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.color='#d1d5db';e.currentTarget.style.background='transparent'}}>×</button>
              )}
            </div>
          ))}
          {collabArr.length===0&&(
            <div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',padding:'36px',textAlign:'center'}}>

      {editTask&&(
        <Modal title="Editar tarea" onClose={()=>setEditTask(null)}>
          <In label="Nombre *" value={editTask.name} onChange={e=>setEditTask(p=>({...p,name:e.target.value}))} placeholder="Nombre de la tarea" autoFocus/>
          <Ta label="Descripción" value={editTask.description} onChange={e=>setEditTask(p=>({...p,description:e.target.value}))} placeholder="Descripción opcional"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Tiempo estimado (h)" type="number" value={editTask.timeEstimated} onChange={e=>setEditTask(p=>({...p,timeEstimated:e.target.value}))} placeholder="0"/>
            <Se label="Estado" value={editTask.status} onChange={e=>setEditTask(p=>({...p,status:e.target.value}))} opts={['Pendiente','En progreso','Completado']}/>
          </div>
          <Field label="Asignado a">
            <select value={editTask.assignedTo||''} onChange={e=>{const u=[{id:user.id,name:user.name},...collabArr.map(([,c])=>({id:c.userId,name:c.userName}))].find(x=>x.id===e.target.value);setEditTask(p=>({...p,assignedTo:e.target.value,assignedName:u?.name||''}))}} style={{...iSt,cursor:'pointer'}}>
              <option value={user.id}>{user.name} (tú)</option>

      {/* TASK MODAL */}

          <div style={{display:'flex',gap:'10px',paddingTop:'6px'}}>
            <Btn v="g" full onClick={()=>setShowTask(false)}>Cancelar</Btn>
            <Btn full onClick={addTask} dis={!tName.trim()}>Guardar tarea</Btn>
          </div>
        </Modal>
      )}

      {/* COST MODAL */}
      {showCost&&(
        <Modal title="Añadir coste externo" onClose={()=>setShowCost(false)}>
          <Ta label="Concepto *" value={cDesc} onChange={e=>setCDesc(e.target.value)} placeholder="Ej. Consultor, dominio, API…"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Importe ($) *" type="number" value={cAmt} onChange={e=>setCAmt(e.target.value)} placeholder="0.00"/>
            <In label="Fecha" type="date" value={cDate} onChange={e=>setCDate(e.target.value)}/>
          </div>
          <div style={{display:'flex',gap:'10px',paddingTop:'6px'}}>
            <Btn v="g" full onClick={()=>setShowCost(false)}>Cancelar</Btn>
            <Btn full onClick={addCost} dis={!cDesc.trim()||!cAmt}>Añadir</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

const Projects=({user,projects,allTasks,openProj,setOpenProj,allUsers,allCollabs})=>{

/* ─ REPORTS ─ */
const Reports=({user,projects,reports})=>{
  const[show,setShow]=useState(false);
  const[sel,setSel]=useState(null);
  const[comments,setComments]=useState({});
  const[cmtTxt,setCmtTxt]=useState('');
  /* form */
  const[fDate,setFDate]=useState(new Date().toISOString().slice(0,10));
  const[fPid,setFPid]=useState('');
  const[fH,setFH]=useState('');
  const[fTasks,setFTasks]=useState('');
  const[fProb,setFProb]=useState('');
  const[fNotes,setFNotes]=useState('');

  const admin=user.role==='admin'||user.role==='gerencia';
  const list=Object.entries(reports||{}).filter(([,r])=>admin||r.userId===user.id).sort((a,b)=>new Date(b[1].createdAt||0)-new Date(a[1].createdAt||0));

  useEffect(()=>{
    if(!sel)return;
    return window.FB.onComments(sel[0],d=>setComments(d||{}));
  },[sel]);

  const create=async()=>{
    if(!fDate)return;
    await window.FB.addReport({date:fDate,projectId:fPid,projectName:projects[fPid]?.name||'',hoursWorked:fH,tasks:fTasks,problems:fProb,notes:fNotes,userId:user.id,userName:user.name,createdAt:ts()});
    setShow(false);setFDate(new Date().toISOString().slice(0,10));setFPid('');setFH('');setFTasks('');setFProb('');setFNotes('');
  };

  const sendCmt=async()=>{
    if(!cmtTxt.trim()||!sel)return;
    await window.FB.addComment(sel[0],{userId:user.id,userName:user.name,text:cmtTxt.trim(),createdAt:ts()});
    setCmtTxt('');
  };

  return(
    <div className="fi">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'24px',paddingBottom:'22px',borderBottom:'1px solid #e4e4e0'}}>
        <div>
          <div className="g" style={{fontSize:'36px',fontWeight:500,color:'#111'}}>Reportes</div>
          <div style={{fontSize:'13px',color:'#888',marginTop:'3px'}}>{list.length} reporte{list.length!==1?'s':''}</div>
        </div>
        {!admin&&<Btn onClick={()=>setShow(true)}>+ Nuevo reporte</Btn>}
      </div>

      {list.length===0
        ?<div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'64px',textAlign:'center'}}>
          <div className="g" style={{fontSize:'22px',color:'#bbb',marginBottom:'8px'}}>Sin reportes</div>
          {!admin&&<Btn onClick={()=>setShow(true)}>Crear reporte</Btn>}
        </div>
        :<div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          {list.map(([rid,r],i)=>(
            <div key={rid} onClick={()=>setSel([rid,r])}
              style={{padding:'13px 18px',borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff',cursor:'pointer',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#fafaf8'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'3px'}}>
                    <span style={{fontWeight:500,color:'#111'}}>{r.userName}</span>
                    <span style={{fontSize:'12px',color:'#888'}}>{dFmt(r.date)}</span>
                    {r.projectName&&<span style={{fontSize:'12px',color:'#aaa'}}>· {r.projectName}</span>}
                  </div>
                  {r.tasks&&<div style={{fontSize:'12px',color:'#888',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{r.tasks}</div>}
                  {r.problems&&<div style={{fontSize:'12px',color:'#e74c3c',marginTop:'2px'}}>⚠ {r.problems}</div>}
                </div>
                <div className="g" style={{fontSize:'22px',fontWeight:500,flexShrink:0}}>{r.hoursWorked||0}h</div>
              </div>
            </div>
          ))}
        </div>
      }

      {/* detail modal */}
      {sel&&(
        <Modal title={sel[1].userName} sub={dFmt(sel[1].date)+(sel[1].projectName?' · '+sel[1].projectName:'')} onClose={()=>setSel(null)} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1px',background:'#e4e4e0',border:'1px solid #e4e4e0',borderRadius:'8px',overflow:'hidden',marginBottom:'18px'}}>
            {[['Horas',`${sel[1].hoursWorked||0}h`],['Proyecto',sel[1].projectName||'—']].map(([l,v])=>(
              <div key={l} style={{background:'#f4f4f2',padding:'12px 16px'}}>
                <div style={{fontSize:'10px',color:'#888',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'3px'}}>{l}</div>
                <div className="g" style={{fontSize:'22px',fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>
          {sel[1].tasks&&<div style={{marginBottom:'14px'}}><div style={{fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'6px'}}>Tareas realizadas</div><div style={{fontSize:'13px',color:'#111',lineHeight:1.6,borderLeft:'2px solid #e4e4e0',paddingLeft:'12px'}}>{sel[1].tasks}</div></div>}
          {sel[1].problems&&<div style={{marginBottom:'14px',padding:'12px',border:'1px solid #fecaca',borderRadius:'8px',background:'#fef2f2'}}><div style={{fontSize:'10px',fontWeight:600,color:'#dc2626',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'4px'}}>Problemas</div><div style={{fontSize:'13px',color:'#b91c1c'}}>{sel[1].problems}</div></div>}
          {sel[1].notes&&<div style={{marginBottom:'14px',padding:'12px',border:'1px solid #e4e4e0',borderRadius:'8px',background:'#f4f4f2'}}><div style={{fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'4px'}}>Notas</div><div style={{fontSize:'13px',color:'#111'}}>{sel[1].notes}</div></div>}
          <div style={{borderTop:'1px solid #e4e4e0',paddingTop:'14px',marginTop:'4px'}}>
            <div style={{fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'10px'}}>Comentarios</div>
            <div style={{maxHeight:'140px',overflowY:'auto',marginBottom:'10px',display:'flex',flexDirection:'column',gap:'8px'}}>
              {Object.values(comments).length===0&&<div style={{fontSize:'12px',color:'#ccc'}}>Sin comentarios aún.</div>}
              {Object.values(comments).map((c,i)=>(
                <div key={i} style={{display:'flex',gap:'8px'}}>
                  <div style={{width:'22px',height:'22px',borderRadius:'50%',background:'#f4f4f2',border:'1px solid #e4e4e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:600,color:'#888',flexShrink:0}}>{c.userName[0]}</div>
                  <div>
                    <div style={{fontSize:'12px',fontWeight:500,color:'#111'}}>{c.userName} <span style={{color:'#ccc',fontWeight:400}}>{tFmt(c.createdAt)}</span></div>
                    <div style={{fontSize:'13px',color:'#111',marginTop:'1px'}}>{c.text}</div>
                  </div>
                </div>
              ))}
            </div>
            {(user.role==='admin'||user.role==='gerencia')&&<div style={{display:'flex',gap:'8px'}}>
              <input style={{...iSt,flex:1}} placeholder="Añadir comentario…" value={cmtTxt} onChange={e=>setCmtTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendCmt()}/>
              <Btn sm onClick={sendCmt} dis={!cmtTxt.trim()}>Enviar</Btn>
            </div>}
          </div>
        </Modal>
      )}

      {/* create modal */}
      {show&&(
        <Modal title="Nuevo reporte diario" onClose={()=>setShow(false)} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <In label="Fecha *" type="date" value={fDate} onChange={e=>setFDate(e.target.value)}/>
            <Field label="Proyecto">
              <select style={{...iSt,cursor:'pointer',appearance:'none'}} value={fPid} onChange={e=>setFPid(e.target.value)}>
                <option value="">— Sin proyecto —</option>
                {Object.entries(projects).filter(([,p])=>p.ownerId===user.id).map(([pid,p])=>(
                  <option key={pid} value={pid}>{p.name}</option>
                ))}
              </select>
            </Field>
          </div>
          <In label="Horas trabajadas" type="number" value={fH} onChange={e=>setFH(e.target.value)} placeholder="0"/>
          <Ta label="Tareas realizadas hoy" value={fTasks} onChange={e=>setFTasks(e.target.value)} placeholder="Describe el trabajo completado…"/>
          <Ta label="Problemas encontrados" value={fProb} onChange={e=>setFProb(e.target.value)} placeholder="Errores, bloqueos, obstáculos…"/>
          <Ta label="Notas" value={fNotes} onChange={e=>setFNotes(e.target.value)} placeholder="Ideas, aprendizajes, próximos pasos…"/>
          <div style={{display:'flex',gap:'10px',paddingTop:'6px'}}>
            <Btn v="g" full onClick={()=>setShow(false)}>Cancelar</Btn>
            <Btn full onClick={create}>Enviar reporte</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ─ OVERVIEW ─ */
const Overview=({projects,allTasks,reports,users,onExport})=>{
  const cD=useRef(null),cB=useRef(null),iD=useRef(null),iB=useRef(null);
  const pa=Object.entries(projects);
  const avg=pa.length?Math.round(pa.reduce((s,[pid])=>s+pct(allTasks[pid]||{}),0)/pa.length):0;
  const today=new Date().toDateString();

  useEffect(()=>{
    if(!cD.current)return;
    if(iD.current)iD.current.destroy();
    const sts=['Activo','En progreso','Pausado','Finalizado','Bloqueado'];
    iD.current=new Chart(cD.current,{type:'doughnut',data:{labels:sts,datasets:[{data:sts.map(s=>pa.filter(([,p])=>p.status===s).length),backgroundColor:['#111','#444','#888','#2a7a4b','#e74c3c'],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'DM Sans'},padding:10,color:'#888'}}}}});
  },[projects]);

  useEffect(()=>{
    if(!cB.current||!pa.length)return;
    if(iB.current)iB.current.destroy();
    const data=pa.map(([pid])=>pct(allTasks[pid]||{}));
    iB.current=new Chart(cB.current,{type:'bar',data:{labels:pa.map(([,p])=>p.name.length>22?p.name.slice(0,22)+'…':p.name),datasets:[{data,backgroundColor:data.map(v=>v===100?'#2a7a4b':'#111'),borderRadius:2,barThickness:13}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10},color:'#ccc'},grid:{color:'#f4f4f2'}},y:{grid:{display:false},ticks:{font:{size:10},color:'#888'}}}}});
  },[projects,allTasks]);

  const kpis=[
    {n:pa.length,l:'Proyectos'},
    {n:avg+'%',l:'Avance promedio'},
    {n:Object.values(users||{}).filter(u=>u.role==='empleado').length,l:'Empleados'},
    {n:Object.values(reports||{}).filter(r=>new Date(r.date).toDateString()===today).length,l:'Reportes hoy'},
  ];

  return(
    <div className="fi">
      <div style={{marginBottom:'24px',paddingBottom:'22px',borderBottom:'1px solid #e4e4e0',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'}}>
        <div>
          <div className="g" style={{fontSize:'36px',fontWeight:500,color:'#111'}}>Dashboard</div>
          <div style={{fontSize:'13px',color:'#888',marginTop:'3px'}}>Visibilidad completa del equipo en tiempo real.</div>
        </div>
        <button onClick={()=>onExport()} data-export-btn="1"
          style={{display:'inline-flex',alignItems:'center',gap:'8px',padding:'9px 18px',background:'#fff',border:'1.5px solid #e4e4e0',borderRadius:'8px',fontSize:'13px',fontWeight:600,color:'#1a1d23',cursor:'pointer',fontFamily:'inherit',transition:'all .16s',letterSpacing:'-.01em'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#2D8A58';e.currentTarget.style.color='#2D8A58';e.currentTarget.style.background='#f0fdf4'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#e4e4e0';e.currentTarget.style.color='#1a1d23';e.currentTarget.style.background='#fff'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar Excel
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1px',background:'#e4e4e0',border:'1px solid #e4e4e0',borderRadius:'10px',overflow:'hidden',marginBottom:'20px'}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{background:'#fff',padding:'18px 22px',borderRadius:'10px',border:'1px solid #e8eaed',boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
            <div className="g" style={{fontSize:'34px',fontWeight:500,color:'#111',marginBottom:'3px'}}>{k.n}</div>
            <div style={{fontSize:'12px',color:'#888'}}>{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'5fr 8fr',gap:'14px',marginBottom:'20px'}}>
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'18px',background:'#fff'}}>
          <div className="g" style={{fontSize:'17px',fontWeight:500,marginBottom:'3px'}}>Por estado</div>
          <div style={{fontSize:'12px',color:'#888',marginBottom:'14px'}}>Distribución</div>
          <div style={{height:'170px'}}><canvas ref={cD}/></div>
        </div>
        <div style={{border:'1px solid #e4e4e0',borderRadius:'10px',padding:'18px',background:'#fff'}}>
          <div className="g" style={{fontSize:'17px',fontWeight:500,marginBottom:'3px'}}>Avance</div>
          <div style={{fontSize:'12px',color:'#888',marginBottom:'14px'}}>Verde = 100%</div>
          <div style={{height:Math.max(pa.length*26+16,70)}}><canvas ref={cB}/></div>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:'10px',border:'1px solid #e8eaed',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
        <div style={{padding:'10px 18px',background:'#f4f4f2',borderBottom:'1px solid #e4e4e0',fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px'}}>Todos los proyectos</div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:'1px solid #e4e4e0'}}>
            {['Proyecto','Responsable','Estado','Avance','Tareas'].map(h=><th key={h} style={{padding:'9px 18px',textAlign:'left',fontSize:'10px',fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'1.5px'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {pa.length===0&&<tr><td colSpan={5} style={{padding:'32px',textAlign:'center',fontSize:'13px',color:'#888'}}>Sin proyectos.</td></tr>}
            {pa.map(([pid,p],i)=>{
              const tasks=allTasks[pid]||{};const v=pct(tasks);
              const done=Object.values(tasks).filter(t=>t.status==='Completado').length;
              return(
                <tr key={pid} style={{borderTop:i>0?'1px solid #e4e4e0':'none',background:'#fff'}}>
                  <td style={{padding:'11px 18px',fontWeight:500,color:'#111',fontSize:'13px'}}>{p.name}</td>
                  <td style={{padding:'11px 18px',fontSize:'12px',color:'#888'}}>{p.ownerName}</td>
                  <td style={{padding:'11px 18px'}}><Tag s={p.status}/></td>
                  <td style={{padding:'11px 18px'}}>
                    <div style={{width:'72px',marginBottom:'2px'}}><Bar v={v}/></div>
                    <span style={{fontSize:'11px',color:'#888',fontFamily:'monospace'}}>{v}%</span>
                  </td>
                  <td style={{padding:'11px 18px',fontSize:'12px',color:'#888',fontFamily:'monospace'}}>{done}/{Object.keys(tasks).length}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ─ USERS ─ */
const Users=({users,projects,allTasks,allCollabs})=>{
  const[view,setView]=useState('list');
  const[deptFilter,setDeptFilter]=useState('all');
  const all=[ADMIN,...Object.values(users)];
  const roles={admin:'Admin',gerencia:'Gerencia',empleado:'Empleado'};
  const roleColor={admin:'#ef4444',gerencia:'#f97316',empleado:'#22c55e'};

  const buildTree=()=>{

        {[['it','#0369a1','#f0f9ff','#bae6fd','💻'],['consultoria','#7c3aed','#f5f3ff','#ddd6fe','📊']].map(([d,col,bg,border,icon])=>(

                    <div style={{fontWeight:700,fontSize:'14px',color:'#1a1d23'}}>{u.name}</div>

                  </div>
                  <div style={{display:'flex',gap:'6px',alignItems:'center',flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    {u.department&&<DeptBadge dept={u.department}/>}

                    <span style={{fontSize:'11px',color:'#9ca3af',background:'#f3f4f6',borderRadius:'99px',padding:'3px 10px'}}>{totalInvolved}P · {totalTasks}T</span>
                  </div>
                </div>

                {/* tree branches */}
                {(totalInvolved+totalTasks)>0&&(
                  <div style={{padding:'12px 18px 14px',display:'flex',flexDirection:'column',gap:'0'}}>
                    {owned.map(([pid,p],oi)=>{
                      const pTasks=myTasks.filter(t=>t.pid===pid);
                      const pDCol=deptColor[p.department||'it']||'#4f73f5';
                      return(
                        <div key={pid}>

                              {pTasks.length>0&&<div style={{width:'1px',flex:1,minHeight:'8px',background:'#e5e7eb'}}/>}

                              <span style={{fontSize:'12.5px',fontWeight:600,color:'#1a1d23'}}>{p.name}</span>
                              <span style={{fontSize:'10px',fontWeight:700,color:pDCol,background:pDCol+'18',borderRadius:'99px',padding:'1px 7px'}}>Propietario</span>

                              <span style={{fontSize:'10px',color:'#9ca3af',marginLeft:'auto'}}>{pct(allTasks[pid]||{})}%</span>
                            </div>
                          </div>
                          {pTasks.map((t,ti)=>(
                            <div key={t.tid} style={{display:'flex',alignItems:'center',gap:'0',marginBottom:ti===pTasks.length-1?'6px':'0'}}>
                              <div style={{width:'24px',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center'}}>
                                <div style={{width:'1px',flex:1,background:'#e5e7eb'}}/>
                              </div>
                              <div style={{width:'20px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'flex-end',marginRight:'4px'}}>

                              <div style={{flex:1,padding:'3px 0 3px 6px'}}>

                                <span style={{marginLeft:'6px',fontSize:'10px',color:statusDot[t.status],fontWeight:600}}>{t.status}</span>
                              </div>
                            </div>

                        </div>

                    {asCollab.map(({pid,role:cr,pName,pDept},ci)=>{

                      return(
                        <div key={pid+'-collab'}>
                          <div style={{display:'flex',alignItems:'center',gap:'0',marginBottom:pTasks.length>0?'0':'6px'}}>

                              <span style={{fontSize:'10px',fontWeight:700,color:'#16a34a',background:'#dcfce7',borderRadius:'99px',padding:'1px 7px'}}>{cr||'Colaborador'}</span>

                              <div style={{width:'20px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'flex-end',marginRight:'4px'}}>

                                <span style={{marginLeft:'6px',fontSize:'10px',color:statusDot[t.status],fontWeight:600}}>{t.status}</span>

                    {myTasks.filter(t=>!owned.find(([pid])=>pid===t.pid)&&!asCollab.find(c=>c.pid===t.pid)).map((t,ti,arr)=>(
                      <div key={t.tid} style={{display:'flex',alignItems:'center',gap:'0',marginBottom:ti===arr.length-1?'0':'4px'}}>

                          <div style={{width:'1px',height:'12px',background:'#e5e7eb'}}/>
                          <div style={{width:'6px',height:'6px',borderRadius:'50%',background:statusDot[t.status]||'#9ca3af',flexShrink:0}}/>
